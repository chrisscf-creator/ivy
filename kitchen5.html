<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>厨房看板 · 订单号显示</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0f1e;
            color: #eef;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .kitchen-container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.2rem; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1:before { content: "🍳"; font-size: 2rem; }
        h1:after { content: "🔥"; font-size: 2rem; }
        .sub { text-align: center; color: #9aaebf; margin-bottom: 30px; }
        .stats {
            display: flex; justify-content: space-between; background: #111a24;
            padding: 12px 24px; border-radius: 60px; margin-bottom: 25px;
            flex-wrap: wrap; gap: 15px;
        }
        .stats span { color: #ffaa66; font-weight: bold; }
        .orders-grid { display: flex; flex-direction: column; gap: 18px; }
        .order-card {
            background: #1e2a36; border-radius: 24px; padding: 18px 22px;
            border-left: 8px solid #ffa500; box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 14px;
            border-bottom: 1px dashed #4a627a;
            padding-bottom: 8px;
        }
        .order-number {
            background: #ffa500;
            color: #1e2a2e;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 1rem;
        }
        .table-number {
            font-size: 1.3rem;
            font-weight: bold;
            background: #ffa50020;
            padding: 4px 16px;
            border-radius: 40px;
            color: #ffb347;
        }
        .order-time {
            font-size: 0.85rem;
            color: #b8d0e0;
            background: #0f1a24;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .items-list { margin: 15px 0; padding-left: 8px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2e445e; }
        .item-qty { color: #ffaa66; font-weight: bold; background: #00000030; padding: 2px 10px; border-radius: 30px; }
        .order-total { text-align: right; margin-top: 12px; font-size: 1.2rem; font-weight: bold; color: #7effb3; border-top: 1px solid #2e445e; padding-top: 12px; }
        .order-actions { display: flex; justify-content: flex-end; margin-top: 16px; }
        .btn-complete { background: #2c6e2c; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .btn-complete:hover { background: #1f511f; }
        .empty-state { text-align: center; padding: 60px 20px; background: #111a24; border-radius: 40px; color: #88aacc; }
        .loading { text-align: center; padding: 40px; color: #ffaa66; }
        footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #5b7992; }
    </style>
</head>
<body>
<div class="kitchen-container">
    <h1>厨房订单看板</h1>
    <div class="sub">实时同步 | 订单号自动连续</div>
    <div class="stats">
        <div>📋 等待中的订单：<span id="pendingCount">0</span></div>
        <div>🕒 最后更新：<span id="lastUpdate">--:--:--</span></div>
        <div>✅ 已完成（本会话）：<span id="completedCount">0</span></div>
    </div>
    <div id="ordersContainer" class="orders-grid"><div class="loading">⏳ 连接厨房数据库...</div></div>
    <footer>🔥 点击「完成」后订单归档，数据永久保留</footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
        authDomain: "create-for-payment.firebaseapp.com",
        databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "create-for-payment",
        storageBucket: "create-for-payment.firebasestorage.app",
        messagingSenderId: "505063429802",
        appId: "1:505063429802:web:8ec8cca8c788610bad62d3",
        measurementId: "G-SHP91WNP0H"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const ordersRef = database.ref('orders').orderByChild('completed').equalTo(false);
    const ordersContainer = document.getElementById('ordersContainer');
    const pendingCountSpan = document.getElementById('pendingCount');
    const lastUpdateSpan = document.getElementById('lastUpdate');
    const completedCountSpan = document.getElementById('completedCount');
    let currentOrderKeys = new Set();
    let completedLocalCount = 0;

    function updateLastUpdate() { lastUpdateSpan.innerText = new Date().toLocaleTimeString(); }
    function updatePendingCount() { pendingCountSpan.innerText = currentOrderKeys.size; }
    function incrementCompletedCount() { completedCountSpan.innerText = ++completedLocalCount; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
    function formatOrderTime(t) { if (!t) return '刚刚'; try { const d = new Date(t); if (!isNaN(d)) return d.toLocaleTimeString(); } catch(e){} return t; }

    function createOrderCard(orderId, orderData) {
        const card = document.createElement('div');
        card.className = 'order-card';
        card.dataset.id = orderId;
        const orderNumber = orderData.orderNumber ? `#${orderData.orderNumber}` : '?';
        const tableText = orderData.table ? `桌 ${orderData.table}` : '🥡 外带';
        const timeStr = formatOrderTime(orderData.time);
        let itemsHtml = '';
        if (orderData.items && Array.isArray(orderData.items)) {
            orderData.items.forEach(item => {
                itemsHtml += `<div class="item-row"><span>🍽️ ${escapeHtml(item.name)}</span><span class="item-qty">x ${item.qty}</span></div>`;
            });
        } else { itemsHtml = '<div>无明细</div>'; }
        const totalPrice = orderData.total || 0;
        card.innerHTML = `
            <div class="order-header">
                <div><span class="order-number">📋 ${escapeHtml(orderNumber)}</span> <span class="table-number">${escapeHtml(tableText)}</span></div>
                <span class="order-time">🕒 ${escapeHtml(timeStr)}</span>
            </div>
            <div class="items-list">${itemsHtml}</div>
            <div class="order-total">💵 合计: $${Number(totalPrice).toFixed(2)}</div>
            <div class="order-actions"><button class="btn-complete" data-id="${orderId}">✅ 完成</button></div>
        `;
        card.querySelector('.btn-complete').addEventListener('click', async e => {
            e.stopPropagation();
            try {
                await database.ref('orders').child(orderId).update({ completed: true });
                incrementCompletedCount();
                updateLastUpdate();
            } catch(err) { alert('操作失败'); }
        });
        return card;
    }

    function addOrderToScreen(id, data) {
        if (currentOrderKeys.has(id)) return;
        const card = createOrderCard(id, data);
        const first = ordersContainer.querySelector('.order-card');
        if (first) ordersContainer.insertBefore(card, first);
        else ordersContainer.appendChild(card);
        currentOrderKeys.add(id);
        updatePendingCount();
        updateLastUpdate();
    }
    function removeOrderFromScreen(id) {
        const card = document.querySelector(`.order-card[data-id="${id}"]`);
        if (card) card.remove();
        currentOrderKeys.delete(id);
        updatePendingCount();
        updateLastUpdate();
    }
    function showEmptyState(msg = '✨ 暂无订单') {
        let empty = document.getElementById('emptyState');
        if (!empty) { empty = document.createElement('div'); empty.id = 'emptyState'; empty.className = 'empty-state'; ordersContainer.appendChild(empty); }
        empty.innerText = msg;
        empty.style.display = 'block';
    }
    function hideEmptyState() { const e = document.getElementById('emptyState'); if (e) e.style.display = 'none'; }

    let initialLoad = false;
    ordersRef.on('child_added', snap => {
        const data = snap.val();
        const id = snap.key;
        if (!currentOrderKeys.has(id)) { addOrderToScreen(id, data); hideEmptyState(); }
        if (!initialLoad) { document.querySelector('.loading')?.remove(); initialLoad = true; if (currentOrderKeys.size === 0) showEmptyState(); else hideEmptyState(); }
    });
    database.ref('orders').on('child_changed', snap => {
        const id = snap.key;
        const data = snap.val();
        if (data.completed === true && currentOrderKeys.has(id)) {
            removeOrderFromScreen(id);
            if (currentOrderKeys.size === 0) showEmptyState();
        } else if (data.completed === false && !currentOrderKeys.has(id)) {
            addOrderToScreen(id, data);
            hideEmptyState();
        }
    });
    database.ref('orders').on('child_removed', snap => { removeOrderFromScreen(snap.key); if (currentOrderKeys.size === 0) showEmptyState(); });
    database.ref('.info/connected').on('value', snap => { if (snap.val()) console.log('✅ Firebase已连接'); else showEmptyState('⚠️ 网络重连中...'); });
    setInterval(() => { if (currentOrderKeys.size) updateLastUpdate(); }, 10000);
</script>
</body>
</html>
