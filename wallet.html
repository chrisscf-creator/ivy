<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付宝概念应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 800px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .status-bar {
            background: #1677ff;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .header {
            background: linear-gradient(135deg, #1677ff, #0958d9);
            padding: 25px 20px 20px;
            color: white;
            position: relative;
        }
        
        .balance-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .balance-detail {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        
        .action-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            font-size: 24px;
            transition: all 0.3s;
        }
        
        .action-icon:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        
        .action-text {
            font-size: 12px;
            color: white;
        }
        
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .service-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .service-icon {
            width: 40px;
            height: 40px;
            background: #e6f4ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 20px;
        }
        
        .service-text {
            font-size: 12px;
            color: #333;
        }
        
        .transaction-list {
            margin-bottom: 20px;
        }
        
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .transaction-icon {
            width: 40px;
            height: 40px;
            background: #f0f9ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
        }
        
        .transaction-info {
            flex: 1;
        }
        
        .transaction-title {
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }
        
        .transaction-time {
            font-size: 12px;
            color: #999;
        }
        
        .transaction-amount {
            font-weight: bold;
            color: #333;
        }
        
        .transaction-amount.income {
            color: #52c41a;
        }
        
        .transaction-amount.expense {
            color: #ff4d4f;
        }
        
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: white;
            border-top: 1px solid #f0f0f0;
            padding: 10px 0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 10px;
            cursor: pointer;
            color: #999;
        }
        
        .nav-item.active {
            color: #1677ff;
        }
        
        .nav-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }
        
        .nav-text {
            font-size: 12px;
        }
        
        .qr-code-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        
        .qr-code-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 300px;
        }
        
        .qr-code {
            width: 200px;
            height: 200px;
            background: white;
            border: 10px solid white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #333;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .close-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="status-bar">
            <span>9:41</span>
            <span>信号满格</span>
        </div>
        
        <div class="header">
            <div class="balance-section">
                <div class="balance-label">账户余额</div>
                <div class="balance-amount">¥2,847.50</div>
                <div class="balance-detail">昨日收益 ¥2.30</div>
            </div>
            
            <div class="quick-actions">
                <div class="action-item" onclick="showQRCode()">
                    <div class="action-icon">💳</div>
                    <div class="action-text">付款</div>
                </div>
                <div class="action-item" onclick="showQRCode()">
                    <div class="action-icon">📱</div>
                    <div class="action-text">收款</div>
                </div>
                <div class="action-item" onclick="transferMoney()">
                    <div class="action-icon">📤</div>
                    <div class="action-text">转账</div>
                </div>
                <div class="action-item" onclick="showBills()">
                    <div class="action-icon">📊</div>
                    <div class="action-text">账单</div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <h2 class="section-title">便民服务</h2>
            <div class="services-grid">
                <div class="service-item" onclick="serviceAction('生活缴费')">
                    <div class="service-icon">💡</div>
                    <div class="service-text">生活缴费</div>
                </div>
                <div class="service-item" onclick="serviceAction('手机充值')">
                    <div class="service-icon">📱</div>
                    <div class="service-text">手机充值</div>
                </div>
                <div class="service-item" onclick="serviceAction('信用卡还款')">
                    <div class="service-icon">💳</div>
                    <div class="service-text">信用卡还款</div>
                </div>
                <div class="service-item" onclick="serviceAction('出行')">
                    <div class="service-icon">🚗</div>
                    <div class="service-text">出行</div>
                </div>
                <div class="service-item" onclick="serviceAction('医疗健康')">
                    <div class="service-icon">🏥</div>
                    <div class="service-text">医疗健康</div>
                </div>
                <div class="service-item" onclick="serviceAction('公益')">
                    <div class="service-icon">❤️</div>
                    <div class="service-text">公益</div>
                </div>
                <div class="service-item" onclick="serviceAction('彩票')">
                    <div class="service-icon">🎲</div>
                    <div class="service-text">彩票</div>
                </div>
                <div class="service-item" onclick="serviceAction('电影演出')">
                    <div class="service-icon">🎬</div>
                    <div class="service-text">电影演出</div>
                </div>
            </div>
            
            <h2 class="section-title">近期交易</h2>
            <div class="transaction-list">
                <div class="transaction-item">
                    <div class="transaction-icon">🛒</div>
                    <div class="transaction-info">
                        <div class="transaction-title">超市购物</div>
                        <div class="transaction-time">今天 09:15</div>
                    </div>
                    <div class="transaction-amount expense">-¥86.50</div>
                </div>
                
                <div class="transaction-item">
                    <div class="transaction-icon">🍽️</div>
                    <div class="transaction-info">
                        <div class="transaction-title">外卖订单</div>
                        <div class="transaction-time">昨天 19:30</div>
                    </div>
                    <div class="transaction-amount expense">-¥42.00</div>
                </div>
                
                <div class="transaction-item">
                    <div class="transaction-icon">💰</div>
                    <div class="transaction-info">
                        <div class="transaction-title">工资收入</div>
                        <div class="transaction-time">昨天 09:00</div>
                    </div>
                    <div class="transaction-amount income">+¥8,500.00</div>
                </div>
                
                <div class="transaction-item">
                    <div class="transaction-icon">📱</div>
                    <div class="transaction-info">
                        <div class="transaction-title">手机充值</div>
                        <div class="transaction-time">前天 14:20</div>
                    </div>
                    <div class="transaction-amount expense">-¥100.00</div>
                </div>
            </div>
        </div>
        
        <div class="bottom-nav">
            <div class="nav-item active">
                <div class="nav-icon">🏠</div>
                <div class="nav-text">首页</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">🔍</div>
                <div class="nav-text">财富</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">💬</div>
                <div class="nav-text">朋友</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">⚙️</div>
                <div class="nav-text">我的</div>
            </div>
        </div>
    </div>
    
    <div id="qrModal" class="qr-code-modal">
        <div class="qr-code-content">
            <div class="qr-code">🧾</div>
            <div class="modal-title">扫描二维码付款</div>
            <p>请将二维码对准扫描器</p>
            <button class="close-btn" onclick="closeQRCode()">关闭</button>
        </div>
    </div>

    <script>
        function showQRCode() {
            document.getElementById('qrModal').style.display = 'flex';
        }
        
        function closeQRCode() {
            document.getElementById('qrModal').style.display = 'none';
        }
        
        function transferMoney() {
            alert('转账功能正在开发中...');
        }
        
        function showBills() {
            alert('查看账单功能正在开发中...');
        }
        
        function serviceAction(service) {
            alert(`${service}服务暂未开通，敬请期待！`);
        }
        
        // 添加导航栏交互
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 模拟二维码扫描
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeQRCode();
            }
        });
    </script>
</body>
</html>
