<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>返现购物应用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .cashback-balance {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .content {
            padding: 20px;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        .store-list {
            margin-bottom: 25px;
        }
        
        .store-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .store-item:hover {
            border-color: #ff6b6b;
            background-color: #fff9f9;
        }
        
        .store-icon {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
        }
        
        .store-info {
            flex: 1;
        }
        
        .store-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .cashback-percent {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .purchase-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-store {
            font-weight: bold;
        }
        
        .history-cashback {
            color: #4ecdc4;
            font-weight: bold;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4ecdc4;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 返现购物</h1>
            <p>购物返现，省钱更省心</p>
            <div class="cashback-balance">
                <p>可用返现余额</p>
                <div class="balance-amount">¥128.50</div>
                <p>立即使用</p>
            </div>
        </div>
        
        <div class="content">
            <h2 class="section-title">热门商家</h2>
            <div class="store-list">
                <div class="store-item" onclick="selectStore('淘宝', 8)">
                    <div class="store-icon">🛒</div>
                    <div class="store-info">
                        <div class="store-name">淘宝</div>
                        <div class="cashback-percent">返现 8%</div>
                    </div>
                </div>
                
                <div class="store-item" onclick="selectStore('京东', 6)">
                    <div class="store-icon">📦</div>
                    <div class="store-info">
                        <div class="store-name">京东</div>
                        <div class="cashback-percent">返现 6%</div>
                    </div>
                </div>
                
                <div class="store-item" onclick="selectStore('天猫', 7)">
                    <div class="store-icon">🛍️</div>
                    <div class="store-info">
                        <div class="store-name">天猫</div>
                        <div class="cashback-percent">返现 7%</div>
                    </div>
                </div>
                
                <div class="store-item" onclick="selectStore('拼多多', 5)">
                    <div class="store-icon">💝</div>
                    <div class="store-info">
                        <div class="store-name">拼多多</div>
                        <div class="cashback-percent">返现 5%</div>
                    </div>
                </div>
            </div>
            
            <h2 class="section-title">发起购物返现</h2>
            <div class="purchase-form">
                <div class="form-group">
                    <label for="selectedStore">选择商家</label>
                    <input type="text" id="selectedStore" placeholder="点击上方商家选择" readonly>
                </div>
                
                <div class="form-group">
                    <label for="purchaseAmount">购买金额 (¥)</label>
                    <input type="number" id="purchaseAmount" placeholder="输入购买金额" min="1">
                </div>
                
                <button onclick="calculateCashback()">计算返现</button>
            </div>
            
            <h2 class="section-title">返现历史</h2>
            <div id="historyList">
                <div class="history-item">
                    <span class="history-store">京东</span>
                    <span class="history-amount">¥256.00</span>
                    <span class="history-cashback">+¥15.36</span>
                </div>
                <div class="history-item">
                    <span class="history-store">淘宝</span>
                    <span class="history-amount">¥180.00</span>
                    <span class="history-cashback">+¥14.40</span>
                </div>
                <div class="history-item">
                    <span class="history-store">天猫</span>
                    <span class="history-amount">¥320.00</span>
                    <span class="history-cashback">+¥22.40</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>

    <script>
        let selectedStore = null;
        let cashbackRate = 0;
        
        function selectStore(storeName, rate) {
            selectedStore = storeName;
            cashbackRate = rate;
            document.getElementById('selectedStore').value = `${storeName} (返现 ${rate}%)`;
        }
        
        function calculateCashback() {
            if (!selectedStore) {
                showNotification('请先选择商家');
                return;
            }
            
            const amount = parseFloat(document.getElementById('purchaseAmount').value);
            if (!amount || amount <= 0) {
                showNotification('请输入有效的购买金额');
                return;
            }
            
            const cashback = (amount * cashbackRate / 100).toFixed(2);
            showNotification(`在${selectedStore}消费¥${amount}，获得¥${cashback}返现！`);
            
            // 更新历史记录
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <span class="history-store">${selectedStore}</span>
                <span class="history-amount">¥${amount}</span>
                <span class="history-cashback">+¥${cashback}</span>
            `;
            document.getElementById('historyList').prepend(historyItem);
        }
        
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 初始化示例数据
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('purchaseAmount').value = '100';
        });
    </script>
</body>
</html>
