<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>支付宝 - 便捷支付</title>
    <style>
        /* ===== 全局重置 & 基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --primary: #1677ff;
            --primary-light: #e8f0fe;
            --primary-dark: #0958d9;
            --success: #52c41a;
            --danger: #ff4d4f;
            --warning: #faad14;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --border: #e5e7eb;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
            user-select: none;
        }
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* ===== App 容器 ===== */
        #app {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
        }

        /* ===== 页面容器 ===== */
        .page {
            display: none;
            flex: 1;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 页面头部 ===== */
        .page-header {
            padding: 16px 20px 12px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .page-header .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }
        .page-header .back-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border: none;
            background: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .page-header .back-btn svg {
            width: 24px;
            height: 24px;
        }
        .page-header .right-action {
            font-size: 14px;
            color: var(--primary);
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 500;
        }

        /* ===== 页面内容 ===== */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .page-content.no-padding {
            padding: 0;
        }

        /* ===== 登录/注册页 ===== */
        .auth-page {
            background: linear-gradient(145deg, #ffffff 0%, #f0f6ff 100%);
            justify-content: center;
            align-items: center;
            padding: 40px 32px;
        }
        .auth-page .logo {
            font-size: 42px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-page .logo span {
            background: var(--primary);
            color: #fff;
            font-size: 20px;
            padding: 4px 12px;
            border-radius: 12px;
        }
        .auth-page .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 36px;
        }
        .auth-page .auth-form {
            width: 100%;
            max-width: 340px;
        }
        .auth-form .form-group {
            margin-bottom: 18px;
            position: relative;
        }
        .auth-form .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .auth-form .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: #fff;
            transition: all 0.25s;
            outline: none;
            color: var(--text);
        }
        .auth-form .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
        }
        .auth-form .form-group input::placeholder {
            color: var(--text-light);
        }
        .auth-form .btn-auth {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.35);
        }
        .auth-form .btn-auth:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.25);
        }
        .auth-form .btn-auth:disabled {
            opacity: 0.6;
            transform: none;
        }
        .auth-form .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-form .auth-switch a {
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .auth-form .auth-error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-form .auth-error.show {
            display: block;
        }

        /* ===== 首页 ===== */
        .home-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0050cc 100%);
            border-radius: var(--radius);
            padding: 20px 24px;
            color: #fff;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        .home-header::after {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }
        .home-header .greeting {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 4px;
        }
        .home-header .user-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .home-header .balance-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .home-header .balance-row .label {
            font-size: 14px;
            opacity: 0.8;
        }
        .home-header .balance-row .amount {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .home-header .balance-row .currency {
            font-size: 18px;
            font-weight: 500;
            opacity: 0.9;
        }
        .home-header .balance-row .eye {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        /* 快捷功能 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 12px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .quick-actions .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            color: var(--text);
        }
        .quick-actions .action-item:active {
            background: var(--bg);
            transform: scale(0.94);
        }
        .quick-actions .action-item .icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.2s;
        }
        .quick-actions .action-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .quick-actions .action-item .icon.blue {
            background: #e8f0fe;
            color: var(--primary);
        }
        .quick-actions .action-item .icon.green {
            background: #e6f7e6;
            color: var(--success);
        }
        .quick-actions .action-item .icon.orange {
            background: #fff7e6;
            color: var(--warning);
        }
        .quick-actions .action-item .icon.purple {
            background: #f0e8ff;
            color: #7c3aed;
        }
        .quick-actions .action-item .icon.red {
            background: #fff0f0;
            color: var(--danger);
        }

        /* 首页-最近账单 */
        .recent-bills {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--shadow);
        }
        .recent-bills .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .recent-bills .section-header h3 {
            font-size: 15px;
            font-weight: 600;
        }
        .recent-bills .section-header a {
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 500;
        }
        .bill-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .bill-item:last-child {
            border-bottom: none;
        }
        .bill-item .bill-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .bill-item .bill-icon.in {
            background: #e6f7e6;
            color: var(--success);
        }
        .bill-item .bill-icon.out {
            background: #fff0f0;
            color: var(--danger);
        }
        .bill-item .bill-icon.recharge {
            background: #e8f0fe;
            color: var(--primary);
        }
        .bill-item .bill-info {
            flex: 1;
            min-width: 0;
        }
        .bill-item .bill-info .name {
            font-weight: 500;
            font-size: 14px;
        }
        .bill-item .bill-info .desc {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bill-item .bill-amount {
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
        }
        .bill-item .bill-amount.in {
            color: var(--success);
        }
        .bill-item .bill-amount.out {
            color: var(--danger);
        }
        .bill-item .bill-amount.recharge {
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ===== 转账页 ===== */
        .transfer-form {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            animation: slideUp 0.35s ease;
        }
        .transfer-form .form-group {
            margin-bottom: 18px;
        }
        .transfer-form .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .transfer-form .form-group input,
        .transfer-form .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: #fff;
            transition: all 0.25s;
            outline: none;
            color: var(--text);
            font-family: inherit;
        }
        .transfer-form .form-group input:focus,
        .transfer-form .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.08);
        }
        .transfer-form .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .transfer-form .form-group .input-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .transfer-form .btn-transfer {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.3);
        }
        .transfer-form .btn-transfer:active {
            transform: scale(0.97);
        }
        .transfer-form .btn-transfer:disabled {
            opacity: 0.5;
            transform: none;
        }
        .transfer-form .transfer-amount-display {
            text-align: center;
            padding: 12px 0 8px;
        }
        .transfer-form .transfer-amount-display .big {
            font-size: 42px;
            font-weight: 700;
            color: var(--text);
        }
        .transfer-form .transfer-amount-display .big .currency {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-right: 4px;
        }

        /* ===== 账单页 ===== */
        .bill-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .bill-filters .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .bill-filters .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .bill-filters .filter-btn:active {
            transform: scale(0.94);
        }

        .bill-list .bill-item {
            background: var(--card);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            border-bottom: none;
        }
        .bill-list .bill-item .bill-time {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* ===== 个人中心 ===== */
        .profile-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 16px;
        }
        .profile-card .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            margin: 0 auto 10px;
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }
        .profile-card .name {
            font-size: 18px;
            font-weight: 600;
        }
        .profile-card .phone {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .profile-card .balance-info {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 32px;
        }
        .profile-card .balance-info .item .label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .profile-card .balance-info .item .value {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
        }

        .profile-menu {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .profile-menu .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s;
            gap: 12px;
            background: none;
            border-left: none;
            border-right: none;
            width: 100%;
            text-align: left;
            font-size: 14px;
            color: var(--text);
        }
        .profile-menu .menu-item:last-child {
            border-bottom: none;
        }
        .profile-menu .menu-item:active {
            background: var(--bg);
        }
        .profile-menu .menu-item .menu-icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        .profile-menu .menu-item .menu-label {
            flex: 1;
        }
        .profile-menu .menu-item .menu-arrow {
            color: var(--text-light);
            font-size: 16px;
        }
        .profile-menu .menu-item.danger .menu-label {
            color: var(--danger);
        }

        /* ===== Toast ===== */
        .toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 85%;
        }
        .toast {
            background: rgba(0, 0, 0, 0.78);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: toastIn 0.3s ease;
            pointer-events: auto;
            text-align: center;
            min-width: 120px;
            max-width: 90%;
            word-break: break-all;
        }
        .toast.success {
            background: rgba(22, 119, 255, 0.92);
        }
        .toast.error {
            background: rgba(255, 77, 79, 0.92);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: scale(0.88) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ===== 对话框 ===== */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.2s ease;
        }
        .dialog-box {
            background: #fff;
            border-radius: 20px;
            padding: 28px 24px 20px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }
        .dialog-box .dialog-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .dialog-box .dialog-desc {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .dialog-box .dialog-actions {
            display: flex;
            gap: 12px;
        }
        .dialog-box .dialog-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dialog-box .dialog-actions button:active {
            transform: scale(0.96);
        }
        .dialog-box .dialog-actions .btn-cancel {
            background: var(--bg);
            color: var(--text-secondary);
        }
        .dialog-box .dialog-actions .btn-confirm {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }
        .dialog-box .dialog-actions .btn-confirm.danger {
            background: var(--danger);
            box-shadow: 0 4px 12px rgba(255, 77, 79, 0.3);
        }

        /* ===== Tab Bar ===== */
        .tab-bar {
            display: flex;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 6px 0 calc(6px + var(--safe-bottom));
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            z-index: 20;
        }
        .tab-bar .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 4px 0;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-light);
            font-size: 11px;
            transition: all 0.2s;
            position: relative;
        }
        .tab-bar .tab-item .tab-icon {
            font-size: 24px;
            line-height: 1.2;
            transition: all 0.2s;
        }
        .tab-bar .tab-item .tab-label {
            font-weight: 500;
        }
        .tab-bar .tab-item.active {
            color: var(--primary);
        }
        .tab-bar .tab-item.active .tab-icon {
            transform: scale(1.05);
        }
        .tab-bar .tab-item:active {
            transform: scale(0.92);
        }
        .tab-bar .tab-item .badge {
            position: absolute;
            top: 2px;
            right: 50%;
            transform: translateX(calc(50% + 18px));
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            font-weight: 600;
        }

        /* ===== 充值弹窗 ===== */
        .recharge-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 12px 0 16px;
        }
        .recharge-options .recharge-btn {
            padding: 12px 0;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }
        .recharge-options .recharge-btn:active {
            transform: scale(0.94);
        }
        .recharge-options .recharge-btn.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }

        /* ===== 工具类 ===== */
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .gap-8 {
            gap: 8px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .home-header .balance-row .amount {
                font-size: 28px;
            }
            .quick-actions .action-item .icon {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
            .transfer-form .transfer-amount-display .big {
                font-size: 32px;
            }
        }
        @media (min-width: 421px) {
            #app {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- ==================== 登录页 ==================== -->

        <!-- ==================== 首页 ==================== -->

                        <!-- 动态渲染 -->

        <!-- ==================== 转账页 ==================== -->
        <div class="page" id="page-transfer">
            <div class="page-header">
                <button class="back-btn" data-back>‹ 返回</button>

            <div class="page-content no-padding">
                <div style="padding:12px 16px 0;">

                        <button class="filter-btn" data-filter="out">支出</button>

                        <!-- 动态渲染 -->

        <!-- ==================== 个人中心 ==================== -->
        <div class="page" id="page-profile">

                <span class="title">我的</span>

                <div class="profile-card">
                    <div class="avatar" id="profileAvatar">用</div>
                    <div class="name" id="profileName">用户</div>
                    <div class="phone" id="profilePhone">138****8000</div>
                    <div class="balance-info">
                        <div class="item">
                            <div class="label">余额</div>
                            <div class="value" id="profileBalance">¥0.00</div>
                        </div>
                        <div class="item">
                            <div class="label">交易笔数</div>
                            <div class="value" id="profileCount">0</div>
                        </div>
                    </div>
                </div>
                <div class="profile-menu">
                    <button class="menu-item" data-action="recharge">
                        <span class="menu-icon">💰</span>
                        <span class="menu-label">充值</span>
                        <span class="menu-arrow">›</span>
                    </button>
                    <button class="menu-item" data-action="bills">
                        <span class="menu-icon">📋</span>
                        <span class="menu-label">我的账单</span>
                        <span class="menu-arrow">›</span>
                    </button>
                    <button class="menu-item danger" id="logoutBtn">
                        <span class="menu-icon">🚪</span>
                        <span class="menu-label">退出登录</span>

                    </button>

                    支付宝 v2.0 · 模拟演示

        <!-- ==================== Tab Bar ==================== -->
        <div class="tab-bar" id="tabBar">
            <button class="tab-item active" data-tab="home">
                <span class="tab-icon">🏠</span>
                <span class="tab-label">首页</span>
            </button>
            <button class="tab-item" data-tab="transfer">
                <span class="tab-icon">💸</span>
                <span class="tab-label">转账</span>
            </button>
            <button class="tab-item" data-tab="bills">
                <span class="tab-icon">📋</span>
                <span class="tab-label">账单</span>
            </button>
            <button class="tab-item" data-tab="profile">
                <span class="tab-icon">👤</span>
                <span class="tab-label">我的</span>
            </button>
        </div>
    </div>

    <!-- ==================== Toast 容器 ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        //  数据层
        // ============================================================
        const DB = {
            getUsers() {
                return JSON.parse(localStorage.getItem('pay_users') || '[]');
            },
            setUsers(users) {
                localStorage.setItem('pay_users', JSON.stringify(users));
            },
            getTransactions() {
                return JSON.parse(localStorage.getItem('pay_transactions') || '[]');
            },
            setTransactions(txs) {
                localStorage.setItem('pay_transactions', JSON.stringify(txs));
            },
            getCurrentUser() {
                const data = JSON.parse(localStorage.getItem('pay_current') || 'null');
                return data;
            },
            setCurrentUser(user) {
                localStorage.setItem('pay_current', JSON.stringify(user));
            },
            clearCurrentUser() {
                localStorage.removeItem('pay_current');
            },
            // 初始化默认数据
            init() {
                const users = this.getUsers();
                if (users.length === 0) {
                    const defaultUsers = [
                        { id: 'u1', phone: '13800138000', password: '123456', name: '张小明', balance: 12800.50,
                            avatar: '张' },
                        { id: 'u2', phone: '13800138001', password: '123456', name: '李小红', balance: 5600.00,
                            avatar: '李' },
                        { id: 'u3', phone: '13800138002', password: '123456', name: '王大伟', balance: 3200.00,
                            avatar: '王' },
                    ];
                    this.setUsers(defaultUsers);
                    const txs = [
                        { id: 't1', userId: 'u1', type: 'out', amount: 200.00, counterparty: '李小红',
                            time: Date.now() - 3600000 * 2, note: '午餐', status: 'completed' },
                        { id: 't2', userId: 'u1', type: 'in', amount: 5000.00, counterparty: '工资',
                            time: Date.now() - 3600000 * 24, note: '1月工资', status: 'completed' },
                        { id: 't3', userId: 'u1', type: 'recharge', amount: 1000.00, counterparty: '充值',
                            time: Date.now() - 3600000 * 48, note: '银行卡充值', status: 'completed' },
                        { id: 't4', userId: 'u1', type: 'out', amount: 88.50, counterparty: '便利店',
                            time: Date.now() - 3600000 * 72, note: '购物', status: 'completed' },
                    ];
                    this.setTransactions(txs);
                }
            }
        };

        // ============================================================
        //  工具函数
        // ============================================================
        function formatMoney(n) {
            return Number(n).toFixed(2);
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function getTypeLabel(type) {
            const map = { in: '收入', out: '支出', recharge: '充值' };
            return map[type] || type;
        }

        function getTypeIcon(type) {
            const map = { in: '📈', out: '📉', recharge: '💳' };
            return map[type] || '📄';
        }

        function getTypeClass(type) {
            const map = { in: 'in', out: 'out', recharge: 'recharge' };
            return map[type] || '';
        }

        function getGreeting() {
            const h = new Date().getHours();
            if (h < 6) return '🌙 夜深了';
            if (h < 9) return '🌅 早上好';
            if (h < 12) return '☀️ 上午好';
            if (h < 14) return '🌤️ 中午好';
            if (h < 18) return '🌇 下午好';
            if (h < 22) return '🌆 晚上好';
            return '🌙 夜深了';
        }

        // ============================================================
        //  Toast / Dialog
        // ============================================================
        function showToast(msg, type = 'info', duration = 2000) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, duration);
        }

        function showDialog(title, desc, confirmText = '确定', cancelText = '取消', onConfirm, danger = false) {
            const overlay = document.createElement('div');
            overlay.className = 'dialog-overlay';
            overlay.innerHTML = `
                <div class="dialog-box">
                    <div class="dialog-title">${title}</div>
                    <div class="dialog-desc">${desc}</div>
                    <div class="dialog-actions">
                        <button class="btn-cancel">${cancelText}</button>
                        <button class="btn-confirm ${danger ? 'danger' : ''}">${confirmText}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            const cancelBtn = overlay.querySelector('.btn-cancel');
            const confirmBtn = overlay.querySelector('.btn-confirm');
            const close = () => overlay.remove();
            cancelBtn.addEventListener('click', close);
            confirmBtn.addEventListener('click', () => {
                close();
                if (onConfirm) onConfirm();
            });
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) close();
            });
        }

        // ============================================================
        //  应用状态
        // ============================================================
        const App = {
            currentUser: null,
            currentPage: 'login',
            balanceHidden: false,
            billFilter: 'all',

            init() {
                DB.init();
                this.currentUser = DB.getCurrentUser();
                if (this.currentUser) {
                    this.navigateTo('home');
                } else {
                    this.navigateTo('login');
                }
                this.bindEvents();
            },

            // ---- 页面导航 ----
            navigateTo(page, data) {
                // 隐藏所有页面
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(`page-${page}`);
                if (target) target.classList.add('active');
                this.currentPage = page;

                // Tab 高亮
                document.querySelectorAll('.tab-item').forEach(t => t.classList.toggle('active', t.dataset.tab === page));

                // 特殊页面隐藏Tab
                const tabBar = document.getElementById('tabBar');
                const hideTabs = ['login', 'register'];
                tabBar.style.display = hideTabs.includes(page) ? 'none' : 'flex';

                // 页面渲染
                if (page === 'home') this.renderHome();
                if (page === 'bills') this.renderBills();
                if (page === 'profile') this.renderProfile();
                if (page === 'transfer') this.renderTransfer(data);

                // 滚动到顶部
                const content = target.querySelector('.page-content');
                if (content) content.scrollTop = 0;
            },

            // ---- 事件绑定 ----
            bindEvents() {
                // 登录
                document.getElementById('loginBtn').addEventListener('click', () => this.handleLogin());
                document.getElementById('loginPhone').addEventListener('keydown', (e) => { if (e.key === 'Enter') this
                        .handleLogin(); });
                document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') this
                        .handleLogin(); });

                // 注册
                document.getElementById('registerBtn').addEventListener('click', () => this.handleRegister());
                document.getElementById('gotoRegister').addEventListener('click', () => this.navigateTo('register'));
                document.getElementById('gotoLogin').addEventListener('click', () => this.navigateTo('login'));

                // Tab切换
                document.querySelectorAll('.tab-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const tab = el.dataset.tab;
                        if (this.currentUser) this.navigateTo(tab);
                    });
                });

                // 返回按钮
                document.querySelectorAll('[data-back]').forEach(el => {
                    el.addEventListener('click', () => {
                        if (this.currentUser) this.navigateTo('home');
                        else this.navigateTo('login');
                    });
                });

                // 首页快捷操作
                document.querySelectorAll('.quick-actions .action-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const action = el.dataset.action;
                        if (!this.currentUser) return;
                        if (action === 'transfer') this.navigateTo('transfer');
                        else if (action === 'recharge') this.showRechargeDialog();
                        else if (action === 'bills') this.navigateTo('bills');
                        else if (action === 'profile') this.navigateTo('profile');
                    });
                });

                // 查看全部账单
                document.getElementById('viewAllBills').addEventListener('click', () => {
                    if (this.currentUser) this.navigateTo('bills');
                });

                // 余额显隐
                document.getElementById('toggleBalance').addEventListener('click', () => {
                    this.balanceHidden = !this.balanceHidden;
                    this.renderHome();
                });

                // 转账
                document.getElementById('transferBtn').addEventListener('click', () => this.handleTransfer());

                // 账单筛选
                document.getElementById('billFilters').addEventListener('click', (e) => {
                    const btn = e.target.closest('.filter-btn');
                    if (!btn) return;
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    this.billFilter = btn.dataset.filter;
                    this.renderBills();
                });

                // 个人中心菜单
                document.querySelectorAll('.profile-menu .menu-item[data-action]').forEach(el => {
                    el.addEventListener('click', () => {
                        const action = el.dataset.action;
                        if (action === 'recharge') this.showRechargeDialog();
                        else if (action === 'bills') this.navigateTo('bills');
                    });
                });

                // 退出登录
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    showDialog('确认退出', '确定要退出当前账号吗？', '退出', '取消', () => {
                        DB.clearCurrentUser();
                        this.currentUser = null;
                        this.navigateTo('login');
                        showToast('已退出登录', 'info');
                    }, true);
                });

                // 输入金额实时显示
                document.getElementById('transferAmount').addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value) || 0;
                    document.getElementById('transferAmountDisplay').textContent = formatMoney(val);
                });

                // 回车触发转账
                document.getElementById('transferAmount').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.handleTransfer();
                });
                document.getElementById('transferTo').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('transferAmount').focus();
                });
                document.getElementById('transferNote').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.handleTransfer();
                });
            },

            // ---- 登录 ----
            handleLogin() {
                const phone = document.getElementById('loginPhone').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const errorEl = document.getElementById('loginError');

                if (!phone || !password) {
                    errorEl.textContent = '请输入手机号和密码';
                    errorEl.classList.add('show');
                    return;
                }
                if (!/^\d{11}$/.test(phone)) {
                    errorEl.textContent = '请输入11位有效手机号';
                    errorEl.classList.add('show');
                    return;
                }

                const users = DB.getUsers();
                const user = users.find(u => u.phone === phone && u.password === password);
                if (!user) {
                    errorEl.textContent = '账号或密码错误，请重试';
                    errorEl.classList.add('show');
                    return;
                }
                errorEl.classList.remove('show');
                this.currentUser = user;
                DB.setCurrentUser(user);
                showToast(`欢迎回来，${user.name}！`, 'success');
                this.navigateTo('home');
            },

            // ---- 注册 ----
            handleRegister() {
                const phone = document.getElementById('regPhone').value.trim();
                const name = document.getElementById('regName').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                const confirm = document.getElementById('regConfirm').value.trim();
                const errorEl = document.getElementById('registerError');

                if (!phone || !name || !password || !confirm) {
                    errorEl.textContent = '请填写完整信息';
                    errorEl.classList.add('show');
                    return;
                }
                if (!/^\d{11}$/.test(phone)) {
                    errorEl.textContent = '请输入11位有效手机号';
                    errorEl.classList.add('show');
                    return;
                }
                if (password.length < 6) {
                    errorEl.textContent = '密码至少6位';
                    errorEl.classList.add('show');
                    return;
                }
                if (password !== confirm) {
                    errorEl.textContent = '两次密码输入不一致';
                    errorEl.classList.add('show');
                    return;
                }

                const users = DB.getUsers();
                if (users.find(u => u.phone === phone)) {
                    errorEl.textContent = '该手机号已注册';
                    errorEl.classList.add('show');
                    return;
                }

                const newUser = {
                    id: 'u' + Date.now(),
                    phone,
                    password,
                    name,
                    balance: 0,
                    avatar: name.charAt(0)
                };
                users.push(newUser);
                DB.setUsers(users);
                this.currentUser = newUser;
                DB.setCurrentUser(newUser);
                errorEl.classList.remove('show');
                showToast(`🎉 注册成功，欢迎 ${name}！`, 'success');
                this.navigateTo('home');
            },

            // ---- 渲染首页 ----
            renderHome() {
                const user = this.currentUser;
                if (!user) return;
                document.getElementById('greeting').textContent = getGreeting();
                document.getElementById('userName').textContent = user.name;
                const balance = this.balanceHidden ? '****' : formatMoney(user.balance);
                document.getElementById('balanceDisplay').textContent = balance;
                document.getElementById('toggleBalance').textContent = this.balanceHidden ? '👁️‍🗨️' : '👁️';

                // 最近交易
                const txs = DB.getTransactions().filter(t => t.userId === user.id).sort((a, b) => b.time - a.time);
                const list = document.getElementById('recentBillList');
                if (txs.length === 0) {
                    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>暂无交易记录</p></div>`;
                    return;
                }
                const recent = txs.slice(0, 5);
                list.innerHTML = recent.map(t => this.billItemHTML(t)).join('');
            },

            // ---- 渲染账单 ----
            renderBills() {
                const user = this.currentUser;
                if (!user) return;
                let txs = DB.getTransactions().filter(t => t.userId === user.id);
                const filter = this.billFilter;
                if (filter === 'in') txs = txs.filter(t => t.type === 'in');
                else if (filter === 'out') txs = txs.filter(t => t.type === 'out');
                else if (filter === 'recharge') txs = txs.filter(t => t.type === 'recharge');
                txs.sort((a, b) => b.time - a.time);

                const list = document.getElementById('billList');
                if (txs.length === 0) {
                    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>暂无相关交易</p></div>`;
                    return;
                }
                list.innerHTML = txs.map(t => this.billItemHTML(t, true)).join('');
            },

            // ---- 账单项 HTML ----
            billItemHTML(t, showTime = false) {
                const sign = t.type === 'in' ? '+' : t.type === 'recharge' ? '+' : '-';
                const cls = getTypeClass(t.type);
                const icon = getTypeIcon(t.type);
                const label = getTypeLabel(t.type);
                const name = t.counterparty || '未知';
                const amount = formatMoney(t.amount);
                const timeStr = showTime ? `<div class="bill-time">${formatTime(t.time)}</div>` : '';
                return `
                    <div class="bill-item">
                        <div class="bill-icon ${cls}">${icon}</div>
                        <div class="bill-info">
                            <div class="name">${name}</div>
                            <div class="desc">${label}${t.note ? ' · ' + t.note : ''}</div>
                            ${timeStr}
                        </div>
                        <div class="bill-amount ${cls}">${sign}¥${amount}</div>
                    </div>
                `;
            },

            // ---- 渲染个人中心 ----
            renderProfile() {
                const user = this.currentUser;
                if (!user) return;
                document.getElementById('profileAvatar').textContent = user.avatar || user.name.charAt(0);
                document.getElementById('profileName').textContent = user.name;
                const phone = user.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
                document.getElementById('profilePhone').textContent = phone;
                document.getElementById('profileBalance').textContent = `¥${formatMoney(user.balance)}`;
                const txs = DB.getTransactions().filter(t => t.userId === user.id);
                document.getElementById('profileCount').textContent = txs.length;
            },

            // ---- 渲染转账 ----
            renderTransfer(data) {
                if (data && data.to) {
                    document.getElementById('transferTo').value = data.to;
                }
                document.getElementById('transferAmount').value = '';
                document.getElementById('transferAmountDisplay').textContent = '0.00';
                document.getElementById('transferNote').value = '';
            },

            // ---- 处理转账 ----
            handleTransfer() {
                const user = this.currentUser;
                if (!user) return;
                const toPhone = document.getElementById('transferTo').value.trim();
                const amountStr = document.getElementById('transferAmount').value.trim();
                const note = document.getElementById('transferNote').value.trim();

                if (!toPhone) {
                    showToast('请输入收款账户', 'error');
                    return;
                }
                if (!amountStr || parseFloat(amountStr) <= 0) {
                    showToast('请输入有效金额', 'error');
                    return;
                }
                const amount = parseFloat(amountStr);
                if (amount > 10000) {
                    showToast('单笔限额 ¥10,000.00', 'error');
                    return;
                }
                if (amount > user.balance) {
                    showToast('余额不足，请先充值', 'error');
                    return;
                }
                if (toPhone === user.phone) {
                    showToast('不能给自己转账', 'error');
                    return;
                }

                const users = DB.getUsers();
                const target = users.find(u => u.phone === toPhone);
                if (!target) {
                    showToast('收款账户不存在', 'error');
                    return;
                }

                // 确认对话框
                showDialog(
                    '确认转账',
                    `向 <strong>${target.name}</strong> (${toPhone}) 转账 <strong>¥${formatMoney(amount)}</strong>${note ? ' · ' + note : ''}`,
                    '确认转账', '取消',
                    () => {
                        // 执行转账
                        user.balance = parseFloat((user.balance - amount).toFixed(2));
                        target.balance = parseFloat((target.balance + amount).toFixed(2));
                        DB.setUsers(users);
                        DB.setCurrentUser(user);

                        const tx = {
                            id: 't' + Date.now(),
                            userId: user.id,
                            type: 'out',
                            amount: amount,
                            counterparty: target.name,
                            time: Date.now(),
                            note: note || '转账',
                            status: 'completed'
                        };
                        const txs = DB.getTransactions();
                        txs.push(tx);
                        // 同时给收款方添加收入记录
                        const txIn = {
                            id: 't' + Date.now() + 1,
                            userId: target.id,
                            type: 'in',
                            amount: amount,
                            counterparty: user.name,
                            time: Date.now(),
                            note: note || '转账收入',
                            status: 'completed'
                        };
                        txs.push(txIn);
                        DB.setTransactions(txs);

                        this.currentUser = user;
                        showToast(`✅ 转账成功！¥${formatMoney(amount)} → ${target.name}`, 'success');
                        this.navigateTo('home');
                    }
                );
            },

            // ---- 充值弹窗 ----
            showRechargeDialog() {
                const user = this.currentUser;
                if (!user) return;
                let selected = 100;
                const overlay = document.createElement('div');
                overlay.className = 'dialog-overlay';
                overlay.innerHTML = `
                    <div class="dialog-box">
                        <div class="dialog-title">💰 充值</div>
                        <div class="dialog-desc">选择充值金额，将增加到你的余额</div>
                        <div class="recharge-options">
                            ${[50, 100, 200, 500, 1000, 2000].map(v => `
                                <button class="recharge-btn ${v === selected ? 'selected' : ''}" data-value="${v}">¥${v}</button>
                            `).join('')}
                        </div>
                        <div class="form-group" style="margin-bottom:16px;">
                            <input type="number" id="rechargeCustom" placeholder="自定义金额" min="1" step="1" style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;outline:none;">
                        </div>
                        <div class="dialog-actions">
                            <button class="btn-cancel">取消</button>
                            <button class="btn-confirm" id="rechargeConfirm">确认充值</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);

                // 选择预设
                overlay.querySelectorAll('.recharge-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        overlay.querySelectorAll('.recharge-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        selected = parseInt(btn.dataset.value);
                        document.getElementById('rechargeCustom').value = '';
                    });
                });

                const customInput = overlay.querySelector('#rechargeCustom');
                customInput.addEventListener('input', () => {
                    overlay.querySelectorAll('.recharge-btn').forEach(b => b.classList.remove('selected'));
                    const val = parseFloat(customInput.value);
                    if (val > 0) selected = val;
                });

                const close = () => overlay.remove();
                overlay.querySelector('.btn-cancel').addEventListener('click', close);

                overlay.querySelector('#rechargeConfirm').addEventListener('click', () => {
                    let amount = selected;
                    const customVal = parseFloat(customInput.value);
                    if (customVal > 0) amount = customVal;
                    if (!amount || amount <= 0) {
                        showToast('请输入有效金额', 'error');
                        return;
                    }
                    if (amount > 100000) {
                        showToast('单次充值上限 ¥100,000', 'error');
                        return;
                    }
                    // 执行充值
                    const users = DB.getUsers();
                    const u = users.find(u => u.id === user.id);
                    if (u) {
                        u.balance = parseFloat((u.balance + amount).toFixed(2));
                        DB.setUsers(users);
                        DB.setCurrentUser(u);
                        this.currentUser = u;

                        const txs = DB.getTransactions();
                        txs.push({
                            id: 't' + Date.now(),
                            userId: u.id,
                            type: 'recharge',
                            amount: amount,
                            counterparty: '充值',
                            time: Date.now(),
                            note: `在线充值 ¥${formatMoney(amount)}`,
                            status: 'completed'
                        });
                        DB.setTransactions(txs);
                        showToast(`✅ 充值成功！¥${formatMoney(amount)} 已到账`, 'success');
                        close();
                        this.renderHome();
                        if (this.currentPage === 'profile') this.renderProfile();
                    }
                });

                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) close();
                });
            }
        };

        // ============================================================
        //  启动应用
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => App.init());

        // 暴露给调试
        window.__App = App;
    </script>

</body>
</html>
