<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>万字票云端历史记录</title>
    <!-- 引入Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#111827;color:#fff;padding:15px;}
        .container{max-width:1200px;margin:0 auto;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;}
        .title{font-size:24px;color:#fbbf24;}
        .btn{padding:8px 14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
        .btn-red{background:#dc2626;color:#fff;}
        .btn-green{background:#16a34a;color:#fff;}
        .search-box{margin-bottom:15px;}
        #searchInput{width:100%;padding:12px;border-radius:8px;border:none;background:#273444;color:#fff;}
        .history-list{background:#1f2937;border-radius:12px;padding:15px;max-height:75vh;overflow-y:auto;}
        .history-item{padding:12px;border-bottom:1px solid #374151;margin-bottom:10px;position:relative;}
        .history-item p{font-size:14px;color:#e5e7eb;line-height:1.6;}
        .del-his{position:absolute;right:10px;top:10px;background:#ef4444;border:none;color:#fff;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;}
        .empty-his{text-align:center;padding:40px;color:#9ca3af;}
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 class="title">📜 万字票云端历史记录（Firebase同步）</h1>
        <div>
            <button class="btn btn-green" id="refreshBtn">🔄 刷新记录</button>
            <button class="btn btn-green" id="exportCsvBtn">📥 导出CSV</button>
            <button class="btn btn-red" id="clearAllBtn">🗑️ 清空云端全部</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索：票号/期号/号码/日期...">
    </div>

    <div class="history-list" id="historyList"></div>
</div>

<script>
// 同配置连接同一个数据库
const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
    storageBucket: "create-for-payment.firebasestorage.app",
    messagingSenderId: "505063429802",
    appId: "1:505063429802:web:8ec8cca8c788610bad62d3",
    measurementId: "G-SHP91WNP0H"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ticketRef = db.ref("wanzi_ticket_records");

let allCloudData = [];

// 读取云端全部数据
function loadCloudData(){
    ticketRef.orderByChild("timestamp").once("value",snap=>{
        let data = snap.val();
        allCloudData = [];
        if(data){
            for(let key in data){
                allCloudData.push({
                    ...data[key],
                    firebaseKey:key
                });
            }
        }
        renderHistory();
    });
}

function renderHistory(filteredList=null){
    let list = filteredList || [...allCloudData].reverse();
    let box = document.getElementById("historyList");
    if(list.length===0){
        box.innerHTML = '<div class="empty-his">暂无云端出票记录</div>';
        return;
    }
    let html = "";
    list.forEach(item=>{
        html += `
        <div class="history-item" data-key="${item.firebaseKey}">
            <button class="del-his" onclick="delSingleCloud('${item.firebaseKey}')">删除</button>
            <p><strong>票号：</strong>${item.ticketNo}</p>
            <p><strong>日期：</strong>${item.orderDate}</p>
            <p><strong>期号：</strong>${item.period}</p>
            <p><strong>号码：</strong>${item.playNum}</p>
            <p><strong>金额：</strong>$${item.betMoney}</p>
            <p><strong>玩法：</strong>${item.playType}</p>
            <p><strong>出票时间：</strong>${item.createTime}</p>
        </div>
        `;
    });
    box.innerHTML = html;
}

// 删除单条云端数据
window.delSingleCloud = function(key){
    if(confirm("确定删除该条云端记录？")){
        ticketRef.child(key).remove();
        loadCloudData();
    }
};

// 清空全部云端记录
document.getElementById("clearAllBtn").onclick=()=>{
    if(confirm("警告：确定清空Firebase云端所有记录，无法恢复！")){
        ticketRef.remove();
        loadCloudData();
    }
};

// 搜索
document.getElementById("searchInput").addEventListener("input",e=>{
    let keyword = e.target.value.toLowerCase();
    let filtered = allCloudData.filter(item=>
        item.ticketNo.toLowerCase().includes(keyword) ||
        (item.period||"").toLowerCase().includes(keyword) ||
        (item.playNum||"").toLowerCase().includes(keyword) ||
        (item.orderDate||"").includes(keyword)
    );
    renderHistory(filtered);
});

// 导出CSV
document.getElementById("exportCsvBtn").onclick=()=>{
    if(allCloudData.length===0){alert("无记录可导出");return;}
    let headers = ["票号","日期","期号","号码","金额","玩法","出票时间"];
    let rows = allCloudData.map(item=>[
        item.ticketNo,item.orderDate,item.period||"",item.playNum||"",
        "$"+item.betMoney,item.playType||"",item.createTime||""
    ]);
    let csv = "\uFEFF" + [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    let blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `万字票云端记录_${new Date().toLocaleDateString()}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
};

// 手动刷新
document.getElementById("refreshBtn").onclick=()=>{
    loadCloudData();
    alert("已同步最新云端数据");
};

// 实时监听云端新增数据自动刷新
ticketRef.on("child_added",()=>{
    loadCloudData();
});

// 初始化加载
loadCloudData();
</script>
</body>
</html>
