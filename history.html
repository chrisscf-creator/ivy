<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>云端历史记录</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#111827;color:#fff;padding:15px;}
        .container{max-width:1200px;margin:0 auto;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px;}
        .title{font-size:24px;color:#fbbf24;}
        .btn{padding:8px 14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
        .btn-red{background:#dc2626;color:#fff;}
        .btn-green{background:#16a34a;color:#fff;}
        .search-box{margin-bottom:15px;}
        #searchInput{width:100%;padding:12px;border-radius:8px;border:none;background:#273444;color:#fff;}
        .history-list{background:#1f2937;border-radius:12px;padding:15px;max-height:75vh;overflow-y:auto;}
        .history-item{padding:12px;border-bottom:1px solid #374151;margin-bottom:10px;position:relative;}
        .history-item p{font-size:14px;color:#e5e7eb;line-height:1.6;}
        .del-his{position:absolute;right:10px;top:10px;background:#ef4444;border:none;color:#fff;border-radius:4px;padding:3px 8px;font-size:12px;cursor:pointer;}
        .empty-his{text-align:center;padding:40px;color:#9ca3af;}
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 class="title">📜 云端同步历史记录</h1>
        <div>
            <button class="btn btn-green" id="refreshBtn">🔄 手动刷新</button>
            <button class="btn btn-green" id="exportCsvBtn">📥 导出CSV</button>
            <button class="btn btn-red" id="clearAllBtn">🗑️ 清空云端</button>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索票号/号码/日期/期号">
    </div>
    <div class="history-list" id="historyList"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
    storageBucket: "create-for-payment.firebasestorage.app",
    messagingSenderId: "505063429802",
    appId: "1:505063429802:web:8ec8cca8c788610bad62d3",
    measurementId: "G-SHP91WNP0H"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const ticketRef=db.ref("wanzi_ticket_records");
let cloudData=[];

function loadData(){
    ticketRef.orderByChild("timestamp").once("value",snap=>{
        cloudData=[];
        if(snap.val()){
            for(let k in snap.val()) cloudData.push({...snap.val()[k],key:k});
        }
        render();
    })
}
function render(list=null){
    let arr=list||[...cloudData].reverse();
    let box=historyList;
    if(arr.length===0){box.innerHTML='<div class="empty-his">暂无云端同步记录</div>';return;}
    let html="";
    arr.forEach(v=>{
        html+=`<div class="history-item"><button class="del-his" onclick="delOne('${v.key}')">删除</button>
        <p>票号：${v.ticketNo}</p><p>日期：${v.orderDate}</p><p>期号：${v.period||""}</p>
        <p>号码：${v.playNum||""}</p><p>金额：$${v.betMoney}</p><p>玩法：${v.playType||""}</p>
        <p>时间：${v.createTime}</p></div>`
    });
    box.innerHTML=html;
}
window.delOne=k=>{if(confirm("删除本条云端记录？")){ticketRef.child(k).remove();loadData()}};
clearAllBtn.onclick=()=>{if(confirm("清空全部云端记录？不可恢复！")){ticketRef.remove();loadData()}};
searchInput.oninput=e=>{
    let kw=e.target.value.toLowerCase();
    let f=cloudData.filter(x=>
        x.ticketNo.toLowerCase().includes(kw)||
        (x.playNum||"").includes(kw)||
        (x.orderDate||"").includes(kw)||
        (x.period||"").includes(kw)
    );
    render(f);
};
exportCsvBtn.onclick=()=>{
    if(cloudData.length===0)return alert("无数据");
    let h=["票号","日期","期号","号码","金额","玩法","时间"];
    let r=cloudData.map(x=>[x.ticketNo,x.orderDate,x.period||"",x.playNum||"","$"+x.betMoney,x.playType||"",x.createTime]);
    let csv="\uFEFF"+[h,...r].map(i=>i.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    let b=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="万字票云端记录.csv";a.click();
};
refreshBtn.onclick=loadData;
// 实时监听新增记录 自动刷新
ticketRef.on("child_added",loadData);
ticketRef.on("child_removed",loadData);
loadData();
</script>
</body>
</html>
