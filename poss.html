<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智慧柜台POS · 双语菜单</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #f2ede8; margin: 0; padding: 20px; color: #1e2a2e; }
        .pos-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px 24px 32px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 8px; gap: 12px; }
        h1 { font-size: 1.8rem; margin: 0; display: flex; align-items: center; gap: 10px; }
        h1:before { content: "🧾"; font-size: 2rem; }
        .sub { color: #5f6c70; border-left: 4px solid #ffa500; padding-left: 14px; margin-bottom: 20px; font-size: 0.9rem; }
        .btn-history { background: #4a6a8a; color: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .btn-history:hover { background: #2c4a6a; }
        .lang-switch { display: flex; gap: 8px; background: #f0e2d0; padding: 4px; border-radius: 40px; }
        .lang-btn { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; color: #5f6c70; }
        .lang-btn.active { background: #ffa500; color: #2c2c2c; }
        .category-tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #e0d6cc; padding-bottom: 8px; flex-wrap: wrap; }
        .cat-btn { background: transparent; border: none; padding: 8px 20px; font-size: 1rem; font-weight: 600; border-radius: 40px; cursor: pointer; color: #5f6c70; }
        .cat-btn.active { background: #ffa500; color: #2c2c2c; }
        .pos-grid { display: flex; flex-wrap: wrap; gap: 30px; }
        .menu-panel { flex: 2; min-width: 260px; }
        .cart-panel { flex: 1.2; min-width: 280px; background: #fef9f0; border-radius: 28px; padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .menu-header, .cart-header { font-weight: bold; font-size: 1.4rem; margin-bottom: 16px; border-bottom: 2px solid #ffb347; display: inline-block; padding-right: 12px; }
        .menu-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
        .menu-card { background: white; border-radius: 24px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); border: 1px solid #ffddb0; cursor: pointer; }
        .menu-card:hover { transform: translateY(-3px); border-color: #ffa500; }
        .menu-name { font-weight: bold; font-size: 1rem; }
        .menu-name-en { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .menu-price { color: #e67e22; font-weight: bold; margin-top: 8px; }
        .cart-items { max-height: 380px; overflow-y: auto; margin: 16px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: white; margin-bottom: 10px; padding: 10px 12px; border-radius: 50px; }
        .cart-item-controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty { background: #f0e2d0; border: none; width: 28px; height: 28px; border-radius: 30px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .remove-item { color: #b91c1c; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        .order-row { display: flex; justify-content: space-between; margin: 12px 0; }
        .table-input { display: flex; gap: 12px; align-items: baseline; margin: 20px 0 16px; background: #fff2e2; padding: 12px; border-radius: 60px; }
        #tableNumber { flex: 1; padding: 10px 14px; border-radius: 40px; border: 1px solid #ffcb8e; }
        button { background: #ffa500; border: none; padding: 12px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .btn-submit { width: 100%; background: #2c6e2c; color: white; }
        .clear-cart { background: #cdd4d9; margin-top: 8px; }
        .feedback { margin-top: 12px; font-size: 0.85rem; text-align: center; padding: 6px; border-radius: 100px; background: #e9f5e9; color: #2e7d32; display: none; }
        .error-feedback { background: #ffe6e5; color: #c62828; }
        .footer-credit { text-align: center; margin-top: 24px; font-size: 0.7rem; color: #988f82; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 30px auto; padding: 20px; border-radius: 32px; width: 90%; max-width: 1200px; position: relative; }
        .close { position: absolute; right: 24px; top: 16px; font-size: 28px; cursor: pointer; }
        .order-table { width: 100%; border-collapse: collapse; }
        .order-table th, .order-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .order-table th { background: #ffa50020; }
        .completed-row { background: #e0f0e0; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 32px; text-align: center; width: 90%; max-width: 350px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 40px; }
        .login-box button { width: 100%; background: #ffa500; }
        .login-error { color: #c62828; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 id="loginTitle">🔐 系统登录</h2>
        <input type="password" id="passwordInput" placeholder="请输入密码" autofocus>
        <button id="loginBtn">登 录</button>
        <div id="loginError" class="login-error"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
<div class="pos-container">
    <div class="header-row">
        <h1 id="mainTitle">柜台·点餐终端</h1>
        <div style="display: flex; gap: 12px;">
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="zh">中文</button>
                <button class="lang-btn" data-lang="en">English</button>
            </div>
            <button id="historyBtn" class="btn-history">📊 订单历史 / 导出 Excel</button>
        </div>
    </div>
    <div class="sub" id="subText">实时同步厨房系统 | 分类菜单 · 订单永久保存</div>

    <div class="category-tabs">
        <button class="cat-btn active" data-cat="main">🍜 铜锅</button>
        <button class="cat-btn" data-cat="side">🥗 小菜</button>
        <button class="cat-btn" data-cat="extra">➕ 额外添加</button>
    </div>

    <div class="pos-grid">
        <div class="menu-panel">
            <div class="menu-header" id="currentCategoryTitle">📋 铜锅</div>
            <div class="menu-items" id="menuList"></div>
        </div>
        <div class="cart-panel">
            <div class="cart-header">🛒 当前订单</div>
            <div id="cartItems" class="cart-items"><div style="color:#aa9f93; text-align:center;">暂无菜品，点菜加购</div></div>
            <div class="table-input">
                <label id="tableLabel">🏷️ 桌号 / 外带</label>
                <input type="text" id="tableNumber" placeholder="例: 3 或 外带" value="1">
            </div>
            <div class="order-row">
                <span id="totalLabel">合计金额</span>
                <span id="totalAmount" style="font-weight:bold;">$0.00</span>
            </div>
            <button id="submitOrderBtn" class="btn-submit">📨 下单 → 厨房</button>
            <button id="clearCartBtn" class="clear-cart">🗑️ 清空购物车</button>
            <div id="statusMsg" class="feedback"></div>
        </div>
    </div>
    <div class="footer-credit" id="footerText">✅ 订单永久保存，厨房完成即归档，历史可查</div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modalTitle">📋 全部订单
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="exportExcelBtn" class="export-btn" style="background:#2c6e2c;color:white;">📎 导出 Excel</button>
                <button id="clearAllOrdersBtn" class="clear-all-btn" style="background:#c62828;color:white;">🗑️ 清除所有订单</button>
            </div>
        </h2>
        <div style="overflow-x: auto;">
            <table class="order-table">
                <thead><tr><th id="thOrderId">订单ID</th><th id="thTableNo">桌号</th><th id="thOrderTime">下单时间</th><th id="thItems">菜品明细</th><th id="thTotal">总价($)</th><th id="thStatus">状态</th></tr></thead>
                <tbody id="historyTbody"><tr><td colspan="6">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>
</div>

<script>
const translations = {
    zh: { loginTitle:"🔐 系统登录", loginBtn:"登 录", loginPlaceholder:"请输入密码", loginError:"密码错误，请重试",
        mainTitle:"柜台·点餐终端", historyBtn:"📊 订单历史 / 导出 Excel", subText:"实时同步厨房系统 | 分类菜单 · 订单永久保存",
        cartHeader:"🛒 当前订单", emptyCart:"暂无菜品，点菜加购", tableLabel:"🏷️ 桌号 / 外带", totalLabel:"合计金额",
        submitBtn:"📨 下单 → 厨房", clearCartBtn:"🗑️ 清空购物车", footerText:"✅ 订单永久保存，厨房完成即归档，历史可查",
        modalTitle:"📋 全部订单", exportBtn:"📎 导出 Excel", clearAllBtn:"🗑️ 清除所有订单",
        thOrderId:"订单ID", thTableNo:"桌号", thOrderTime:"下单时间", thItems:"菜品明细", thTotal:"总价($)", thStatus:"状态",
        loadingText:"加载中...", noOrders:"暂无任何订单", statusCompleted:"✅ 已完成", statusPending:"⏳ 制作中",
        takeaway:"外带", unknown:"未知", addSuccess:"➕ 已添加 ", removeSuccess:"🗑️ 已移除菜品",
        cartEmpty:"❌ 购物车为空", orderSuccess:"✅ 订单已发送至厨房", clearCartConfirm:"🧹 购物车已清空",
        clearAllConfirm:"⚠️ 确认删除所有订单吗？", clearAllSuccess:"✅ 所有订单已清除", exportNoOrders:"没有订单可导出",
        sending:"📡 发送中...", catMain:"🍜 铜锅", catSide:"🥗 小菜", catExtra:"➕ 额外添加",
        categoryMain:"📋 铜锅", categorySide:"🥢 小菜", categoryExtra:"✨ 额外添加" },
    en: { loginTitle:"🔐 System Login", loginBtn:"Login", loginPlaceholder:"Enter password", loginError:"Wrong password",
        mainTitle:"Counter POS", historyBtn:"📊 Order History / Export Excel", subText:"Real-time sync | Permanent storage",
        cartHeader:"🛒 Current Order", emptyCart:"No items", tableLabel:"🏷️ Table / Takeaway", totalLabel:"Total",
        submitBtn:"📨 Submit → Kitchen", clearCartBtn:"🗑️ Clear Cart", footerText:"✅ Orders saved permanently",
        modalTitle:"📋 All Orders", exportBtn:"📎 Export Excel", clearAllBtn:"🗑️ Clear All",
        thOrderId:"Order ID", thTableNo:"Table", thOrderTime:"Time", thItems:"Items", thTotal:"Total($)", thStatus:"Status",
        loadingText:"Loading...", noOrders:"No orders", statusCompleted:"✅ Completed", statusPending:"⏳ Preparing",
        takeaway:"Takeaway", unknown:"Unknown", addSuccess:"➕ Added ", removeSuccess:"🗑️ Removed",
        cartEmpty:"❌ Cart empty", orderSuccess:"✅ Order sent", clearCartConfirm:"🧹 Cart cleared",
        clearAllConfirm:"⚠️ Delete all orders?", clearAllSuccess:"✅ All cleared", exportNoOrders:"No orders to export",
        sending:"📡 Sending...", catMain:"🍜 Copper Pot", catSide:"🥗 Sides", catExtra:"➕ Add-ons",
        categoryMain:"📋 Copper Pot", categorySide:"🥢 Sides", categoryExtra:"✨ Add-ons" }
};

let currentLang = 'zh';
const LOGIN_PASSWORD = "123456";

const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
    storageBucket: "create-for-payment.firebasestorage.app",
    messagingSenderId: "505063429802",
    appId: "1:505063429802:web:8ec8cca8c788610bad62d3"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const ordersRef = database.ref('orders');

const MENU_BY_CATEGORY = {
    main: [
        { id:1, name_zh:"🍜 麻酱鸡肉", name_en:"🍜 Sesame Chicken", price:8.90 },
        { id:2, name_zh:"🍚 水果酸汤鱼片", name_en:"🍚 Fruit Sour Fish", price:8.90 },
        { id:3, name_zh:"🍛 甘榜鸡丝", name_en:"🍛 Kampong Chicken", price:8.90 },
        { id:4, name_zh:"🍝 香港甜汁", name_en:"🍝 HK Sweet Broth", price:8.90 },
        { id:5, name_zh:"🥘 番茄肥牛", name_en:"🥘 Tomato Beef", price:9.90 },
        { id:6, name_zh:"🥘 生豉牛肉", name_en:"🥘 Scalded Beef", price:9.90 },
        { id:7, name_zh:"🥘 招牌肉糜", name_en:"🥘 Minced Meat", price:6.90 },
        { id:8, name_zh:"🥘 海鲜姜汁", name_en:"🥘 Seafood Ginger", price:7.90 }
    ],
    side: [
        { id:9, name_zh:"🥟 台湾香肠", name_en:"🥟 Taiwan Sausage", price:2.90 },
        { id:10, name_zh:"🥗 盐酥杏鲍菇", name_en:"🥗 Crispy Mushroom", price:2.90 },
        { id:11, name_zh:"🍗 鱼肉丸", name_en:"🍗 Fish Ball", price:2.00 },
        { id:12, name_zh:"🍠 牛肉丸", name_en:"🍠 Beef Ball", price:2.90 },
        { id:13, name_zh:"🥒 小酥肉", name_en:"🥒 Crispy Pork", price:2.00 }
    ],
    extra: [
        { id:14, name_zh:"🥤 杨梅汁", name_en:"🥤 Bayberry Juice", price:2.90 },
        { id:15, name_zh:"🥤 玫瑰爆珠木瓜水", name_en:"🥤 Rose Popping Boba", price:2.90 },
        { id:16, name_zh:"🍰 马踏樱花", name_en:"🍰 Sakura Pudding", price:3.50 },
        { id:17, name_zh:"🧀 北海道黑糖布丁", name_en:"🧀 Hokkaido Pudding", price:3.50 },
        { id:18, name_zh:"🍦 玫瑰鲜花饼", name_en:"🍦 Rose Pastry", price:1.90 },
        { id:19, name_zh:"🥚 鹌鹑蛋", name_en:"🥚 Quail Eggs", price:1.00 }
    ]
};

let currentCategory = "main";
let cart = [];
let menuContainer, cartContainer, totalSpan, tableInput, submitBtn, clearCartBtn, statusDiv, categoryTitle, catBtns;
let historyBtn, modal, closeModal, exportExcelBtn, clearAllOrdersBtn, historyTbody;
let timeoutId;

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function showStatus(msg, isError) { if(!statusDiv) return; statusDiv.innerText = msg; statusDiv.style.display = 'block'; statusDiv.className = 'feedback' + (isError ? ' error-feedback' : ''); if(timeoutId) clearTimeout(timeoutId); timeoutId = setTimeout(() => statusDiv.style.display = 'none', 3000); }
function getItemName(item) { return currentLang === 'zh' ? item.name_zh : item.name_en; }

function renderMenu() {
    const items = MENU_BY_CATEGORY[currentCategory];
    menuContainer.innerHTML = '';
    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'menu-card';
        card.innerHTML = `<div class="menu-name">${escapeHtml(getItemName(item))}</div>${currentLang === 'zh' ? `<div class="menu-name-en">${escapeHtml(item.name_en)}</div>` : ''}<div class="menu-price">$${item.price.toFixed(2)}</div>`;
        card.onclick = () => addToCart(item);
        menuContainer.appendChild(card);
    });
    categoryTitle.innerText = currentLang === 'zh' ? 
        (currentCategory === 'main' ? '📋 铜锅' : currentCategory === 'side' ? '🥢 小菜' : '✨ 额外添加') :
        (currentCategory === 'main' ? '📋 Copper Pot' : currentCategory === 'side' ? '🥢 Sides' : '✨ Add-ons');
}

function switchCategory(cat) { currentCategory = cat; renderMenu(); catBtns.forEach(btn => { if(btn.dataset.cat === cat) btn.classList.add('active'); else btn.classList.remove('active'); }); }

function addToCart(item) {
    const existing = cart.find(i => i.id === item.id);
    if(existing) existing.qty++;
    else cart.push({ ...item, qty: 1 });
    renderCart();
    showStatus(translations[currentLang].addSuccess + getItemName(item), false);
}

function updateQty(id, delta) {
    const idx = cart.findIndex(i => i.id === id);
    if(idx !== -1) {
        const newQty = cart[idx].qty + delta;
        if(newQty <= 0) cart.splice(idx, 1);
        else cart[idx].qty = newQty;
        renderCart();
    }
}

function removeItem(id) { cart = cart.filter(i => i.id !== id); renderCart(); showStatus(translations[currentLang].removeSuccess, false); }
function calcTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }

function renderCart() {
    if(!cartContainer) return;
    if(cart.length === 0) { cartContainer.innerHTML = `<div style="color:#aa9f93; text-align:center;">${translations[currentLang].emptyCart}</div>`; totalSpan.innerText = '$0.00'; return; }
    let html = '';
    cart.forEach(item => {
        html += `<div class="cart-item"><div><div class="cart-item-name">${escapeHtml(getItemName(item))}</div><div class="cart-item-price">$${item.price.toFixed(2)}</div></div><div class="cart-item-controls"><button class="btn-qty" data-id="${item.id}" data-delta="-1">−</button><span class="cart-qty">${item.qty}</span><button class="btn-qty" data-id="${item.id}" data-delta="1">+</button><button class="remove-item" data-id="${item.id}">✕</button></div></div>`;
    });
    cartContainer.innerHTML = html;
    totalSpan.innerText = `$${calcTotal().toFixed(2)}`;
    document.querySelectorAll('.btn-qty').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); updateQty(parseInt(btn.dataset.id), parseInt(btn.dataset.delta)); });
    document.querySelectorAll('.remove-item').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); removeItem(parseInt(btn.dataset.id)); });
}

function clearCart() { if(cart.length === 0) return; cart = []; renderCart(); showStatus(translations[currentLang].clearCartConfirm, false); }

async function submitOrder() {
    if(cart.length === 0) { showStatus(translations[currentLang].cartEmpty, true); return; }
    let tableNo = tableInput.value.trim() || translations[currentLang].takeaway;
    const orderData = { table: tableNo, items: cart.map(i => ({ name: getItemName(i), qty: i.qty, price: i.price })), total: calcTotal(), time: new Date().toISOString(), completed: false };
    submitBtn.disabled = true; submitBtn.style.opacity = '0.6';
    const originalText = submitBtn.innerText;
    submitBtn.innerText = translations[currentLang].sending;
    try {
        await ordersRef.push(orderData);
        showStatus(`${translations[currentLang].orderSuccess} 桌号: ${tableNo} $${calcTotal().toFixed(2)}`, false);
        cart = []; renderCart();
    } catch(err) { showStatus(`❌ ${err.message}`, true); }
    finally { submitBtn.disabled = false; submitBtn.style.opacity = '1'; submitBtn.innerText = originalText; }
}

async function fetchAllOrders() {
    const snapshot = await ordersRef.once('value');
    const orders = snapshot.val();
    if(!orders) return [];
    return Object.entries(orders).map(([id, data]) => ({ id, ...data })).sort((a,b) => new Date(b.time) - new Date(a.time));
}

async function renderHistory() {
    historyTbody.innerHTML = `<tr><td colspan="6">${translations[currentLang].loadingText}</td></tr>`;
    try {
        const orders = await fetchAllOrders();
        if(orders.length === 0) { historyTbody.innerHTML = `<tr><td colspan="6">${translations[currentLang].noOrders}</td></tr>`; return; }
        let html = '';
        orders.forEach(o => {
            const itemsStr = o.items?.map(i => `${i.name} x${i.qty}`).join('; ') || '';
            html += `<tr class="${o.completed ? 'completed-row' : ''}"><td>${escapeHtml(o.id)}</td><td>${escapeHtml(o.table || translations[currentLang].takeaway)}</td><td>${new Date(o.time).toLocaleString()}</td><td>${escapeHtml(itemsStr)}</td><td>${o.total?.toFixed(2) || '0.00'}</td><td>${o.completed ? translations[currentLang].statusCompleted : translations[currentLang].statusPending}</td></tr>`;
        });
        historyTbody.innerHTML = html;
    } catch(err) { historyTbody.innerHTML = `<tr><td colspan="6">${translations[currentLang].loadFailed || '加载失败'}</td></tr>`; }
}

async function exportToExcel() {
    const orders = await fetchAllOrders();
    if(orders.length === 0) { alert(translations[currentLang].exportNoOrders); return; }
    const headers = [translations[currentLang].thOrderId, translations[currentLang].thTableNo, translations[currentLang].thOrderTime, translations[currentLang].thItems, translations[currentLang].thTotal, translations[currentLang].thStatus];
    const rows = orders.map(o => [o.id, o.table || translations[currentLang].takeaway, new Date(o.time).toLocaleString(), o.items?.map(i => `${i.name} x${i.qty}`).join('; ') || '', o.total?.toFixed(2) || '0.00', o.completed ? translations[currentLang].statusDone : translations[currentLang].statusMaking]);
    const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `orders_${new Date().toISOString().slice(0,19)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
}

async function clearAllOrders() { if(!confirm(translations[currentLang].clearAllConfirm)) return; await ordersRef.remove(); alert(translations[currentLang].clearAllSuccess); if(modal.style.display === 'block') await renderHistory(); }

function updateUI() {
    const t = translations[currentLang];

    // 登录区
    document.getElementById('loginTitle').innerText = t.loginTitle;
    document.getElementById('loginBtn').innerText = t.loginBtn;
    document.getElementById('passwordInput').placeholder = t.loginPlaceholder;

    // 主界面
    document.getElementById('mainTitle').innerText = t.mainTitle;
    document.getElementById('historyBtn').innerText = t.historyBtn;
    document.getElementById('subText').innerText = t.subText;

    document.getElementById('tableLabel').innerText = t.tableLabel;
    document.getElementById('totalLabel').innerText = t.totalLabel;

    document.getElementById('submitOrderBtn').innerText = t.submitBtn;
    document.getElementById('clearCartBtn').innerText = t.clearCartBtn;

    document.getElementById('footerText').innerText = t.footerText;

    // modal
    document.getElementById('modalTitle').childNodes[0].nodeValue = t.modalTitle;
    document.getElementById('exportExcelBtn').innerText = t.exportBtn;
    document.getElementById('clearAllOrdersBtn').innerText = t.clearAllBtn;

    document.getElementById('thOrderId').innerText = t.thOrderId;
    document.getElementById('thTableNo').innerText = t.thTableNo;
    document.getElementById('thOrderTime').innerText = t.thOrderTime;
    document.getElementById('thItems').innerText = t.thItems;
    document.getElementById('thTotal').innerText = t.thTotal;
    document.getElementById('thStatus').innerText = t.thStatus;

    // 分类按钮
    const catBtns = document.querySelectorAll('.cat-btn');
    catBtns[0].innerHTML = t.catMain;
    catBtns[1].innerHTML = t.catSide;
    catBtns[2].innerHTML = t.catExtra;

    // 语言按钮状态
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });

    renderMenu();
    renderCart();
}

function initPOS() {
    menuContainer = document.getElementById('menuList');
    cartContainer = document.getElementById('cartItems');
    totalSpan = document.getElementById('totalAmount');
    tableInput = document.getElementById('tableNumber');
    submitBtn = document.getElementById('submitOrderBtn');
    clearCartBtn = document.getElementById('clearCartBtn');
    statusDiv = document.getElementById('statusMsg');
    categoryTitle = document.getElementById('currentCategoryTitle');
    catBtns = document.querySelectorAll('.cat-btn');
    historyBtn = document.getElementById('historyBtn');
    modal = document.getElementById('historyModal');
    closeModal = document.querySelector('.close');
    exportExcelBtn = document.getElementById('exportExcelBtn');
    clearAllOrdersBtn = document.getElementById('clearAllOrdersBtn');
    historyTbody = document.getElementById('historyTbody');
    
    catBtns.forEach(btn => btn.onclick = () => switchCategory(btn.dataset.cat));
    submitBtn.onclick = submitOrder;
    clearCartBtn.onclick = clearCart;
    historyBtn.onclick = () => { modal.style.display = 'block'; renderHistory(); };
    closeModal.onclick = () => modal.style.display = 'none';
    exportExcelBtn.onclick = exportToExcel;
    clearAllOrdersBtn.onclick = clearAllOrders;
    window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.onclick = () => { currentLang = btn.dataset.lang; updateUI(); };
    });
    
    renderMenu();
    renderCart();
}

// 登录逻辑
const loginOverlay = document.getElementById('loginOverlay');
const mainContent = document.getElementById('mainContent');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');

function doLogin() {
    if(passwordInput.value.trim() === LOGIN_PASSWORD) {
        loginOverlay.style.display = 'none';
        mainContent.style.display = 'block';
        initPOS();
    } else {
        loginError.innerText = translations[currentLang].loginError;
        passwordInput.value = '';
    }
}

loginBtn.onclick = doLogin;
passwordInput.onkeypress = (e) => { if(e.key === 'Enter') doLogin(); };
updateUI();
</script>
