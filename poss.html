<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kitchen Printer</title>

<script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js"></script>

<style>
body{
    font-family:Arial;
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.status{
    background:#333;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.order{
    background:#444;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>
<body>

<h1>🖨 Kitchen Printer</h1>

<div class="status" id="status">
Waiting Orders...
</div>

<div id="orders"></div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
 authDomain: "create-for-payment.firebaseapp.com",
 databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
 projectId: "create-for-payment",
 storageBucket: "create-for-payment.firebasestorage.app",
 messagingSenderId: "505063429802",
 appId: "1:505063429802:web:8ec8cca8c788610bad62d3"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const ordersRef = db.ref("orders");

let printedOrders =
JSON.parse(
localStorage.getItem("printedOrders") || "[]"
);

function printOrder(order){

    let itemsText = "";

    if(order.items){

        order.items.forEach(item=>{

            itemsText +=
            item.name +
            " x" +
            item.qty +
            "<br>";

        });

    }

    let receipt = `
    <html>
    <head>
    <title>Print</title>
    <style>

    body{
        width:58mm;
        font-family:monospace;
        font-size:14px;
    }

    .center{
        text-align:center;
    }

    </style>
    </head>

    <body>

    <div class="center">

    <h2>KITCHEN</h2>

    </div>

    --------------------------------<br>

    Order :
    #${order.orderNumber || "-"}<br>

    Table :
    ${order.table || "-"}<br>

    --------------------------------<br>

    ${itemsText}

    --------------------------------<br>

    Total :
    $${Number(order.total || 0).toFixed(2)}
    <br>

    Payment :
    ${order.paymentMethod || "Cash"}
    <br>

    --------------------------------<br>

    ${new Date().toLocaleString()}
    <br><br><br>

    </body>
    </html>
    `;

    let win = window.open("","","width=300,height=600");

    win.document.write(receipt);

    win.document.close();

    setTimeout(()=>{

        win.print();

        win.close();

    },500);
}

function addOrderCard(order){

    const div = document.createElement("div");

    div.className = "order";

    div.innerHTML = `
    <h3>
    Order #${order.orderNumber}
    </h3>

    Table :
    ${order.table}
    `;

    document
    .getElementById("orders")
    .prepend(div);
}

ordersRef.on("child_added",(snap)=>{

    const order = snap.val();

    const id = snap.key;

    if(
      printedOrders.includes(id)
    ){
        return;
    }

    printedOrders.push(id);

    localStorage.setItem(
      "printedOrders",
      JSON.stringify(printedOrders)
    );

    document
    .getElementById("status")
    .innerHTML =
    "🆕 New Order #" +
    order.orderNumber;

    addOrderCard(order);

    printOrder(order);

});

</script>

</body>
</html>
