        loadingText:"加载中...", noOrderText:"暂无任何订单", loadFailText:"加载失败",
        statToday:"今日销售额", statYest:"昨日销售额",
        statusPending:"制作中", statusDone:"已完成",
        thOrderNo:"订单号", thOrderId:"订单ID", thTable:"桌号", thTime:"下单时间", thItems:"菜品", thTotal:"总价($)", thStatus:"状态", thPay:"支付方式",
        confirmClear:"确定删除全部订单？无法恢复！", clearOk:"订单已清空，计数器重置",
        confirmReset:"重置订单号？下一单从#1开始", resetOk:"计数器重置为0",
        cartEmptyErr:"购物车为空，请先点菜", sendSuccess:"订单#", sendTail:" 已发送厨房，桌号：", totalTail:" 总价$",
        sendFail:"下单失败：", permErr:"数据库权限不足", urlErr:"数据库地址配置错误"
    }
};
let currentLang = "zh";

// 中英文菜单名称（打印自动切纯英文无表情）
const menuNameList = {
    en: {
        1:"Sesame Chicken",2:"Fruit Sour Fish",3:"Kampong Chicken Shreds",4:"HK Sweet Broth",
        5:"Tomato Beef",6:"Scalded Beef",7:"Signature Minced Meat",8:"Seafood Ginger Broth",
        9:"Taiwan Sausage",10:"Crispy Mushroom",11:"Fish Ball",12:"Beef Ball",13:"Crispy Pork",
        14:"Bayberry Juice",15:"Rose Boba Drink",16:"Sakura Pudding",17:"Hokkaido Brown Sugar Pudding",18:"Rose Pastry",19:"Quail Eggs"
    },
    zh: {
        1:"麻酱鸡肉",2:"水果酸汤鱼片",3:"甘榜鸡丝",4:"香港甜汁",
        5:"番茄肥牛",6:"生豉牛肉",7:"招牌肉糜",8:"海鲜姜汁",
        9:"台湾香肠",10:"盐酥杏鲍菇",11:"鱼肉丸",12:"牛肉丸",13:"小酥肉",
        14:"杨梅汁",15:"玫瑰爆珠木瓜水",16:"马踏樱花布丁",17:"北海道黑糖布丁",18:"玫瑰鲜花饼",19:"鹌鹑蛋"
    }
};

// 菜单基础价格
const menuBase = {
    main:[{id:1,price:8.9},{id:2,price:8.9},{id:3,price:8.9},{id:4,price:8.9},{id:5,price:9.9},{id:6,price:9.9},{id:7,price:6.9},{id:8,price:7.9}],
    side:[{id:9,price:2.9},{id:10,price:2.9},{id:11,price:2.0},{id:12,price:2.9},{id:13,price:2.0}],
    extra:[{id:14,price:2.9},{id:15,price:2.9},{id:16,price:3.5},{id:17,price:3.5},{id:18,price:1.9},{id:19,price:1.0}]
};

// ========== 2. 蓝牙打印完整修复模块（不会消失） ==========
let btDevice, btServer, btTxChar;
// 双通用打印机UUID，兼容POS5810DD
const UUID_SERVICE_STD = "0000ffe0-0000-1000-8000-00805f9b34fb";
const UUID_TX_STD = "0000ffe1-0000-1000-8000-00805f9b34fb";
const UUID_SERVICE_ALT = 0xff00;
const UUID_TX_ALT = 0xff01;
const btBtn = document.getElementById("bluetoothBtn");
const btDot = document.getElementById("btDot");
const btText = document.getElementById("btText");

// 更新蓝牙状态文字/颜色
function refreshBtStatus(isConnect, langKey){
    btDevice = isConnect ? btDevice : null;
    btDot.classList.toggle("on", isConnect);
    btBtn.classList.toggle("connected", isConnect);
    btText.textContent = langPack[currentLang][langKey];
}

// 连接打印机
async function connectPrinter(){
    if(!navigator.bluetooth){
        showError(langPack[currentLang].btNoSupport);
        return;
    }
    try{
        const dev = await navigator.bluetooth.requestDevice({
            acceptAllDevices:true,
            optionalServices:[UUID_SERVICE_STD, UUID_SERVICE_ALT]
        });
        btDevice = dev;
        dev.addEventListener("gattserverdisconnected",()=>{
            refreshBtStatus(false,"btDisconnect");
            showError(langPack[currentLang].btDisconnect);
        });
        const server = await dev.gatt.connect();
        btServer = server;
        let service, char;
        // 优先标准通道
        try{
            service = await server.getPrimaryService(UUID_SERVICE_STD);
            char = await service.getCharacteristic(UUID_TX_STD);
        }catch{
            service = await server.getPrimaryService(UUID_SERVICE_ALT);
            char = await service.getCharacteristic(UUID_TX_ALT);
        }
        btTxChar = char;
        refreshBtStatus(true,"btConnected");
        showSuccess(langPack[currentLang].btConnected);
    }catch(err){
        console.log("BT Error:",err);
        refreshBtStatus(false,"btDisconnect");
        if(err.name === "NotFoundError") showError(langPack[currentLang].btNoDevice);
        else showError(langPack[currentLang].btFail);
    }
}

// 分包稳定写入打印数据
async function writePrintBuffer(buffer){
    if(!btTxChar || !btDevice?.gatt?.connected) throw new Error("No Printer Connect");
    const chunk = 64;
    for(let i=0;i<buffer.length;i+=chunk){
        const piece = buffer.slice(i,i+chunk);
        await btTxChar.writeValueWithoutResponse(piece);
        await new Promise(res=>setTimeout(res,18));
    }
}

// 构建**纯英文无表情小票**（解决乱码核心）
function buildReceiptBuffer(orderNum, tableName, itemList, totalAmt, payWay, timeStr){
    const encoder = new TextEncoder();
    const cmdList = [];
    // 打印机初始化
    cmdList.push(new Uint8Array([0x1B,0x40]));
    // 居中放大标题
    cmdList.push(new Uint8Array([0x1B,0x61,0x01]));
    cmdList.push(new Uint8Array([0x1D,0x21,0x11]));
    cmdList.push(encoder.encode(`ORDER RECEIPT #${orderNum}\n`));
    cmdList.push(new Uint8Array([0x1D,0x21,0x00]));
    cmdList.push(new Uint8Array([0x1B,0x61,0x00]));
    cmdList.push(encoder.encode("--------------------------------\n"));
    cmdList.push(encoder.encode(`Table: ${tableName}\n`));
    cmdList.push(encoder.encode(`Time: ${timeStr}\n`));
    cmdList.push(encoder.encode(`Payment: ${payWay}\n`));
    cmdList.push(encoder.encode("--------------------------------\n"));

    // 菜品强制纯净英文名称，过滤所有特殊符号/表情
    itemList.forEach(item=>{
        let enName = "";
        const matchId = Object.keys(menuNameList.zh).find(k=>menuNameList.zh[k] === item.name);
        if(matchId) enName = menuNameList.en[matchId];
        else enName = item.name.replace(/[^\x20-\x7E]/g,"");
        const line = `${enName.padEnd(24)} x${item.qty} $${item.price.toFixed(2)}\n`;
        cmdList.push(encoder.encode(line));
    });

    cmdList.push(encoder.encode("--------------------------------\n"));
    // 总价放大加粗
    cmdList.push(new Uint8Array([0x1D,0x21,0x10]));
    cmdList.push(encoder.encode(`GRAND TOTAL: $${totalAmt.toFixed(2)}\n`));
    cmdList.push(new Uint8Array([0x1D,0x21,0x00]));
    cmdList.push(encoder.encode("================================\n\n\n\n"));
    // 切纸走纸
    cmdList.push(new Uint8Array([0x1B,0x64,0x04]));

    // 合并全部字节
    let totalByte = 0;
    cmdList.forEach(b=>totalByte += b.length);
    const fullBuf = new Uint8Array(totalByte);
    let offset = 0;
    cmdList.forEach(b=>{
        fullBuf.set(b,offset);
        offset += b.length;
    });
    return fullBuf;
}

// 对外打印调用函数
async function printReceipt(orderNo, table, items, total, pay){
    if(!btTxChar || !btDevice?.gatt?.connected){
        showError(langPack[currentLang].btDisconnect + " — Skip Print");
        return;
    }
    try{
        showSuccess(langPack[currentLang].btPrinting);
        const now = new Date().toLocaleString();
        const buf = buildReceiptBuffer(orderNo, table, items, total, pay, now);
        await writePrintBuffer(buf);
        showSuccess(langPack[currentLang].btPrintDone);
    }catch(e){
        console.log("Print Fail:",e);
        showError("Print Error: "+e.message);
    }
}

// ========== 3. 页面语言刷新（中英文菜单切换生效） ==========
function refreshAllText(){
    document.querySelectorAll("[data-lang]").forEach(el=>{
        const key = el.getAttribute("data-lang");
        if(langPack[currentLang][key]){
            if(el.tagName === "INPUT") el.placeholder = langPack[currentLang][key];
            else el.textContent = langPack[currentLang][key];
        }
    });
    // 刷新分类标题
    const cat = currentCategory;
    if(cat === "main") document.getElementById("categoryTitle").textContent = langPack[currentLang].titleMain;
    else if(cat === "side") document.getElementById("categoryTitle").textContent = langPack[currentLang].titleSide;
    else document.getElementById("categoryTitle").textContent = langPack[currentLang].titleExtra;
    // 刷新蓝牙按钮文字
    btBtn.querySelector("span").textContent = langPack[currentLang].btConnect;
    btText.textContent = btDevice ? langPack[currentLang].btConnected : langPack[currentLang].btDisconnect;
    // 刷新支付下拉文字
    const paySel = document.getElementById("paymentMethod");
    for(let opt of paySel.options){
        const lk = opt.dataset.lang;
        if(lk) opt.textContent = langPack[currentLang][lk];
    }
    renderMenu(); // 重绘菜单（切换中英文菜名）
    renderCart();
    if(historyModal.style.display === "block") renderHistoryTable();
    document.getElementById("langToggle").textContent = currentLang === "zh" ? "English" : "中文";
}

// 切换语言按钮事件
function toggleLanguage(){
    currentLang = currentLang === "zh" ? "en" : "zh";
    refreshAllText();
}

// ========== 4. 菜单、购物车、订单核心逻辑 ==========

let cartArr = [];
const loginPass = "123456";

const fbConfig = {

    authDomain: "create-for-payment.firebaseapp.com",

const db = firebase.database();

// 状态提示封装
function showSuccess(msg){
    const sBox = document.getElementById("statusSuccess");
    const eBox = document.getElementById("statusError");
    eBox.style.display = "none";
    sBox.textContent = msg;
    sBox.style.display = "block";
    setTimeout(()=>sBox.style.display="none",3000);
}
function showError(msg){
    const sBox = document.getElementById("statusSuccess");
    const eBox = document.getElementById("statusError");
    sBox.style.display = "none";
    eBox.textContent = msg;
    eBox.style.display = "block";
    setTimeout(()=>eBox.style.display="none",3000);
}

// 获取当前语言菜名
function getMenuName(itemId){
    return menuNameList[currentLang][itemId] || "Item "+itemId;
}

// 渲染菜单列表
function renderMenu(){
    const box = document.getElementById("menuBox");
    box.innerHTML = "";
    const list = menuBase[currentCategory].map(i=>({...i, name:getMenuName(i.id)}));
    list.forEach(item=>{
        const card = document.createElement("div");
        card.className = "menu-card";
        card.innerHTML = `<div class="menu-name">${item.name}</div><div class="menu-price">$${item.price.toFixed(2)}</div>`;
        card.onclick = ()=>addItemToCart(item);
        box.appendChild(card);
    });
}

// 切换菜品分类
function switchCategory(cat){
    currentCategory = cat;
    renderMenu();
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.cat === cat));
}

// 购物车增删数量
function addItemToCart(item){
    const exist = cartArr.find(x=>x.id === item.id);
    if(exist) exist.qty++;
    else cartArr.push({...item, qty:1});
    renderCart();
}
function changeQty(id, delta){
    const idx = cartArr.findIndex(x=>x.id === id);
    if(idx === -1) return;
    const newQ = cartArr[idx].qty + delta;
    if(newQ <= 0) cartArr.splice(idx,1);
    else cartArr[idx].qty = newQ;
    renderCart();
}
function deleteCartItem(id){
    cartArr = cartArr.filter(x=>x.id !== id);
    renderCart();
}

// 计算总价
function calcTotal(){
    return cartArr.reduce((sum, item)=>sum + (item.price * item.qty), 0);
}

// 渲染购物车界面
function renderCart(){
    const cartBox = document.getElementById("cartBox");
    const totalDom = document.getElementById("totalPrice");
    if(cartArr.length === 0){
        cartBox.innerHTML = `<div style="text-align:center; color:#888;" data-lang="emptyCart">${langPack[currentLang].emptyCart}</div>`;
        totalDom.textContent = "$0.00";
        return;
    }
    let html = "";
    cartArr.forEach(it=>{
        html += `
        <div class="cart-item">
            <div>
                <div>${it.name}</div>
                <div style="font-size:13px; color:#92400e;">$${it.price.toFixed(2)}</div>
            </div>
            <div class="qty-buttons">
                <button class="qty-btn" data-id="${it.id}" data-delta="-1">−</button>
                <span>${it.qty}</span>
                <button class="qty-btn" data-id="${it.id}" data-delta="1">+</button>
                <button class="del-btn" data-id="${it.id}">✕</button>
            </div>
        </div>`;
    });
    cartBox.innerHTML = html;
    totalDom.textContent = "$"+calcTotal().toFixed(2);
    // 绑定按钮点击
    document.querySelectorAll(".qty-btn").forEach(btn=>{
        btn.onclick = ()=>changeQty(Number(btn.dataset.id), Number(btn.dataset.delta));
    });
    document.querySelectorAll(".del-btn").forEach(btn=>{
        btn.onclick = ()=>deleteCartItem(Number(btn.dataset.id));
    });
}

// 获取下一个订单编号
async function getNextOrderNum(){
    const snap = await counterRef.transaction(val=>(val||0)+1);
    return snap.snapshot.val();
}

// 更新顶部最后一单显示
function updateLastOrderDisplay(num, table){
    document.getElementById("lastOrderNum").textContent = num ? "#"+num : "—";
    document.getElementById("lastTableNum").textContent = table || "—";
}

// 提交下单主逻辑
async function submitOrder(){
    if(cartArr.length === 0){
        showError(langPack[currentLang].cartEmptyErr);
        return;
    }
    let tableVal = document.getElementById("tableNumber").value.trim();
    if(!tableVal) tableVal = "Takeaway";
    const payWay = document.getElementById("paymentMethod").value;
    // 存数据库用中文菜名
    const saveItems = cartArr.map(it=>({
        name: menuNameList.zh[it.id],
        qty: it.qty,
        price: it.price
    }));
    const orderData = {
        table: tableVal,
        items: saveItems,
        total: calcTotal(),
        time: new Date().toISOString(),
        completed: false,
        paymentMethod: payWay
    };
    const submitBtn = document.getElementById("submitOrder");
    submitBtn.disabled = true;
    try{
        const orderNum = await getNextOrderNum();
        orderData.orderNumber = orderNum;
        await orderRef.push(orderData);
        // 自动打印英文小票
        await printReceipt(orderNum, tableVal, saveItems, calcTotal(), payWay);
        showSuccess(langPack[currentLang].sendSuccess + orderNum + langPack[currentLang].sendTail + tableVal + langPack[currentLang].totalTail + calcTotal().toFixed(2));
        updateLastOrderDisplay(orderNum, tableVal);
        cartArr = [];
        renderCart();
    }catch(err){
        let errMsg = err.message;
        if(errMsg.includes("PERMISSION_DENIED")) errMsg = langPack[currentLang].permErr;
        else if(errMsg.includes("databaseURL")) errMsg = langPack[currentLang].urlErr;
        showError(langPack[currentLang].sendFail + errMsg);
    }finally{
        submitBtn.disabled = false;
    }
}

// 清空购物车
function clearWholeCart(){
    cartArr = [];
    renderCart();
}

// ========== 5. 历史订单、导出、重置功能 ==========
const historyModal = document.getElementById("historyModal");
async function loadAllOrders(){
    const snap = await orderRef.once("value");
    const raw = snap.val() || {};
    const list = Object.entries(raw).map(([id,data])=>({id,...data}));
    list.sort((a,b)=>new Date(b.time)-new Date(a.time));
    return list;
}
function calcSalesTotal(orderList){
    const today = new Date().toISOString().split("T")[0];
    const yest = new Date(Date.now()-86400000).toISOString().split("T")[0];
    let todaySum=0, yestSum=0;
    orderList.forEach(o=>{
        if(!o.time) return;
        const day = o.time.split("T")[0];
        if(day === today) todaySum += o.total||0;
        else if(day === yest) yestSum += o.total||0;
    });
    return {todaySum, yestSum};
}
async function renderHistoryTable(){
    const tbody = document.getElementById("orderTableBody");
    tbody.innerHTML = `<tr><td colspan="8">${langPack[currentLang].loadingText}</td></tr>`;
    const thead = document.getElementById("tableHead");
    thead.innerHTML = `
    <tr>
        <th>${langPack[currentLang].thOrderNo}</th>
        <th>${langPack[currentLang].thOrderId}</th>
        <th>${langPack[currentLang].thTable}</th>
        <th>${langPack[currentLang].thTime}</th>
        <th>${langPack[currentLang].thItems}</th>
        <th>${langPack[currentLang].thTotal}</th>
        <th>${langPack[currentLang].thStatus}</th>
        <th>${langPack[currentLang].thPay}</th>
    </tr>`;
    try{
        const orders = await loadAllOrders();
        // 销售额统计
        const {todaySum,yestSum} = calcSalesTotal(orders);
        document.getElementById("statContainer").innerHTML = `
        <div class="stat-item">
            <div class="stat-label">${langPack[currentLang].statToday}</div>
            <div class="stat-value">$${todaySum.toFixed(2)}</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">${langPack[currentLang].statYest}</div>
            <div class="stat-value">$${yestSum.toFixed(2)}</div>
        </div>`;
        if(orders.length === 0){
            tbody.innerHTML = `<tr><td colspan="8">${langPack[currentLang].noOrderText}</td></tr>`;
            return;
        }
        let html = "";
        orders.forEach(o=>{
            const num = o.orderNumber ? "#"+o.orderNumber : "—";
            const itemStr = o.items.map(i=>`${i.name} x${i.qty}`).join(" | ");
            const timeStr = o.time ? new Date(o.time).toLocaleString() : "";
            const statusTxt = o.completed ? langPack[currentLang].statusDone : langPack[currentLang].statusPending;
            const payTxt = o.paymentMethod || "—";
            const rowClass = o.completed ? "completed-tr" : "";
            html += `
            <tr class="${rowClass}">
                <td>${num}</td>
                <td>${o.id}</td>
                <td>${o.table}</td>
                <td>${timeStr}</td>
                <td>${itemStr}</td>
                <td>$${(o.total||0).toFixed(2)}</td>
                <td>${statusTxt}</td>
                <td>${payTxt}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }catch(e){
        tbody.innerHTML = `<tr><td colspan="8">${langPack[currentLang].loadFailText}</td></tr>`;
    }
}
function openHistoryModal(){
    historyModal.style.display = "block";
    renderHistoryTable();
}
function closeHistoryModal(){
    historyModal.style.display = "none";
}
// 导出CSV表格
async function exportCSV(){
    const orders = await loadAllOrders();
    if(orders.length === 0){
        alert(langPack[currentLang].noOrderText);
        return;
    }
    const header = [
        langPack[currentLang].thOrderNo,langPack[currentLang].thOrderId,langPack[currentLang].thTable,
        langPack[currentLang].thTime,langPack[currentLang].thItems,langPack[currentLang].thTotal,
        langPack[currentLang].thStatus,langPack[currentLang].thPay
    ];
    const rows = orders.map(o=>[
        o.orderNumber ? "#"+o.orderNumber : "",
        o.id,
        o.table,
        o.time ? new Date(o.time).toLocaleString() : "",
        o.items.map(i=>`${i.name} x${i.qty}`).join(";"),
        (o.total||0).toFixed(2),
        o.completed ? langPack[currentLang].statusDone : langPack[currentLang].statusPending,
        o.paymentMethod || ""
    ]);
    const csvText = [header,...rows].map(r=>r.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csvText], {type:"text/csv;charset=utf-8"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `OrderRecord_${new Date().toISOString().split("T")[0]}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
}
// 清空全部订单
async function clearAllOrderData(){
    if(!confirm(langPack[currentLang].confirmClear)) return;
    const inputPwd = prompt(langPack[currentLang].loginTitle);
    if(inputPwd !== loginPass){
        alert("Password Wrong");
        return;
    }
    try{
        await orderRef.remove();
        await counterRef.remove();
        alert(langPack[currentLang].clearOk);
        renderHistoryTable();
    }catch(e){
        alert(langPack[currentLang].sendFail + e.message);
    }
}
// 重置订单计数器
async function resetOrderCounter(){
    if(!confirm(langPack[currentLang].confirmReset)) return;
    try{
        await counterRef.set(0);
        alert(langPack[currentLang].resetOk);
    }catch(e){
        alert(langPack[currentLang].sendFail + e.message);
    }
}

function initApp(){
    // 按钮绑定事件
    document.getElementById("bluetoothBtn").onclick = connectPrinter;
    document.getElementById("langToggle").onclick = toggleLanguage;
    document.querySelectorAll(".tab-btn").forEach(btn=>btn.onclick=()=>switchCategory(btn.dataset.cat));

    document.getElementById("clearCart").onclick = clearWholeCart;
    document.getElementById("historyBtn").onclick = openHistoryModal;
    document.getElementById("closeModal").onclick = closeHistoryModal;
    document.getElementById("exportCSV").onclick = exportCSV;
    document.getElementById("clearAllOrders").onclick = clearAllOrderData;
    document.getElementById("resetCounter").onclick = resetOrderCounter;
