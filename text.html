<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万字票 - 写票系统</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        /* ... (样式保持不变) ... */
    </style>
</head>
<body>
    <!-- ... (HTML结构保持不变) ... -->

    <script>
        // ... (Firebase配置、密码配置、全局变量保持不变) ...

        // ============================================
        // 8. 数字键盘 (修复重复点击问题)
        // ============================================
        function setupNumberPad() {
            const buttons = document.querySelectorAll('.num-btn:not(.add-btn)');
            buttons.forEach(btn => {
                // 使用 click 事件，但添加防抖
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // 防止重复点击
                    if (this.dataset.processing === 'true') return;
                    this.dataset.processing = 'true';
                    
                    const value = this.dataset.num;
                    handleNumberInput(value);
                    
                    setTimeout(() => {
                        this.dataset.processing = 'false';
                    }, 300);
                });
                
                btn.addEventListener('touchstart', function(e) {
                    // 防止双击缩放
                }, { passive: true });
            });

            document.addEventListener('keydown', function(e) {
                if (!isLoggedIn) return;
                if (e.target.tagName === 'INPUT') return;
                
                if (e.key >= '0' && e.key <= '9') {
                    handleNumberInput(e.key);
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    handleNumberInput('clear');
                } else if (e.key === 'Enter') {
                    // 防止回车键重复提交
                    if (document.getElementById('addNumberBtn').disabled === false) {
                        addNumberToList();
                    }
                }
            });
        }

        // ============================================
        // 9. 投注列表管理 (修复重复添加)
        // ============================================
        function addNumberToList() {
            // 防止重复调用
            if (addNumberToList._processing) {
                console.log('添加操作正在处理中，请稍候...');
                return;
            }
            addNumberToList._processing = true;

            try {
                if (currentInput.length !== MAX_DIGITS) {
                    showStatus(`请输入完整的 ${MAX_DIGITS} 位号码!`, 'error');
                    addNumberToList._processing = false;
                    return;
                }

                // 检查是否已存在
                if (betList.some(item => item.number === currentInput)) {
                    showStatus(`号码 ${currentInput} 已存在!`, 'error');
                    addNumberToList._processing = false;
                    return;
                }

                const defaultAmount = parseInt(document.getElementById('defaultAmount').value) || 0;
                if (defaultAmount <= 0) {
                    showStatus('请输入有效的整数注码!', 'error');
                    addNumberToList._processing = false;
                    return;
                }

                // 再次检查避免并发问题
                if (betList.some(item => item.number === currentInput)) {
                    showStatus(`号码 ${currentInput} 已存在!`, 'error');
                    addNumberToList._processing = false;
                    return;
                }

                const numberToAdd = currentInput;
                betList.push({
                    number: numberToAdd,
                    amount: defaultAmount
                });
                
                currentInput = '';
                renderBetList();
                updateDisplay();
                updateAddButton();
                updateSummary();
                showStatus(`✅ 已添加: ${numberToAdd} (S ${defaultAmount})`, 'success');
                
            } catch (error) {
                console.error('添加号码失败:', error);
                showStatus('添加号码失败，请重试', 'error');
            } finally {
                // 延迟重置处理状态
                setTimeout(() => {
                    addNumberToList._processing = false;
                }, 500);
            }
        }

        // ============================================
        // 11. 随机生成功能 (修复重复添加)
        // ============================================
        function generateRandomNumber() {
            // 防止快速重复点击
            if (generateRandomNumber._processing) {
                console.log('随机生成正在处理中...');
                return;
            }
            generateRandomNumber._processing = true;

            try {
                let num = '';
                for (let i = 0; i < MAX_DIGITS; i++) {
                    num += Math.floor(Math.random() * 10);
                }
                currentInput = num;
                updateDisplay();
                updateAddButton();
                
                // 延迟调用添加，避免与点击事件冲突
                setTimeout(() => {
                    addNumberToList();
                    generateRandomNumber._processing = false;
                }, 200);
            } catch (error) {
                console.error('随机生成失败:', error);
                generateRandomNumber._processing = false;
            }
        }

        // ============================================
        // 快速添加随机 (修复重复)
        // ============================================
        function quickAddRandom() {
            if (quickAddRandom._processing) {
                console.log('快速添加正在处理中...');
                return;
            }
            quickAddRandom._processing = true;

            try {
                const defaultAmount = parseInt(document.getElementById('defaultAmount').value) || 1;
                if (defaultAmount <= 0) {
                    showStatus('请先设置有效的默认注码!', 'error');
                    quickAddRandom._processing = false;
                    return;
                }
                
                let added = 0;
                let attempts = 0;
                const maxAttempts = 200;
                const targetCount = 5;
                
                while (added < targetCount && attempts < maxAttempts) {
                    attempts++;
                    let num = '';
                    for (let i = 0; i < MAX_DIGITS; i++) {
                        num += Math.floor(Math.random() * 10);
                    }
                    if (!betList.some(item => item.number === num)) {
                        betList.push({
                            number: num,
                            amount: defaultAmount
                        });
                        added++;
                    }
                }
                
                renderBetList();
                updateSummary();
                showStatus(`✅ 已添加 ${added} 组随机投注 (S ${defaultAmount})`, 'success');
            } catch (error) {
                console.error('快速添加失败:', error);
                showStatus('快速添加失败，请重试', 'error');
            } finally {
                quickAddRandom._processing = false;
            }
        }

        // ... (其余代码保持不变) ...
    </script>
</body>
</html>
