<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万字票 - 写票系统</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            transition: all 0.3s;
        }
        body.fullscreen {
            padding: 0;
        }
        body.fullscreen .container {
            border-radius: 0;
            max-width: 100%;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        /* ===== 登录页面 ===== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.5s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-box {
            background: white;
            border-radius: 25px;
            padding: 40px 35px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .login-box h1 {
            color: #1a1a2e;
            text-align: center;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .login-box .logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 15px;
        }
        .login-box .form-group {
            margin-bottom: 20px;
        }
        .login-box .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .login-box .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .login-box .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }
        .login-box .btn-login:active {
            transform: scale(0.97);
        }
        .login-box .error-msg {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .login-box .error-msg.show {
            display: block;
        }
        .login-box .footer {
            text-align: center;
            margin-top: 18px;
            color: #aaa;
            font-size: 12px;
        }

        /* ===== 主容器 ===== */
        .container {
            background: white;
            border-radius: 25px;
            padding: 30px 25px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* ===== 顶部工具栏 ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        .toolbar .title-area h1 {
            color: #1a1a2e;
            font-size: 22px;
            margin: 0;
        }
        .toolbar .title-area .subtitle {
            color: #888;
            font-size: 12px;
            margin: 0;
        }
        .toolbar .toolbar-buttons {
            display: flex;
            gap: 8px;
        }
        .toolbar .toolbar-buttons .btn-icon {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar .toolbar-buttons .btn-icon:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }
        .toolbar .toolbar-buttons .btn-icon:active {
            transform: scale(0.92);
        }
        .toolbar .toolbar-buttons .btn-icon.logout-btn {
            background: #ff6b6b;
            color: white;
        }
        .toolbar .toolbar-buttons .btn-icon.logout-btn:hover {
            background: #ee5a24;
        }

        /* ===== 号码显示区域 ===== */
        .number-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
        }
        .number-section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .number-section-title span {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        .number-section-title .counter {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* ===== 号码列表 ===== */
        .number-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 50px;
            padding: 5px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .number-item {
            background: white;
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 2px solid #e8e8e8;
            transition: all 0.2s;
            animation: chipIn 0.3s ease;
        }
        .number-item:hover {
            border-color: #667eea;
        }
        @keyframes chipIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .number-item .num-display {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #1a1a2e;
            min-width: 70px;
            letter-spacing: 3px;
        }
        .number-item .amount-input {
            flex: 1;
            min-width: 70px;
            padding: 6px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.3s;
            width: 90px;
            -moz-appearance: textfield;
        }
        .number-item .amount-input::-webkit-outer-spin-button,
        .number-item .amount-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .number-item .amount-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .number-item .amount-label {
            font-size: 13px;
            color: #888;
            font-weight: 600;
        }
        .number-item .remove-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            flex-shrink: 0;
        }
        .number-item .remove-btn:hover {
            background: #ee5a24;
            transform: scale(1.1);
        }
        .number-item .remove-btn:active {
            transform: scale(0.9);
        }
        .empty-numbers {
            color: #aaa;
            font-size: 14px;
            text-align: center;
            padding: 15px 0;
        }

        /* ===== 号码显示 (当前输入) ===== */
        .number-display {
            background: white;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            margin-bottom: 12px;
            border: 3px dashed #e0e0e0;
            transition: all 0.3s;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .number-display.has-number {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        .number-display .number-text {
            font-size: 38px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #1a1a2e;
            letter-spacing: 6px;
        }
        .number-display .placeholder {
            color: #aaa;
            font-size: 16px;
        }
        .number-display .hint {
            font-size: 12px;
            color: #999;
            margin-left: 10px;
        }

        /* ===== 数字键盘 ===== */
        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 10px 0 12px 0;
        }
        .num-btn {
            padding: 14px 0;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            color: #1a1a2e;
            user-select: none;
            touch-action: manipulation;
        }
        .num-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        .num-btn:active {
            transform: scale(0.92);
            background: #d0d0d0;
        }
        .num-btn.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .num-btn.clear-btn {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .num-btn.clear-btn:hover {
            background: #ee5a24;
        }
        .num-btn.clear-btn:active {
            background: #c0392b;
        }
        .num-btn.add-btn {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
            grid-column: span 2;
        }
        .num-btn.add-btn:hover {
            background: #45a049;
        }
        .num-btn.add-btn:active {
            background: #3d8b40;
        }
        .num-btn.add-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 控制按钮 ===== */
        .action-row {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px 0;
        }
        .action-row .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-row .btn:active {
            transform: scale(0.95);
        }
        .btn-random {
            background: #ffd93d;
            color: #1a1a2e;
        }
        .btn-random:hover {
            background: #f5c800;
        }
        .btn-clear-all {
            background: #ff6b6b;
            color: white;
        }
        .btn-clear-all:hover {
            background: #ee5a24;
        }
        .btn-quick-add {
            background: #4CAF50;
            color: white;
        }
        .btn-quick-add:hover {
            background: #45a049;
        }
        .btn-set-all {
            background: #667eea;
            color: white;
        }
        .btn-set-all:hover {
            background: #5a6fd6;
        }

        /* ===== 注码快捷按钮 ===== */
        .amount-shortcuts {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .amount-shortcuts .btn-amount {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            color: #333;
            flex: 1;
            min-width: 40px;
        }
        .amount-shortcuts .btn-amount:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .amount-shortcuts .btn-amount:active {
            transform: scale(0.95);
        }
        .amount-shortcuts .btn-amount.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* ===== 表单 ===== */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }
        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ===== 投注汇总 ===== */
        .bet-summary {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 15px;
            margin: 10px 0 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #e0e0e0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .bet-summary .info {
            color: #555;
            font-size: 14px;
        }
        .bet-summary .info strong {
            color: #1a1a2e;
        }
        .bet-summary .total {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
        }

        /* ===== 提交按钮 ===== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
            touch-action: manipulation;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 蓝牙按钮 ===== */
        .btn-bluetooth {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            touch-action: manipulation;
        }
        .btn-bluetooth:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        .btn-bluetooth:active {
            transform: scale(0.97);
        }
        .btn-bluetooth.connected {
            background: #4CAF50;
        }
        .btn-bluetooth .bluetooth-icon {
            font-size: 20px;
        }
        .btn-bluetooth .status-text {
            font-size: 13px;
            font-weight: normal;
        }
        .btn-bluetooth .bt-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        .btn-bluetooth.loading .bt-spinner {
            display: inline-block;
        }
        .btn-bluetooth.loading .bt-text {
            display: none;
        }

        /* ===== 状态消息 ===== */
        #statusMessage {
            margin-top: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        #statusMessage.show {
            display: block;
        }
        #statusMessage.success {
            background: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
        }
        #statusMessage.error {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
            color: #721c24;
        }
        #statusMessage.info {
            background: #d1ecf1;
            border-left: 5px solid #17a2b8;
            color: #0c5460;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 打印预览 ===== */
        .print-preview {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre;
            overflow-x: auto;
            display: none;
            border: 1px solid #ddd;
            max-height: 300px;
            overflow-y: auto;
        }
        .print-preview.show {
            display: block;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 11px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .container {
                padding: 15px 12px;
            }
            .number-display .number-text {
                font-size: 30px;
                letter-spacing: 4px;
            }
            .num-btn {
                padding: 12px 0;
                font-size: 17px;
            }
            .action-row {
                flex-wrap: wrap;
            }
            .action-row .btn {
                font-size: 12px;
                padding: 10px;
                min-width: 45%;
            }
            .login-box {
                padding: 30px 20px;
                margin: 15px;
            }
            .toolbar .title-area h1 {
                font-size: 18px;
            }
            .btn-submit {
                font-size: 17px;
                padding: 14px;
            }
            .number-item {
                flex-wrap: wrap;
                gap: 8px;
            }
            .number-item .amount-input {
                min-width: 60px;
                width: 70px;
            }
            .bet-summary {
                flex-direction: column;
                text-align: center;
            }
            .amount-shortcuts .btn-amount {
                font-size: 12px;
                padding: 6px 10px;
                min-width: 30px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 580px;
            }
            .number-display .number-text {
                font-size: 44px;
                letter-spacing: 8px;
            }
        }

        /* ===== 滚动条美化 ===== */
        .number-list::-webkit-scrollbar {
            width: 4px;
        }
        .number-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }
        .number-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- ===== 登录页面 ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="logo">🎯</div>
            <h1>万字票系统</h1>
            <p class="subtitle">4D 投注管理 · 独立注码</p>
            <div class="form-group">
                <label>🔐 请输入密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码登录" autocomplete="current-password">
            </div>
            <button class="btn-login" onclick="handleLogin()">登录</button>
            <div class="error-msg" id="loginError">❌ 密码错误，请重试</div>
            <div class="footer">
                <small>默认密码: admin123</small>
            </div>
        </div>
    </div>

    <!-- ===== 主应用 ===== -->
    <div class="container" id="mainApp" style="display:none;">
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="title-area">
                <h1>🎯 万字票</h1>
                <div class="subtitle">每组独立注码 · 整数投注</div>
            </div>
            <div class="toolbar-buttons">
                <button class="btn-icon" onclick="toggleFullscreen()" title="全屏切换">
                    ⛶
                </button>
                <button class="btn-icon logout-btn" onclick="handleLogout()" title="退出登录">
                    🚪
                </button>
            </div>
        </div>

        <!-- 蓝牙连接按钮 -->
        <button id="bluetoothBtn" class="btn-bluetooth" onclick="connectBluetooth()">
            <span class="bluetooth-icon">🔵</span>
            <span class="bt-text">连接蓝牙打印机</span>
            <span class="status-text" id="btStatus">未连接</span>
            <span class="bt-spinner"></span>
        </button>

        <!-- 已选择的号码列表 -->
        <div class="number-section">
            <div class="number-section-title">
                <span>📋 投注列表</span>
                <span class="counter" id="numberCounter">0 组</span>
            </div>
            <div class="number-list" id="numberList">
                <div class="empty-numbers">还没有添加投注</div>
            </div>
        </div>

        <!-- 当前输入的号码 -->

        // ============================================
        // 4. 登录功能
        // ============================================
        function handleLogin() {
            const passwordInput = document.getElementById('loginPassword');

        // ============================================
        // 6. 初始化
        // ============================================
        function initApp() {
            document.getElementById('drawDate').value = today;
            document.getElementById('defaultAmount').value = '1';
            setupNumberPad();
            updateDisplay();
            updateSummary();
            checkBluetoothSupport();
            highlightActiveAmount();

        function checkBluetoothSupport() {
            if (!navigator.bluetooth) {
                const btn = document.getElementById('bluetoothBtn');
                btn.style.display = 'none';

        // ============================================
        // 7. 注码快捷按钮
        // ============================================
        function setDefaultAmount(value) {
            document.getElementById('defaultAmount').value = value;
            highlightActiveAmount();
            showStatus(`默认注码已设为 RM ${value}`, 'info');
        }

        function highlightActiveAmount() {
            const current = parseInt(document.getElementById('defaultAmount').value) || 0;
            document.querySelectorAll('.btn-amount').forEach(btn => {
                btn.classList.remove('active');
                const btnValue = parseInt(btn.textContent.replace('RM ', ''));
                if (btnValue === current) {
                    btn.classList.add('active');
                }
            });
        }

        // 监听默认注码变化
        document.getElementById('defaultAmount').addEventListener('input', function() {
            highlightActiveAmount();
        });

        // ============================================
        // 8. 数字键盘
        // ============================================
        function setupNumberPad() {
            const buttons = document.querySelectorAll('.num-btn:not(.add-btn)');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const value = this.dataset.num;
                    handleNumberInput(value);
                });
                btn.addEventListener('touchstart', function(e) {
                    // 防止双击缩放
                }, { passive: true });
            });

            document.addEventListener('keydown', function(e) {
                if (!isLoggedIn) return;
                if (e.target.tagName === 'INPUT') return;
                
                if (e.key >= '0' && e.key <= '9') {
                    handleNumberInput(e.key);
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    handleNumberInput('clear');
                } else if (e.key === 'Enter') {
                    addNumberToList();
                }
            });
        }

        function handleNumberInput(value) {
            if (value === 'clear') {
                currentInput = currentInput.slice(0, -1);
            } else {
                if (currentInput.length < MAX_DIGITS) {
                    currentInput += value;
                }
            }
            updateDisplay();
            updateAddButton();
        }

        function updateAddButton() {
            const btn = document.getElementById('addNumberBtn');
            if (currentInput.length === MAX_DIGITS) {
                btn.disabled = false;
                btn.textContent = '➕ 添加';
            } else {
                btn.disabled = true;
                btn.textContent = `➖ 还需 ${MAX_DIGITS - currentInput.length} 位`;
            }
        }

        function updateDisplay() {
            const display = document.getElementById('numberDisplay');

            if (currentInput.length === 0) {
                display.innerHTML = '<span class="placeholder">输入号码后点击「+ 添加」</span>';
                display.classList.remove('has-number');
                return;
            }

            let formatted = currentInput.split('').join(' ');
            const remaining = MAX_DIGITS - currentInput.length;
            let hint = '';
            if (remaining > 0) {
                hint = `<span class="hint">(还需 ${remaining} 位)</span>`;
            }
            display.innerHTML = `<span class="number-text">${formatted}</span> ${hint}`;
            display.classList.add('has-number');

            document.querySelectorAll('.num-btn:not(.add-btn)').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.num === 'clear') return;
                if (currentInput.length > 0 && btn.dataset.num === currentInput[currentInput.length - 1]) {
                    btn.classList.add('selected');
                }
            });
        }

        function clearCurrentNumber() {
            currentInput = '';
            updateDisplay();
            updateAddButton();
        }

        // ============================================
        // 9. 投注列表管理 (整数注码)
        // ============================================
        function addNumberToList() {
            if (currentInput.length !== MAX_DIGITS) {
                showStatus(`请输入完整的 ${MAX_DIGITS} 位号码!`, 'error');
                return;
            }

            if (betList.some(item => item.number === currentInput)) {
                showStatus(`号码 ${currentInput} 已存在!`, 'error');
                return;
            }

            const defaultAmount = parseInt(document.getElementById('defaultAmount').value) || 0;
            if (defaultAmount <= 0) {
                showStatus('请输入有效的整数注码!', 'error');
                return;
            }

            betList.push({
                number: currentInput,
                amount: defaultAmount
            });
            
            currentInput = '';
            renderBetList();
            updateDisplay();
            updateAddButton();
            updateSummary();
            showStatus(`✅ 已添加: ${betList[betList.length - 1].number} (RM ${defaultAmount})`, 'success');
        }

        function removeBet(index) {
            const removed = betList[index];
            betList.splice(index, 1);
            renderBetList();
            updateSummary();
            showStatus(`已移除: ${removed.number}`, 'info');
        }

        function updateBetAmount(index, newAmount) {
            const amount = parseInt(newAmount);
            if (!isNaN(amount) && amount >= 0) {
                betList[index].amount = amount;
                updateSummary();
            }
        }

        function renderBetList() {
            const container = document.getElementById('numberList');
            const counter = document.getElementById('numberCounter');
            
            counter.textContent = `${betList.length} 组`;

            if (betList.length === 0) {
                container.innerHTML = '<div class="empty-numbers">还没有添加投注</div>';
                return;
            }

            let html = '';
            betList.forEach((item, index) => {
                html += `
                    <div class="number-item">
                        <span class="num-display">${item.number}</span>
                        <span class="amount-label">RM</span>
                        <input class="amount-input" type="number" 
                               value="${item.amount}" 
                               step="1" min="0"
                               onchange="updateBetAmount(${index}, this.value)"
                               onfocus="this.select()">
                        <button class="remove-btn" onclick="removeBet(${index})">✕</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            container.scrollTop = container.scrollHeight;
        }

        function clearAllNumbers() {
            if (betList.length === 0) return;
            if (confirm('确定要清空所有投注吗？')) {
                betList = [];
                renderBetList();
                updateSummary();
                showStatus('已清空所有投注', 'info');
            }
        }

        // ============================================
        // 10. 统一设置注码 (整数)
        // ============================================
        function setAllAmounts() {
            if (betList.length === 0) {
                showStatus('没有投注可以设置', 'error');
                return;
            }
            
            const newAmount = prompt('请输入统一注码金额 (RM):', '1');
            if (newAmount === null) return;
            
            const amount = parseInt(newAmount);
            if (isNaN(amount) || amount <= 0) {
                showStatus('请输入有效的整数金额!', 'error');
                return;
            }
            
            betList.forEach(item => {
                item.amount = amount;
            });
            
            renderBetList();
            updateSummary();
            showStatus(`✅ 所有注码已统一为 RM ${amount}`, 'success');
        }

        // ============================================
        // 11. 随机生成功能
        // ============================================
        function generateRandomNumber() {
            let num = '';
            for (let i = 0; i < MAX_DIGITS; i++) {
                num += Math.floor(Math.random() * 10);
            }
            currentInput = num;
            updateDisplay();
            updateAddButton();
            addNumberToList();
        }

        function quickAddRandom() {
            const defaultAmount = parseInt(document.getElementById('defaultAmount').value) || 1;
            if (defaultAmount <= 0) {
                showStatus('请先设置有效的默认注码!', 'error');
                return;
            }
            
            let added = 0;
            let attempts = 0;
            const maxAttempts = 200;
            const targetCount = 5;
            
            while (added < targetCount && attempts < maxAttempts) {
                attempts++;
                let num = '';
                for (let i = 0; i < MAX_DIGITS; i++) {
                    num += Math.floor(Math.random() * 10);
                }
                if (!betList.some(item => item.number === num)) {
                    betList.push({
                        number: num,
                        amount: defaultAmount
                    });
                    added++;
                }
            }
            
            renderBetList();
            updateSummary();
            showStatus(`✅ 已添加 ${added} 组随机投注 (RM ${defaultAmount})`, 'success');
        }

        // ============================================
        // 12. 投注汇总 (整数)
        // ============================================
        function updateSummary() {
            const total = betList.reduce((sum, item) => sum + (item.amount || 0), 0);
            document.getElementById('totalGroups').textContent = betList.length;
            document.getElementById('totalAmount').textContent = `RM ${total}`;
        }

        // ============================================
        // 13. 蓝牙打印机
        // ============================================
        async function connectBluetooth() {
            const btn = document.getElementById('bluetoothBtn');
            const statusText = document.getElementById('btStatus');

            if (isConnecting) return;

            if (isConnected) {
                try {
                    if (bluetoothDevice && bluetoothDevice.gatt) {
                        await bluetoothDevice.gatt.disconnect();
                    }
                } catch (e) {
                    console.log('Disconnect error:', e);
                }
                isConnected = false;
                bluetoothDevice = null;
                bluetoothServer = null;
                bluetoothCharacteristic = null;
                btn.classList.remove('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🔵';
                statusText.textContent = '未连接';
                showStatus('蓝牙已断开', 'info');
                return;
            }

            try {
                isConnecting = true;
                btn.classList.add('loading');
                btn.querySelector('.bluetooth-icon').textContent = '⏳';
                statusText.textContent = '搜索中...';
                showStatus('正在搜索蓝牙设备...', 'info');

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb',
                        '00001801-0000-1000-8000-00805f9b34fb',
                        '00001800-0000-1000-8000-00805f9b34fb'
                    ]
                });

                statusText.textContent = '连接中...';
                showStatus(`正在连接 ${bluetoothDevice.name || '设备'}...`, 'info');

                bluetoothServer = await bluetoothDevice.gatt.connect();
                
                let services = await bluetoothServer.getPrimaryServices();
                
                if (services.length === 0) {
                    const serviceUUIDs = [
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb',
                        '00001801-0000-1000-8000-00805f9b34fb'
                    ];
                    for (let uuid of serviceUUIDs) {
                        try {
                            let service = await bluetoothServer.getPrimaryService(uuid);
                            if (service) {
                                services = [service];
                                break;
                            }
                        } catch (e) {}
                    }
                }

                if (services.length === 0) {
                    throw new Error('无法找到打印机服务');
                }

                bluetoothService = services[0];
                
                let characteristics = await bluetoothService.getCharacteristics();
                let writeChar = null;
                
                for (let char of characteristics) {
                    let properties = char.properties;
                    if (properties.write || properties.writeWithoutResponse) {
                        writeChar = char;
                        break;
                    }
                }

                if (!writeChar) {
                    const writeUUIDs = [
                        '00002a19-0000-1000-8000-00805f9b34fb',
                        '00002a00-0000-1000-8000-00805f9b34fb',
                        '00002a01-0000-1000-8000-00805f9b34fb'
                    ];
                    for (let uuid of writeUUIDs) {
                        try {
                            let char = await bluetoothService.getCharacteristic(uuid);
                            if (char) {
                                writeChar = char;
                                break;
                            }
                        } catch (e) {}
                    }
                }

                if (!writeChar) {
                    throw new Error('找不到可写的打印机特征');
                }

                bluetoothCharacteristic = writeChar;
                isConnected = true;

                btn.classList.add('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🟢';
                statusText.textContent = '已连接';
                showStatus(`✅ 已连接到 ${bluetoothDevice.name || '打印机'}`, 'success');

                await testPrint();

            } catch (error) {
                console.error('蓝牙连接错误:', error);
                let errorMsg = error.message;
                if (errorMsg.includes('user cancelled')) {
                    errorMsg = '用户取消选择';
                } else if (errorMsg.includes('No devices found')) {
                    errorMsg = '未找到设备';
                }
                showStatus('❌ 蓝牙连接失败: ' + errorMsg, 'error');
                isConnected = false;
                btn.classList.remove('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🔵';
                statusText.textContent = '未连接';
            } finally {
                isConnecting = false;
            }
        }

        // ============================================
        // 14. 打印功能
        // ============================================
        async function printTickets(ticketsData) {
            if (!isConnected || !bluetoothCharacteristic) {
                showStatus('⚠️ 请先连接蓝牙打印机', 'error');
                return false;
            }

            try {
                const lines = [];
                lines.push('========================');
                lines.push('    万字票 4D 投注单');
                lines.push('========================');
                lines.push(`日期: ${ticketsData[0].date}`);
                lines.push(`时间: ${new Date().toLocaleTimeString()}`);
                lines.push('------------------------');
                lines.push(`共 ${ticketsData.length} 组投注`);
                lines.push('');

                ticketsData.forEach((ticket, index) => {
                    lines.push(`  ${String(index + 1).padStart(2)}. ${ticket.number}  RM ${ticket.amount}`);
                });

                const totalAmount = ticketsData.reduce((sum, t) => sum + t.amount, 0);
                lines.push('');
                lines.push('------------------------');
                lines.push(`合计: RM ${totalAmount}`);
                lines.push('========================');
                lines.push('  祝您 幸运中奖! 🍀');
                lines.push('\n\n\n\n');

                const printContent = lines.join('\n');
                const commands = buildESCCommands(printContent);
                
                const chunkSize = 20;
                for (let i = 0; i < commands.length; i += chunkSize) {
                    const chunk = commands.slice(i, i + chunkSize);
                    await bluetoothCharacteristic.writeValue(chunk);
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                
                showStatus('🖨️ 打印已发送', 'success');
                return true;

            } catch (error) {
                console.error('打印错误:', error);
                showStatus('❌ 打印失败: ' + error.message, 'error');
                return false;
            }
        }

        function buildESCCommands(text) {
            const commands = [];
            commands.push(new Uint8Array([0x1B, 0x40]));
            commands.push(new Uint8Array([0x1B, 0x21, 0x00]));
            commands.push(new Uint8Array([0x1B, 0x61, 0x01]));
            commands.push(new TextEncoder().encode(text));
            commands.push(new Uint8Array([0x1D, 0x56, 0x00]));
            
            let totalLength = 0;
            for (let cmd of commands) {
                totalLength += cmd.length;
            }
            
            const result = new Uint8Array(totalLength);
            let offset = 0;
            for (let cmd of commands) {
                result.set(cmd, offset);
                offset += cmd.length;
            }
            return result;
        }

        async function testPrint() {
            try {
                const testContent = '========================\n  打印机连接成功! ✅\n  状态: 就绪\n========================\n\n\n';
                const commands = buildESCCommands(testContent);
                const chunkSize = 20;
                for (let i = 0; i < commands.length; i += chunkSize) {
                    const chunk = commands.slice(i, i + chunkSize);
                    await bluetoothCharacteristic.writeValue(chunk);
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                showStatus('✅ 打印机测试成功', 'success');
            } catch (e) {
                console.log('测试打印失败:', e);
            }
        }

        // ============================================
        // 15. 提交投注 (整数注码)
        // ============================================
        async function submitTickets() {
            const date = document.getElementById('drawDate').value;

            if (!date) {
                showStatus('请选择开奖日期!', 'error');
                return;
            }
            if (betList.length === 0) {
                showStatus('请至少添加一组投注!', 'error');
                return;
            }

            for (let item of betList) {
                if (!item.amount || item.amount <= 0) {
                    showStatus(`号码 ${item.number} 的注码无效!`, 'error');
                    return;
                }
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 提交中...';
            showStatus(`正在提交 ${betList.length} 组投注到 Firebase...`, 'info');

            try {
                const ticketsData = [];
                const timestamp = firebase.database.ServerValue.TIMESTAMP;
                const groupId = Date.now().toString();

                for (let item of betList) {
                    const ticketData = {
                        number: item.number,
                        amount: item.amount,
                        date: date,
                        timestamp: timestamp,
                        status: 'active',
                        group_id: groupId
                    };
                    ticketsData.push(ticketData);
                }

                const updates = {};
                ticketsData.forEach((ticket) => {
                    const ref = database.ref('tickets').push();
                    updates[ref.key] = ticket;
                });

                await database.ref('tickets').update(updates);

                const totalAmount = ticketsData.reduce((sum, t) => sum + t.amount, 0);
                showStatus(`✅ 成功提交 ${betList.length} 组投注，总额 RM ${totalAmount}`, 'success');

                showPrintPreview(ticketsData);

                if (isConnected) {
                    await printTickets(ticketsData);
                } else {
                    showStatus(`✅ 投注已保存 (未连接打印机)`, 'success');
                }

                betList = [];
                renderBetList();
                updateSummary();
                currentInput = '';
                updateDisplay();
                updateAddButton();

            } catch (error) {
                console.error('保存失败:', error);
                showStatus(`❌ 保存失败: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📝 提交全部投注';
            }
        }

        // ============================================
        // 16. 打印预览
        // ============================================
        function showPrintPreview(ticketsData) {
            const preview = document.getElementById('printPreview');
            const lines = [];
            lines.push('========================');
            lines.push('    4D Number');
            lines.push('========================');
            lines.push(`Date: ${ticketsData[0].date}`);
            lines.push(`Time: ${new Date().toLocaleTimeString()}`);
            lines.push('------------------------');
            lines.push(`Total ${ticketsData.length} Betting`);
            lines.push('');

            ticketsData.forEach((ticket, index) => {
                lines.push(`  ${String(index + 1).padStart(2)}. ${ticket.number}  RM ${ticket.amount}`);
            });

            const totalAmount = ticketsData.reduce((sum, t) => sum + t.amount, 0);
            lines.push('');
            lines.push('------------------------');
            lines.push(`Total: S ${totalAmount}`);
            lines.push('========================');
            lines.push('  Goodluck');

            preview.textContent = lines.join('\n');
            preview.classList.add('show');

            clearTimeout(preview._hideTimer);
            preview._hideTimer = setTimeout(() => {
                preview.classList.remove('show');
            }, 10000);
        }

        // ============================================
        // 17. 状态显示
        // ============================================
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = 'show ' + type;
            
            clearTimeout(statusDiv._hideTimer);
            if (type !== 'error') {
                statusDiv._hideTimer = setTimeout(() => {
                    statusDiv.className = '';
                }, 5000);
            }
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginPassword').focus();
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });
        });
    </script>
</body>
</html>
