<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万字票 - 写票系统</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            transition: all 0.3s;
        }
        body.fullscreen {
            padding: 0;
        }
        body.fullscreen .container {
            border-radius: 0;
            max-width: 100%;
            height: 100vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        /* ===== 登录页面 ===== */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.5s ease;
        }
        .login-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .login-box {
            background: white;
            border-radius: 25px;
            padding: 40px 35px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .login-box h1 {
            color: #1a1a2e;
            text-align: center;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .login-box .logo {
            text-align: center;
            font-size: 60px;
            margin-bottom: 15px;
        }
        .login-box .form-group {
            margin-bottom: 20px;
        }
        .login-box .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .login-box .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .login-box .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .login-box .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }
        .login-box .btn-login:active {
            transform: scale(0.97);
        }
        .login-box .error-msg {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        .login-box .error-msg.show {
            display: block;
        }
        .login-box .footer {
            text-align: center;
            margin-top: 18px;
            color: #aaa;
            font-size: 12px;
        }

        /* ===== 主容器 ===== */
        .container {
            background: white;
            border-radius: 25px;
            padding: 30px 25px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        
        /* ===== 顶部工具栏 ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        .toolbar .title-area h1 {
            color: #1a1a2e;
            font-size: 22px;
            margin: 0;
        }
        .toolbar .title-area .subtitle {
            color: #888;
            font-size: 12px;
            margin: 0;
        }
        .toolbar .toolbar-buttons {
            display: flex;
            gap: 8px;
        }
        .toolbar .toolbar-buttons .btn-icon {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar .toolbar-buttons .btn-icon:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }
        .toolbar .toolbar-buttons .btn-icon:active {
            transform: scale(0.92);
        }
        .toolbar .toolbar-buttons .btn-icon.logout-btn {
            background: #ff6b6b;
            color: white;
        }
        .toolbar .toolbar-buttons .btn-icon.logout-btn:hover {
            background: #ee5a24;
        }

        /* ===== 号码显示 ===== */
        .number-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            border: 3px dashed #e0e0e0;
            transition: all 0.3s;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .number-display.has-number {
            border-color: #4CAF50;
            background: #e8f5e9;
        }
        .number-display .number-text {
            font-size: 48px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #1a1a2e;
            letter-spacing: 8px;
        }
        .number-display .placeholder {
            color: #aaa;
            font-size: 18px;
        }

        /* ===== 数字键盘 ===== */
        .number-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 10px 0 15px 0;
        }
        .num-btn {
            padding: 16px 0;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            color: #1a1a2e;
            user-select: none;
            touch-action: manipulation;
        }
        .num-btn:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }
        .num-btn:active {
            transform: scale(0.92);
            background: #d0d0d0;
        }
        .num-btn.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .num-btn.clear-btn {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .num-btn.clear-btn:hover {
            background: #ee5a24;
        }
        .num-btn.clear-btn:active {
            background: #c0392b;
        }

        /* ===== 控制按钮 ===== */
        .action-row {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px 0;
        }
        .action-row .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .action-row .btn:active {
            transform: scale(0.95);
        }
        .btn-random {
            background: #ffd93d;
            color: #1a1a2e;
        }
        .btn-random:hover {
            background: #f5c800;
        }
        .btn-clear {
            background: #ff6b6b;
            color: white;
        }
        .btn-clear:hover {
            background: #ee5a24;
        }

        /* ===== 表单 ===== */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
        }

        /* ===== 提交按钮 ===== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 5px;
            touch-action: manipulation;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== 蓝牙按钮 ===== */
        .btn-bluetooth {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            touch-action: manipulation;
        }
        .btn-bluetooth:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        .btn-bluetooth:active {
            transform: scale(0.97);
        }
        .btn-bluetooth.connected {
            background: #4CAF50;
        }
        .btn-bluetooth .bluetooth-icon {
            font-size: 20px;
        }
        .btn-bluetooth .status-text {
            font-size: 13px;
            font-weight: normal;
        }
        .btn-bluetooth .bt-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        .btn-bluetooth.loading .bt-spinner {
            display: inline-block;
        }
        .btn-bluetooth.loading .bt-text {
            display: none;
        }

        /* ===== 状态消息 ===== */
        #statusMessage {
            margin-top: 12px;
            padding: 12px 15px;
            border-radius: 12px;
            display: none;
            font-size: 14px;
        }
        #statusMessage.show {
            display: block;
        }
        #statusMessage.success {
            background: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
        }
        #statusMessage.error {
            background: #f8d7da;
            border-left: 5px solid #dc3545;
            color: #721c24;
        }
        #statusMessage.info {
            background: #d1ecf1;
            border-left: 5px solid #17a2b8;
            color: #0c5460;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 打印预览 ===== */
        .print-preview {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre;
            overflow-x: auto;
            display: none;
            border: 1px solid #ddd;
        }
        .print-preview.show {
            display: block;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
            font-size: 11px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 400px) {
            .container {
                padding: 15px 12px;
            }
            .number-display .number-text {
                font-size: 36px;
                letter-spacing: 4px;
            }
            .num-btn {
                padding: 14px 0;
                font-size: 18px;
            }
            .action-row .btn {
                font-size: 13px;
                padding: 10px;
            }
            .login-box {
                padding: 30px 20px;
                margin: 15px;
            }
            .toolbar .title-area h1 {
                font-size: 18px;
            }
            .btn-submit {
                font-size: 17px;
                padding: 14px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 500px;
            }
            .number-display .number-text {
                font-size: 56px;
                letter-spacing: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== 登录页面 ===== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <div class="logo">🎯</div>
            <h1>万字票系统</h1>
            <p class="subtitle">4D 投注管理</p>
            <div class="form-group">
                <label>🔐 请输入密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码登录" autocomplete="current-password">
            </div>
            <button class="btn-login" onclick="handleLogin()">登录</button>
            <div class="error-msg" id="loginError">❌ 密码错误，请重试</div>
            <div class="footer">
                <small>默认密码: admin123</small>
            </div>
        </div>
    </div>

    <!-- ===== 主应用 ===== -->
    <div class="container" id="mainApp" style="display:none;">
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="title-area">
                <h1>🎯 万字票</h1>
                <div class="subtitle">4D 投注系统</div>
            </div>
            <div class="toolbar-buttons">
                <button class="btn-icon" onclick="toggleFullscreen()" title="全屏切换">
                    ⛶
                </button>
                <button class="btn-icon logout-btn" onclick="handleLogout()" title="退出登录">
                    🚪
                </button>
            </div>
        </div>

        <!-- 蓝牙连接按钮 -->
        <button id="bluetoothBtn" class="btn-bluetooth" onclick="connectBluetooth()">
            <span class="bluetooth-icon">🔵</span>
            <span class="bt-text">连接蓝牙打印机</span>
            <span class="status-text" id="btStatus">未连接</span>
            <span class="bt-spinner"></span>
        </button>

        <!-- 号码显示 -->
        <div class="number-display" id="numberDisplay" onclick="clearNumber()">
            <span class="placeholder">点击数字选择号码</span>
        </div>

        <!-- 数字键盘 -->
        <div class="number-pad" id="numberPad">
            <div class="num-btn" data-num="0">0</div>
            <div class="num-btn" data-num="1">1</div>
            <div class="num-btn" data-num="2">2</div>
            <div class="num-btn" data-num="3">3</div>
            <div class="num-btn" data-num="4">4</div>
            <div class="num-btn" data-num="5">5</div>
            <div class="num-btn" data-num="6">6</div>
            <div class="num-btn" data-num="7">7</div>
            <div class="num-btn" data-num="8">8</div>
            <div class="num-btn" data-num="9">9</div>
            <div class="num-btn clear-btn" data-num="clear" style="grid-column: span 2;">⌫ 清除</div>
            <div class="num-btn" data-num="random" style="grid-column: span 3; background: #ffd93d; border-color: #ffd93d;">🎲 随机</div>
        </div>

        <!-- 投注金额 -->
        <div class="form-group">
            <label>💰 投注金额 (RM)</label>
            <input type="number" id="betAmount" placeholder="输入投注金额" step="0.01" min="0" inputmode="decimal">
        </div>

        <!-- 日期 -->
        <div class="form-group">
            <label>📅 开奖日期</label>
            <input type="date" id="drawDate">
        </div>

        <!-- 提交按钮 -->
        <button id="submitBtn" class="btn-submit" onclick="submitTicket()">
            📝 提交票券 & 打印
        </button>

        <!-- 状态消息 -->
        <div id="statusMessage"></div>

        <!-- 打印预览 -->
        <div id="printPreview" class="print-preview"></div>

        <div class="footer">
            <small>数据保存到 Firebase · 支持蓝牙打印</small>
        </div>
    </div>

    <script>
        // ============================================
        // 1. FIREBASE 配置
        // ============================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================
        // 2. 密码配置
        // ============================================
        const SYSTEM_PASSWORD = 'admin123'; // 默认密码，可修改
        let isLoggedIn = false;

        // ============================================
        // 3. 全局变量
        // ============================================
        let selectedNumber = '';
        let currentTicketData = null;
        let bluetoothDevice = null;
        let bluetoothServer = null;
        let bluetoothCharacteristic = null;
        let isConnected = false;
        let isConnecting = false;

        const MAX_DIGITS = 4;
        const today = new Date().toISOString().split('T')[0];

        // ============================================
        // 4. 登录功能
        // ============================================
        function handleLogin() {
            const passwordInput = document.getElementById('loginPassword');
            const errorMsg = document.getElementById('loginError');
            const password = passwordInput.value.trim();

            if (password === SYSTEM_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainApp').style.display = 'block';
                errorMsg.classList.remove('show');
                passwordInput.value = '';
                initApp();
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }
        }

        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                isLoggedIn = false;
                document.getElementById('mainApp').style.display = 'none';
                document.getElementById('loginOverlay').classList.remove('hidden');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
                // 如果全屏则退出
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        }

        // 回车键登录
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('loginPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });

        // ============================================
        // 5. 全屏功能
        // ============================================
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    showStatus('全屏切换失败: ' + err.message, 'error');
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // 监听全屏变化
        document.addEventListener('fullscreenchange', function() {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen');
            } else {
                document.body.classList.remove('fullscreen');
            }
        });

        // ============================================
        // 6. 初始化
        // ============================================
        function initApp() {
            document.getElementById('drawDate').value = today;
            setupNumberPad();
            updateDisplay();
            checkBluetoothSupport();
        }

        function checkBluetoothSupport() {
            if (!navigator.bluetooth) {
                const btn = document.getElementById('bluetoothBtn');
                btn.style.display = 'none';
                showStatus('⚠️ 此浏览器不支持蓝牙，请使用 Chrome 或 Edge', 'error');
            }
        }

        // ============================================
        // 7. 数字键盘
        // ============================================
        function setupNumberPad() {
            const buttons = document.querySelectorAll('.num-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const value = this.dataset.num;
                    handleNumberInput(value);
                });
                // 移动端触摸优化
                btn.addEventListener('touchstart', function(e) {
                    // 防止双击缩放
                }, { passive: true });
            });

            // 键盘支持
            document.addEventListener('keydown', function(e) {
                if (!isLoggedIn) return;
                if (e.target.tagName === 'INPUT') return;
                
                if (e.key >= '0' && e.key <= '9') {
                    handleNumberInput(e.key);
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    handleNumberInput('clear');
                } else if (e.key === 'Enter') {
                    document.getElementById('submitBtn').click();
                }
            });
        }

        function handleNumberInput(value) {
            if (value === 'clear') {
                selectedNumber = selectedNumber.slice(0, -1);
            } else if (value === 'random') {
                generateRandomNumber();
                return;
            } else {
                if (selectedNumber.length < MAX_DIGITS) {
                    selectedNumber += value;
                }
            }
            updateDisplay();
        }

        function generateRandomNumber() {
            let num = '';
            for (let i = 0; i < MAX_DIGITS; i++) {
                num += Math.floor(Math.random() * 10);
            }
            selectedNumber = num;
            updateDisplay();
        }

        function clearNumber() {
            selectedNumber = '';
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('numberDisplay');

            if (selectedNumber.length === 0) {
                display.innerHTML = '<span class="placeholder">点击数字选择号码</span>';
                display.classList.remove('has-number');
                return;
            }

            let formatted = selectedNumber.split('').join(' ');
            display.innerHTML = `<span class="number-text">${formatted}</span>`;
            display.classList.add('has-number');

            // 高亮最后一个输入的数字
            document.querySelectorAll('.num-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.num === 'clear' || btn.dataset.num === 'random') return;
                if (selectedNumber.length > 0 && btn.dataset.num === selectedNumber[selectedNumber.length - 1]) {
                    btn.classList.add('selected');
                }
            });
        }

        // ============================================
        // 8. 蓝牙打印机连接 (修复版)
        // ============================================
        async function connectBluetooth() {
            const btn = document.getElementById('bluetoothBtn');
            const statusText = document.getElementById('btStatus');

            // 如果正在连接，忽略
            if (isConnecting) return;

            // 如果已连接，断开
            if (isConnected) {
                try {
                    if (bluetoothDevice && bluetoothDevice.gatt) {
                        await bluetoothDevice.gatt.disconnect();
                    }
                } catch (e) {
                    console.log('Disconnect error:', e);
                }
                isConnected = false;
                bluetoothDevice = null;
                bluetoothServer = null;
                bluetoothCharacteristic = null;
                btn.classList.remove('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🔵';
                statusText.textContent = '未连接';
                showStatus('蓝牙已断开', 'info');
                return;
            }

            try {
                isConnecting = true;
                btn.classList.add('loading');
                btn.querySelector('.bluetooth-icon').textContent = '⏳';
                statusText.textContent = '搜索中...';
                showStatus('正在搜索蓝牙设备...', 'info');

                // 请求蓝牙设备 - 支持多种打印机
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb',
                        '00001801-0000-1000-8000-00805f9b34fb',
                        '00001800-0000-1000-8000-00805f9b34fb'
                    ]
                });

                statusText.textContent = '连接中...';
                showStatus(`正在连接 ${bluetoothDevice.name || '设备'}...`, 'info');

                // 连接GATT服务器
                bluetoothServer = await bluetoothDevice.gatt.connect();
                
                // 尝试获取服务
                let services = await bluetoothServer.getPrimaryServices();
                
                if (services.length === 0) {
                    // 尝试获取特定服务
                    const serviceUUIDs = [
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        '0000180a-0000-1000-8000-00805f9b34fb',
                        '00001801-0000-1000-8000-00805f9b34fb'
                    ];
                    for (let uuid of serviceUUIDs) {
                        try {
                            let service = await bluetoothServer.getPrimaryService(uuid);
                            if (service) {
                                services = [service];
                                break;
                            }
                        } catch (e) {}
                    }
                }

                if (services.length === 0) {
                    throw new Error('无法找到打印机服务，请确认设备是蓝牙打印机');
                }

                bluetoothService = services[0];
                
                // 查找可写特征
                let characteristics = await bluetoothService.getCharacteristics();
                let writeChar = null;
                
                for (let char of characteristics) {
                    let properties = char.properties;
                    if (properties.write || properties.writeWithoutResponse) {
                        writeChar = char;
                        break;
                    }
                }

                if (!writeChar) {
                    // 尝试通过UUID查找
                    const writeUUIDs = [
                        '00002a19-0000-1000-8000-00805f9b34fb',
                        '00002a00-0000-1000-8000-00805f9b34fb',
                        '00002a01-0000-1000-8000-00805f9b34fb'
                    ];
                    for (let uuid of writeUUIDs) {
                        try {
                            let char = await bluetoothService.getCharacteristic(uuid);
                            if (char) {
                                writeChar = char;
                                break;
                            }
                        } catch (e) {}
                    }
                }

                if (!writeChar) {
                    throw new Error('找不到可写的打印机特征');
                }

                bluetoothCharacteristic = writeChar;
                isConnected = true;

                // 更新UI
                btn.classList.add('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🟢';
                statusText.textContent = '已连接';
                showStatus(`✅ 已连接到 ${bluetoothDevice.name || '打印机'}`, 'success');

                // 测试打印
                await testPrint();

            } catch (error) {
                console.error('蓝牙连接错误:', error);
                let errorMsg = error.message;
                if (errorMsg.includes('user cancelled')) {
                    errorMsg = '用户取消选择';
                } else if (errorMsg.includes('No devices found')) {
                    errorMsg = '未找到设备，请确保打印机已开启且可被发现';
                }
                showStatus('❌ 蓝牙连接失败: ' + errorMsg, 'error');
                isConnected = false;
                btn.classList.remove('connected');
                btn.classList.remove('loading');
                btn.querySelector('.bluetooth-icon').textContent = '🔵';
                statusText.textContent = '未连接';
            } finally {
                isConnecting = false;
            }
        }

        // ============================================
        // 9. 打印功能 (使用原始字节)
        // ============================================
        async function printTicket(ticketData) {
            if (!isConnected || !bluetoothCharacteristic) {
                showStatus('⚠️ 请先连接蓝牙打印机', 'error');
                return false;
            }

            try {
                // 构建 ESC/POS 原始命令
                const printerCommands = buildESCCommands(ticketData);
                
                // 分块发送（避免超过MTU限制）
                const chunkSize = 20;
                for (let i = 0; i < printerCommands.length; i += chunkSize) {
                    const chunk = printerCommands.slice(i, i + chunkSize);
                    await bluetoothCharacteristic.writeValue(chunk);
                    // 小延迟确保数据发送
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                
                showStatus('🖨️ 打印已发送', 'success');
                return true;

            } catch (error) {
                console.error('打印错误:', error);
                showStatus('❌ 打印失败: ' + error.message, 'error');
                return false;
            }
        }

        function buildESCCommands(ticketData) {
            // 手动构建 ESC/POS 命令
            const commands = [];
            
            // 初始化打印机
            commands.push(new Uint8Array([0x1B, 0x40]));
            
            // 设置字体大小 (正常)
            commands.push(new Uint8Array([0x1B, 0x21, 0x00]));
            
            // 居中
            commands.push(new Uint8Array([0x1B, 0x61, 0x01]));
            
            // 打印标题
            commands.push(new TextEncoder().encode('========================\n'));
            commands.push(new TextEncoder().encode('    万字票 4D 投注单\n'));
            commands.push(new TextEncoder().encode('========================\n'));
            
            // 左对齐
            commands.push(new Uint8Array([0x1B, 0x61, 0x00]));
            
            // 打印内容
            commands.push(new TextEncoder().encode(`日期: ${ticketData.date || new Date().toLocaleDateString()}\n`));
            commands.push(new TextEncoder().encode(`时间: ${new Date().toLocaleTimeString()}\n`));
            commands.push(new TextEncoder().encode('------------------------\n'));
            commands.push(new TextEncoder().encode(`号码: ${ticketData.number}\n`));
            commands.push(new TextEncoder().encode(`金额: RM ${ticketData.amount.toFixed(2)}\n`));
            commands.push(new TextEncoder().encode('------------------------\n'));
            
            // 居中
            commands.push(new Uint8Array([0x1B, 0x61, 0x01]));
            commands.push(new TextEncoder().encode('  祝您 幸运中奖! 🍀\n'));
            
            // 左对齐
            commands.push(new Uint8Array([0x1B, 0x61, 0x00]));
            commands.push(new TextEncoder().encode('========================\n'));
            
            // 走纸
            commands.push(new TextEncoder().encode('\n\n\n\n'));
            
            // 切纸 (如果支持)
            commands.push(new Uint8Array([0x1D, 0x56, 0x00]));
            
            // 合并所有命令
            let totalLength = 0;
            for (let cmd of commands) {
                totalLength += cmd.length;
            }
            
            const result = new Uint8Array(totalLength);
            let offset = 0;
            for (let cmd of commands) {
                result.set(cmd, offset);
                offset += cmd.length;
            }
            
            return result;
        }

        // ============================================
        // 10. 测试打印
        // ============================================
        async function testPrint() {
            try {
                const testData = {
                    number: 'TEST',
                    amount: 0,
                    date: new Date().toLocaleDateString()
                };
                const commands = buildESCCommands(testData);
                
                const chunkSize = 20;
                for (let i = 0; i < commands.length; i += chunkSize) {
                    const chunk = commands.slice(i, i + chunkSize);
                    await bluetoothCharacteristic.writeValue(chunk);
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                
                showStatus('✅ 打印机测试成功', 'success');
            } catch (e) {
                console.log('测试打印失败:', e);
            }
        }

        // ============================================
        // 11. 提交票券
        // ============================================
        async function submitTicket() {
            const date = document.getElementById('drawDate').value;
            const amountInput = document.getElementById('betAmount');
            const amount = parseFloat(amountInput.value);

            // 验证
            if (!date) {
                showStatus('请选择开奖日期!', 'error');
                return;
            }
            if (selectedNumber.length !== MAX_DIGITS) {
                showStatus(`请输入完整的 ${MAX_DIGITS} 位号码!`, 'error');
                return;
            }
            if (!amount || amount <= 0) {
                showStatus('请输入有效的投注金额!', 'error');
                return;
            }

            // 准备数据
            const ticketData = {
                number: selectedNumber,
                amount: amount,
                date: date,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: 'active'
            };

            currentTicketData = ticketData;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 保存中...';
            showStatus('正在保存数据到 Firebase...', 'info');

            showPrintPreview(ticketData);

            try {
                const ticketRef = database.ref('tickets').push();
                await ticketRef.set(ticketData);

                showStatus(`✅ 票券已保存! 号码: ${selectedNumber}, 金额: RM ${amount.toFixed(2)}`, 'success');

                if (isConnected) {
                    const printed = await printTicket(ticketData);
                    if (printed) {
                        showStatus(`✅ 票券已保存并打印!`, 'success');
                    }
                } else {
                    showStatus(`✅ 票券已保存 (未连接打印机)`, 'success');
                }

                selectedNumber = '';
                document.getElementById('betAmount').value = '';
                updateDisplay();

            } catch (error) {
                console.error('保存失败:', error);
                showStatus(`❌ 保存失败: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📝 提交票券 & 打印';
            }
        }

        // ============================================
        // 12. 打印预览
        // ============================================
        function showPrintPreview(ticketData) {
            const preview = document.getElementById('printPreview');
            const content = `
========================
    万字票 4D 投注单
========================
日期: ${ticketData.date}
时间: ${new Date().toLocaleTimeString()}
------------------------
号码: ${ticketData.number}
金额: RM ${ticketData.amount.toFixed(2)}
------------------------
  祝您 幸运中奖! 🍀
========================
            `;
            preview.textContent = content;
            preview.classList.add('show');

            clearTimeout(preview._hideTimer);
            preview._hideTimer = setTimeout(() => {
                preview.classList.remove('show');
            }, 8000);
        }

        // ============================================
        // 13. 状态显示
        // ============================================
        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = 'show ' + type;
            
            clearTimeout(statusDiv._hideTimer);
            if (type !== 'error') {
                statusDiv._hideTimer = setTimeout(() => {
                    statusDiv.className = '';
                }, 5000);
            }
        }

        // ============================================
        // 14. 页面加载
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            // 密码框自动聚焦
            document.getElementById('loginPassword').focus();
            
            // 检查是否支持全屏
            if (!document.documentElement.requestFullscreen) {
                console.log('Fullscreen not supported');
            }
        });

        // 安全: 防止右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
    </script>
