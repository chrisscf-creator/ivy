<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
    <title>万字票出票系统</title>
    <!-- 引入Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#111827;color:#fff;padding:15px;transition:all 0.3s;}
        .container{max-width:1000px;margin:0 auto;}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
        .title{font-size:26px;font-weight:bold;color:#fbbf24;}
        .btn{padding:10px 18px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:bold;transition:0.2s;}
        .btn-blue{background:#2563eb;color:#fff;}
        .btn-orange{background:#f97316;color:#fff;}
        .btn-green{background:#16a34a;color:#fff;}
        .btn:hover{opacity:0.9;transform:scale(1.02);}

        .main-box{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
        @media(max-width:750px){.main-box{grid-template-columns:1fr;}}

        .input-card,.print-card{background:#1f2937;padding:20px;border-radius:16px;}
        .item{margin-bottom:16px;}
        label{display:block;margin-bottom:6px;color:#d1d5db;font-size:15px;}
        input{width:100%;padding:12px;border-radius:8px;border:none;font-size:16px;background:#374151;color:#fff;outline:none;}
        .num-buttons{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin:15px 0;}
        .num-btn{padding:12px;border-radius:6px;border:none;background:#334155;color:#fff;font-size:17px;cursor:pointer;}
        .num-btn:hover{background:#475569;}

        .preview{background:#fff;color:#000;padding:15px;border-radius:8px;min-height:250px;white-space:pre-wrap;font-size:13px;line-height:1.5;}
        .action-row{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap;}

        .status-tip{margin-top:15px;padding:10px;border-radius:6px;text-align:center;display:none;}
        .success{background:#064e3b;color:#4ade80;display:block;}
        .error{background:#7f1d1d;color:#fca5a5;display:block;}
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1 class="title">🎫 万字票出票系统</h1>
        <div>
            <button class="btn btn-blue" id="fullScreenBtn">⛶ 全屏模式</button>
            <button class="btn btn-green" id="connectBtBtn">🔌 连接蓝牙打印机</button>
            <button class="btn btn-orange" id="langBtn">English</button>
        </div>
    </div>

    <div class="main-box">
        <div class="input-card">
            <div class="item">
                <label data-lang="ticketNo">票号</label>
                <input type="text" id="ticketNo" placeholder="自动生成">
            </div>
            <div class="item">
                <label data-lang="orderDate">出票日期</label>
                <input type="date" id="orderDate">
            </div>
            <div class="item">
                <label data-lang="playNum">下注号码</label>
                <input type="text" id="playNum" readonly placeholder="点击下方数字选号">
            </div>
            <div class="num-buttons" id="numPad">
                <button class="num-btn">0</button>
                <button class="num-btn">1</button>
                <button class="num-btn">2</button>
                <button class="num-btn">3</button>
                <button class="num-btn">4</button>
                <button class="num-btn">5</button>
                <button class="num-btn">6</button>
                <button class="num-btn">7</button>
                <button class="num-btn">8</button>
                <button class="num-btn">9</button>
            </div>
            <div class="item">
                <label data-lang="betMoney">下注金额</label>
                <input type="number" id="betMoney" value="10">
            </div>
            <div class="item">
                <label data-lang="playType">玩法类型</label>
                <input type="text" id="playType" value="万字直选">
            </div>
            <div class="item">
                <label data-lang="period">期号</label>
                <input type="text" id="period" placeholder="填写当期期号">
            </div>
            <div class="action-row">
                <button class="btn btn-orange" id="clearBtn" style="width:48%;">清空</button>
                <button class="btn btn-green" id="printBtn" style="width:48%;">出票打印</button>
            </div>
            <div class="status-tip" id="statusTip"></div>
        </div>

        <div class="print-card">
            <label data-lang="printPreview">票据打印预览</label>
            <div class="preview" id="printPreview"></div>
        </div>
    </div>
</div>

<script>
// ========== Firebase 配置 ==========
const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
    storageBucket: "create-for-payment.firebasestorage.app",
    messagingSenderId: "505063429802",
    appId: "1:505063429802:web:8ec8cca8c788610bad62d3",
    measurementId: "G-SHP91WNP0H"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ticketRef = db.ref("wanzi_ticket_records");

const langData = {
    zh:{
        ticketNo:"票号",orderDate:"出票日期",playNum:"下注号码",betMoney:"下注金额",
        playType:"玩法类型",period:"期号",printPreview:"票据打印预览",
        fullScreen:"全屏模式",exitFull:"退出全屏",
        btConnecting:"正在连接蓝牙打印机...",btSuccess:"打印机连接成功",
        btFail:"蓝牙连接失败，请检查设备/重启打印机",noBt:"当前浏览器不支持蓝牙",
        printSuccess:"出票打印成功",printFail:"打印失败，请重连打印机",
        emptyNum:"请选择下注号码"
    },
    en:{
        ticketNo:"Ticket No",orderDate:"Order Date",playNum:"Play Number",betMoney:"Bet Amount",
        playType:"Play Type",period:"Period No",printPreview:"Print Preview",
        fullScreen:"Full Screen",exitFull:"Exit Full",
        btConnecting:"Connecting Bluetooth Printer...",btSuccess:"Printer Connected",
        btFail:"Bluetooth connect failed",noBt:"Browser not support Bluetooth",
        printSuccess:"Print Success",printFail:"Print Failed",
        emptyNum:"Please choose number"
    }
};
let nowLang = "zh";
let fullScreenState = false;
const HISTORY_KEY = "wanzi_ticket_history";

function getLocalHistory(){
    let data = localStorage.getItem(HISTORY_KEY);
    return data ? JSON.parse(data) : [];
}
function saveLocalHistory(list){
    localStorage.setItem(HISTORY_KEY,JSON.stringify(list));
}

function getNowDate(){
    let d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
}
document.getElementById("orderDate").value = getNowDate();

// ========== 蓝牙打印机（POS-5810DD 适配）==========
let btDevice = null;
let btChar = null;
const BT_SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
const BT_CHAR_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

function makeTicketNo(){
    let d = new Date();
    return "WZ"+d.getFullYear().toString().slice(2)+
    String(d.getMonth()+1).padStart(2,'0')+
    String(d.getDate()).padStart(2,'0')+
    String(Math.floor(Math.random()*9999)).padStart(4,'0');
}
document.getElementById("ticketNo").value = makeTicketNo();

document.querySelectorAll("#numPad .num-btn").forEach(btn=>{
    btn.onclick=()=>{
        let val = document.getElementById("playNum").value;
        if(val.length<8){
            document.getElementById("playNum").value = val+btn.innerText;
        }
        refreshPreview();
    }
});

["orderDate","betMoney","playType","period"].forEach(id=>{
    document.getElementById(id).addEventListener("input",refreshPreview);
});

function refreshPreview(){
    let tNo = document.getElementById("ticketNo").value;
    let orderDate = document.getElementById("orderDate").value;
    let pNum = document.getElementById("playNum").value;
    let money = document.getElementById("betMoney").value;
    let type = document.getElementById("playType").value;
    let pNo = document.getElementById("period").value;
    let time = new Date().toLocaleString();

    let text = `
==========万字票==========
票号:${tNo}
日期:${orderDate}
期号:${pNo}
玩法:${type}
号码:${pNum}
金额:$${money}
出票时间:${time}
==========================
    `;
    document.getElementById("printPreview").innerText = text.trim();
}

document.getElementById("clearBtn").onclick=()=>{
    document.getElementById("playNum").value="";
    refreshPreview();
};

document.getElementById("fullScreenBtn").onclick=()=>{
    if(!fullScreenState){
        document.documentElement.requestFullscreen();
        fullScreenState=true;
        this.innerText = nowLang=="zh"?"⛶ 退出全屏":"⛶ Exit Full";
    }else{
        document.exitFullscreen();
        fullScreenState=false;
        this.innerText = nowLang=="zh"?"⛶ 全屏模式":"⛶ Full Screen";
    }
};

document.getElementById("langBtn").onclick=()=>{
    nowLang = nowLang=="zh"?"en":"zh";
    let txt = nowLang=="zh"?"English":"中文";
    this.innerText=txt;
    document.querySelectorAll("[data-lang]").forEach(el=>{
        let key = el.getAttribute("data-lang");
        if(langData[nowLang][key]) el.innerText=langData[nowLang][key];
    });
    refreshPreview();
};

// ========== 适配 POS-5810DD 的蓝牙连接逻辑 ==========
async function connectBluetooth(){
    let tip = document.getElementById("statusTip");
    if(!navigator.bluetooth){
        tip.innerText = langData[nowLang].noBt;
        tip.className="status-tip error";
        return;
    }
    tip.innerText = langData[nowLang].btConnecting;
    tip.className="status-tip success";
    try{
        // 优先按服务UUID过滤，同时支持按名称前缀匹配
        btDevice = await navigator.bluetooth.requestDevice({
            filters: [
                { services: [BT_SERVICE_UUID] },
                { namePrefix: "POS" },
                { namePrefix: "Printer" },
                { namePrefix: "BT" }
            ],
            optionalServices: [BT_SERVICE_UUID]
        });

        // 连接GATT服务器
        const server = await btDevice.gatt.connect();
        const service = await server.getPrimaryService(BT_SERVICE_UUID);
        btChar = await service.getCharacteristic(BT_CHAR_UUID);

        tip.innerText = langData[nowLang].btSuccess;
        tip.className="status-tip success";

        // 监听断开连接
        btDevice.addEventListener("gattserverdisconnected", () => {
            btDevice = null;
            btChar = null;
            tip.innerText = langData[nowLang].btFail;
            tip.className="status-tip error";
        });
    } catch (e) {
        console.error("蓝牙连接错误:", e);
        tip.innerText = langData[nowLang].btFail;
        tip.className="status-tip error";
    }
}

// ========== POS-5810DD 打印指令封装 ==========
function getPrintData(){
    let pre = document.getElementById("printPreview").innerText;
    // 打印机初始化指令
    const initCmd = new Uint8Array([0x1B, 0x40]);
    // 换行切纸指令（适配58mm热敏机）
    const feedCmd = new Uint8Array([0x0A, 0x0A, 0x0A, 0x1D, 0x56, 0x00]);
    // 编码转换（使用UTF-8，多数新款58机已支持）
    const encoder = new TextEncoder();
    const textData = encoder.encode(pre + "\n");
    // 拼接完整数据：初始化指令 + 打印内容 + 换行切纸
    const fullData = new Uint8Array(initCmd.length + textData.length + feedCmd.length);
    fullData.set(initCmd, 0);
    fullData.set(textData, initCmd.length);
    fullData.set(feedCmd, initCmd.length + textData.length);
    return fullData;
}

document.getElementById("printBtn").onclick=async()=>{
    let num = document.getElementById("playNum").value;
    let tip = document.getElementById("statusTip");
    if(!num){
        tip.innerText=langData[nowLang].emptyNum;
        tip.className="status-tip error";
        return;
    }
    if(!btChar){
        tip.innerText=langData[nowLang].btFail;
        tip.className="status-tip error";
        return;
    }
    try{
        await btChar.writeValue(getPrintData());
        tip.innerText=langData[nowLang].printSuccess;
        tip.className="status-tip success";

        // 组装单据数据
        let historyItem = {
            ticketNo:document.getElementById("ticketNo").value,
            orderDate:document.getElementById("orderDate").value,
            period:document.getElementById("period").value,
            playNum:document.getElementById("playNum").value,
            betMoney:document.getElementById("betMoney").value,
            playType:document.getElementById("playType").value,
            createTime:new Date().toLocaleString(),
            timestamp:Date.now()
        };
        // 1.存入本地
        let hisList = getLocalHistory();
        hisList.push(historyItem);
        saveLocalHistory(hisList);
        // 2.上传云端Firebase
        ticketRef.push(historyItem);

        document.getElementById("ticketNo").value=makeTicketNo();
        document.getElementById("playNum").value="";
        refreshPreview();
    }catch(e){
        console.error("打印错误:", e);
        tip.innerText=langData[nowLang].printFail;
        tip.className="status-tip error";
    }
};

document.getElementById("connectBtBtn").onclick=connectBluetooth;
refreshPreview();
</script>
</body>
</html>
