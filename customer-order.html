<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer POS</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 25px; border-radius: 16px; max-width: 400px; margin: 50px auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; border: none; }
        .link-btn { background: none; color: #007bff; text-decoration: underline; }
        .hide { display: none; }
        #mainPage { max-width: 500px; margin: auto; }
        .balance-box { background: #007bff; color: white; padding: 20px; border-radius: 16px; margin: 20px 0; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-group button { flex: 1; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; text-align: center; }
        .modal-content img { width: 220px; height: 220px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="login" class="auth-card">
    <h2>Login</h2>
    <input id="phone" placeholder="Phone">
    <input id="pwd" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button class="link-btn" id="goReg">Register</button>
</div>

<div id="register" class="auth-card hide">
    <h2>Register</h2>
    <input id="rPhone" placeholder="Phone">
    <input id="rPwd" type="password" placeholder="Password">
    <input id="rPwd2" type="password" placeholder="Confirm Password">
    <button id="regBtn">Register</button>
    <button class="link-btn" id="goLogin">Back to Login</button>
</div>

<div id="mainPage" class="hide">
    <div class="balance-box">
        <h3>My Balance</h3>
        <h1 id="balance">$0.00</h1>
    </div>
    <div class="btn-group">
        <button id="topUpBtn">Top Up</button>
        <button id="payBtn">Pay</button>
        <button id="logoutBtn">Logout</button>
    </div>
</div>

<div id="topModal" class="hide modal">
    <div class="modal-content">
        <h3>Top Up QR</h3>
        <img id="topQr">
        <button onclick="closeTop()">Close</button>
    </div>
</div>

<div id="payModal" class="hide modal">
    <div class="modal-content">
        <h3>Pay</h3>
        <input type="number" id="payAmt" placeholder="Amount" min="1">
        <button onclick="generatePay()">Generate QR</button>
        <img id="payQr" class="hide">
        <button onclick="closePay()">Close</button>
    </div>
</div>

<script>
const KEY = "userData";
const SESSION = "currentUser";

function getUsers() { return JSON.parse(localStorage.getItem(KEY)) || {}; }
function saveUsers(u) { localStorage.setItem(KEY, JSON.stringify(u)); }
function setUser(u) { localStorage.setItem(SESSION, u); }
function getUser() { return localStorage.getItem(SESSION); }

function refreshBalance() {
    let u = getUser();
    let users = getUsers();
    if (u && users[u]) {
        document.getElementById("balance").innerText = "$" + users[u].balance.toFixed(2);
    }
}

window.onload = function() {
    let u = getUser();
    let users = getUsers();
    if (u && users[u]) {
        document.getElementById("login").classList.add("hide");
        document.getElementById("mainPage").classList.remove("hide");
        refreshBalance();
    }
    setInterval(refreshBalance, 500);
};

// LOGIN
document.getElementById("loginBtn").onclick = function() {
    let phone = document.getElementById("phone").value;
    let pwd = document.getElementById("pwd").value;
    let users = getUsers();
    if (users[phone] && users[phone].pwd === pwd) {
        setUser(phone);
        location.reload();
    } else alert("Invalid");
};

// REGISTER
document.getElementById("regBtn").onclick = function() {
    let phone = document.getElementById("rPhone").value;
    let pwd = document.getElementById("rPwd").value;
    let pwd2 = document.getElementById("rPwd2").value;
    if (pwd !== pwd2) return alert("Password not match");
    let users = getUsers();
    if (users[phone]) return alert("Exists");
    users[phone] = { pwd, balance: 0 };
    saveUsers(users);
    alert("Registered");
    document.getElementById("register").classList.add("hide");
    document.getElementById("login").classList.remove("hide");
};

// TOP UP
document.getElementById("topUpBtn").onclick = function() {
    document.getElementById("topModal").classList.remove("hide");
    document.getElementById("topQr").src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=TOP:" + getUser();
};
function closeTop() { document.getElementById("topModal").classList.add("hide"); }

// PAY
document.getElementById("payBtn").onclick = function() {
    document.getElementById("payModal").classList.remove("hide");
};
function generatePay() {
    let amt = document.getElementById("payAmt").value;
    document.getElementById("payQr").src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=PAY:" + getUser() + ":" + amt;
    document.getElementById("payQr").classList.remove("hide");
}
function closePay() { document.getElementById("payModal").classList.add("hide"); }

// LOGOUT
document.getElementById("logoutBtn").onclick = function() {
    localStorage.removeItem(SESSION);
    location.reload();
};

document.getElementById("goReg").onclick = () => {
    document.getElementById("login").classList.add("hide");
    document.getElementById("register").classList.remove("hide");
};
document.getElementById("goLogin").onclick = () => {
    document.getElementById("register").classList.add("hide");
    document.getElementById("login").classList.remove("hide");
};
</script>
</body>
</html>
