<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer POS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #f5f7fa; padding: 20px; }
        .auth-box { background: white; padding: 30px; border-radius: 16px; max-width: 400px; margin: 50px auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #4285F4; color: white; border: none; }
        .link-btn { background: none; color: #4285F4; text-decoration: underline; }
        .hide { display: none !important; }
        #mainPage { max-width: 500px; margin: auto; }
        .balance-card { background: linear-gradient(135deg, #6e8efb, #4285F4); color: white; padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 20px; }
        .control-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .control-buttons button { flex: 1; }
        .stall-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stall { background: white; padding: 20px; border-radius: 12px; text-align: center; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:999; }
        .modal-box { background: white; padding:30px; border-radius:20px; text-align:center; width:90%; max-width:350px; }
        .modal-box img { width:220px; height:220px; margin:15px 0; }
    </style>
</head>
<body>

<div id="loginPage" class="auth-box">
    <h2>Login</h2>
    <input id="loginPhone" placeholder="Phone">
    <input id="loginPwd" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <button class="link-btn" id="gotoReg">Register</button>
</div>

<div id="regPage" class="auth-box hide">
    <h2>Register</h2>
    <input id="regPhone" placeholder="Phone">
    <input id="regPwd" type="password" placeholder="Password">
    <input id="regPwd2" type="password" placeholder="Confirm Password">
    <button id="regBtn">Register</button>
    <button class="link-btn" id="gotoLogin">Back</button>
</div>

<div id="mainPage" class="hide">
    <div class="balance-card">
        <h3>My Balance</h3>
        <h1 id="balance">$0.00</h1>
    </div>
    <div class="control-buttons">
        <button id="topUpBtn">Top Up</button>
        <button id="logoutBtn">Logout</button>
    </div>
    <div class="stall-grid">
        <div class="stall">🍥<br>Tu Tu Kueh</div>
        <div class="stall">🍜<br>Toast Box</div>
        <div class="stall">🥤<br>Drink</div>
        <div class="stall">🍗<br>HK Roast</div>
    </div>
</div>

<div id="topModal" class="hide">
    <div class="modal-box">
        <h2>Top Up QR</h2>
        <img id="topQr">
        <button onclick="closeTopModal()">Close</button>
    </div>
</div>

<script>
const USER_KEY = "userData";
const LOGIN_KEY = "loginUser";

function getUsers() { return JSON.parse(localStorage.getItem(USER_KEY)) || {}; }
function saveUsers(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }
function setLogin(u) { localStorage.setItem(LOGIN_KEY, u); }
function getLogin() { return localStorage.getItem(LOGIN_KEY); }

window.onload = function() {
    autoLogin();
    setInterval(() => {
        let u = getLogin();
        let list = getUsers();
        if(u && list[u]) balance.innerText = "$" + list[u].balance.toFixed(2);
    }, 300);
};

function autoLogin() {
    let u = getLogin();
    let list = getUsers();
    if(u && list[u]) {
        loginPage.classList.add("hide");
        mainPage.classList.remove("hide");
    }
}

regBtn.onclick = () => {
    let p = regPhone.value.trim();
    let pw = regPwd.value.trim();
    let pw2 = regPwd2.value.trim();
    if(!p || !pw || pw!=pw2) return alert("Check input");
    let list = getUsers();
    if(list[p]) return alert("Exists");
    list[p] = { pwd: pw, balance: 0 };
    saveUsers(list);
    alert("OK");
    gotoLogin.click();
};

loginBtn.onclick = () => {
    let p = loginPhone.value.trim();
    let pw = loginPwd.value.trim();
    let list = getUsers();
    if(list[p] && list[p].pwd == pw) {
        setLogin(p);
        location.reload();
    } else alert("Invalid");
};

topUpBtn.onclick = () => {
    topModal.className = "modal";
    topQr.src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=TOP:"+getLogin();
};
function closeTopModal(){ topModal.className="hide"; }

logoutBtn.onclick = () => { localStorage.clear(); location.reload(); };
gotoReg.onclick = () => { loginPage.classList.add("hide"); regPage.classList.remove("hide"); };
gotoLogin.onclick = () => { regPage.classList.add("hide"); loginPage.classList.remove("hide"); };
</script>
</body>
</html>
