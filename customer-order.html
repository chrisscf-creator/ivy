<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <style>
        body{font-family:Arial;padding:20px;background:#fff0f3}
        .box{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:16px}
        #video{width:100%;border-radius:12px;background:#000;margin:15px 0}
        button{padding:14px;width:100%;border:none;background:#d63384;color:white;border-radius:12px}
        .info{padding:15px;background:#fce4ec;border-radius:8px;margin:15px 0}
    </style>
</head>
<body>
<div class="box">
    <h2>Payment</h2>
    <video id="video" autoplay></video>
    <button id="startBtn">Start Camera</button>
    <div class="info">
        Phone: <b id="showPhone"></b><br>
        Amount: <b id="showAmt"></b>
    </div>
    <button id="confirmBtn" style="background:#d63384">Confirm</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const STORAGE_KEY = "userData";
const video = document.getElementById("video");
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
let phone = "", amt = "";

function getUsers() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
}
function saveUsers(u) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(u));
}

startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    scan();
};

function scan() {
    if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) {
            const d = code.data;
            if (d.startsWith("PAY:")) {
                const arr = d.split(":");
                phone = arr[1];
                amt = arr[2];
                showPhone.innerText = phone;
                showAmt.innerText = "$" + amt;
                alert("Success!");
            }
        }
    }
    requestAnimationFrame(scan);
}

confirmBtn.onclick = () => {
    if (!phone || !amt) return alert("Scan first");
    const a = Number(amt);
    const u = getUsers();
    if (!u[phone] || u[phone].balance < a) return alert("Insufficient balance");
    u[phone].balance -= a;
    saveUsers(u);
    alert("Success!\nDeducted: $" + a);
    phone = ""; amt = "";
    showPhone.innerText = ""; showAmt.innerText = "";
};
</script>
</body>
</html>
