<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Campus Canteen - 顾客点餐系统</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f7f5f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: #2c3e2f;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h1 {
            margin: 0;
            font-size: 1.6rem;
        }
        .logo p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .user-panel {
            background: #1e2a1f;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            display: flex;
            gap: 20px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .balance {
            font-weight: bold;
            background: #f5b042;
            padding: 5px 12px;
            border-radius: 30px;
            color: #2c3e2f;
            font-size: 1.2rem;
        }
        button {
            background: #f5b042;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        button.danger {
            background: #c0392b;
            color: white;
        }
        button.secondary {
            background: #e0e0e0;
            color: #2c3e2f;
        }
        button.primary {
            background: #2c6e2f;
            color: white;
        }
        button.success {
            background: #27ae60;
            color: white;
        }
        button.info {
            background: #3498db;
            color: white;
        }
        button:hover {
            transform: scale(0.97);
            opacity: 0.9;
        }
        .login-area {
            padding: 2rem;
            text-align: center;
            background: #fef9e6;
        }
        .login-card, .register-card {
            max-width: 350px;
            margin: 0 auto;
            background: white;
            padding: 1.8rem;
            border-radius: 2rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .register-card {
            margin-top: 20px;
            background: #fef9f0;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-size: 1rem;
        }
        .stall-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.5rem;
            justify-content: center;
        }
        .stall-card {
            background: #fffaf2;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            width: 180px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid #f0e2cf;
        }
        .stall-card.selected {
            border: 3px solid #f5b042;
            background: #fff2df;
        }
        .menu-panel {
            padding: 1rem 2rem 2rem;
            border-top: 2px solid #f0e2cf;
        }
        .menu-items {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .menu-item {
            background: #fef5e8;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            width: 220px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 0 1.5rem 1.5rem;
            flex-wrap: wrap;
        }
        .action-buttons button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
        }
        .message {
            padding: 0 1.5rem 1rem;
            color: #c0392b;
            font-weight: 500;
        }
        .success-msg {
            color: #2c6e2f;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #8f7a5c;
        }
        .switch-mode {
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .switch-mode a {
            color: #2c6e2f;
            cursor: pointer;
            text-decoration: underline;
        }
        hr {
            margin: 15px 0;
        }
        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 2rem;
            border-radius: 1.5rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #2c3e2f;
        }
        .qr-code {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #f5b042;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
        }
        .close-btn {
            background: #c0392b;
            color: white;
            margin-top: 10px;
        }
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: stretch; text-align: center;}
            .stall-card { width: 140px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<!-- 二维码模态框 -->
<div id="qrModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">二维码</h3>
        <div class="qr-code" id="qrCodeContent"></div>
        <p id="qrDescription"></p>
        <button class="close-btn" onclick="closeModal()">关闭</button>
    </div>
</div>

<script>
    // 用户数据存储结构
    let users = {};
    
    // 菜单数据
    const menuCatalog = {
        "tutu": {
            name: "🍥 Tu Tu Kueh",
            items: [
                { name: "Traditional Peanut", price: 2.5 },
                { name: "Coconut Gula Melaka", price: 2.8 },
                { name: "Pandan Kaya", price: 2.6 }
            ]
        },
        "toast": {
            name: "🍜 Toast Box",
            items: [
                { name: "Kaya Butter Toast", price: 3.2 },
                { name: "Peanut Butter Toast", price: 3.0 },
                { name: "Soft Boiled Eggs (2pcs)", price: 2.4 }
            ]
        },
        "drink": {
            name: "🥤 Drink Stall",
            items: [
                { name: "Milo Dinosaur", price: 3.0 },
                { name: "Ice Lemon Tea", price: 2.5 },
                { name: "Kopi C Kosong", price: 1.8 }
            ]
        },
        "hk": {
            name: "🍗 HK Roast",
            items: [
                { name: "Roast Chicken Rice", price: 5.8 },
                { name: "Char Siu Noodle", price: 6.0 },
                { name: "Roast Pork Rice", price: 6.5 }
            ]
        }
    };

    let currentUser = null;
    let selectedStallId = "tutu";
    let showRegister = false;

    // 加载本地存储的用户数据
    function loadUsersFromStorage() {
        const stored = localStorage.getItem("campus_users");
        if(stored) {
            try{
                users = JSON.parse(stored);
            }catch(e){}
        }
        if(Object.keys(users).length === 0) {
            users = {
                user: { password: "pass", balance: 0 },
                alice: { password: "123", balance: 15.5 },
                bob: { password: "bob123", balance: 8 }
            };
            persistUsers();
        }
    }
    
    function persistUsers() {
        localStorage.setItem("campus_users", JSON.stringify(users));
        window.dispatchEvent(new StorageEvent('storage', { key: 'campus_users', newValue: JSON.stringify(users) }));
    }

    function setUserBalance(username, newBalance) {
        if(users[username]) {
            users[username].balance = newBalance;
            persistUsers();
        }
    }

    function getUserBalance(username) {
        return users[username] ? users[username].balance : 0;
    }

    function registerUser(username, password) {
        if(!username || username.trim() === "") {
            return { success: false, message: "❌ 用户名不能为空！" };
        }
        if(username.length < 3) {
            return { success: false, message: "❌ 用户名至少3个字符！" };
        }
        if(!password || password.length < 3) {
            return { success: false, message: "❌ 密码至少3个字符！" };
        }
        if(users[username]) {
            return { success: false, message: "❌ 用户名已存在！" };
        }
        users[username] = {
            password: password,
            balance: 0
        };
        persistUsers();
        return { success: true, message: "✅ 注册成功！请登录。" };
    }

    // 显示二维码模态框
    function showQRCode(title, content, description) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("qrCodeContent").innerHTML = content;
        document.getElementById("qrDescription").innerHTML = description || "";
        document.getElementById("qrModal").style.display = "flex";
    }

    window.closeModal = function() {
        document.getElementById("qrModal").style.display = "none";
    };

    // 充值功能：弹出二维码
    function handleTopUp() {
        let amount = prompt("请输入充值金额（¥）：", "10");
        if(amount === null) return;
        amount = parseFloat(amount);
        if(isNaN(amount) || amount <= 0) {
            alert("请输入有效的金额！");
            return;
        }
        // 生成充值二维码信息
        const timestamp = new Date().toLocaleString();
        const qrInfo = `充值请求\n用户：${currentUser}\n金额：¥${amount.toFixed(2)}\n时间：${timestamp}\n状态：待支付`;
        const qrCodeHTML = `<div style="font-size:1rem; text-align:left;">💰 <strong>充值二维码</strong><br><br>` +
                           `用户ID: ${currentUser}<br>` +
                           `金额: ¥${amount.toFixed(2)}<br>` +
                           `时间: ${timestamp}<br><br>` +
                           `<span style="display:inline-block; background:#000; color:#fff; padding:10px; border-radius:8px;">📱 请出示此码给收银员扫码</span></div>`;
        showQRCode("💳 充值二维码", qrCodeHTML, "请向收银员出示此二维码完成支付，支付后余额将自动增加");
        
        // 监听充值完成（实际场景中应由收银台扫描后调用API）
        // 这里提供手动确认按钮（模拟收银员确认）
        setTimeout(() => {
            const confirmTopUp = confirm(`是否确认 ${currentUser} 已支付 ¥${amount.toFixed(2)}？\n（实际场景中由收银台扫码自动完成）`);
            if(confirmTopUp) {
                const newBalance = getUserBalance(currentUser) + amount;
                setUserBalance(currentUser, newBalance);
                showMessage(`✅ 充值成功！已添加 ¥${amount.toFixed(2)}，当前余额：¥${newBalance.toFixed(2)}`, true);
                render();
                closeModal();
            }
        }, 500);
    }

    // 消费功能：弹出二维码（用于线下扫码支付）
    function handleSpend() {
        let amount = prompt("请输入消费金额（¥）：", "10");
        if(amount === null) return;
        amount = parseFloat(amount);
        if(isNaN(amount) || amount <= 0) {
            alert("请输入有效的金额！");
            return;
        }
        const currentBalance = getUserBalance(currentUser);
        if(currentBalance < amount) {
            alert(`❌ 余额不足！当前余额：¥${currentBalance.toFixed(2)}，需要：¥${amount.toFixed(2)}`);
            return;
        }
        const timestamp = new Date().toLocaleString();
        const qrInfo = `消费支付\n用户：${currentUser}\n金额：¥${amount.toFixed(2)}\n时间：${timestamp}\n状态：待扣款`;
        const qrCodeHTML = `<div style="font-size:1rem; text-align:left;">💸 <strong>付款码</strong><br><br>` +
                           `用户ID: ${currentUser}<br>` +
                           `金额: ¥${amount.toFixed(2)}<br>` +
                           `时间: ${timestamp}<br><br>` +
                           `<span style="display:inline-block; background:#000; color:#fff; padding:10px; border-radius:8px;">📱 请出示此码给商家扫码</span></div>`;
        showQRCode("💸 付款二维码", qrCodeHTML, "请向商家出示此二维码完成支付");
        
        setTimeout(() => {
            const confirmSpend = confirm(`是否确认扣除 ${currentUser} 的 ¥${amount.toFixed(2)}？\n（实际场景中由商家扫码自动完成）`);
            if(confirmSpend) {
                const newBalance = currentBalance - amount;
                setUserBalance(currentUser, newBalance);
                showMessage(`✅ 支付成功！已扣除 ¥${amount.toFixed(2)}，剩余余额：¥${newBalance.toFixed(2)}`, true);
                render();
                closeModal();
            }
        }, 500);
    }

    let root = document.getElementById("appRoot");

    function render() {
        if(!currentUser) {
            renderLoginRegisterScreen();
        } else {
            renderMainApp();
        }
    }

    function renderLoginRegisterScreen() {
        if(!showRegister) {
            root.innerHTML = `
                <div class="login-area">
                    <div class="login-card">
                        <h2>🍽️ 校园食堂点餐系统</h2>
                        <p>登录后点餐，使用余额支付</p>
                        <input type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
                        <input type="password" id="loginPassword" placeholder="密码">
                        <button id="doLoginBtn" class="primary" style="width:100%; margin-top:12px;">登录</button>
                        <div class="switch-mode">
                            🔰 还没有账号？ <a id="showRegisterLink">立即注册</a>
                        </div>
                        <hr>
                        <p style="font-size:12px; margin-top:10px;">测试账号：user / pass &nbsp;&nbsp; alice / 123</p>
                    </div>
                </div>
            `;
            document.getElementById("doLoginBtn")?.addEventListener("click", () => {
                const user = document.getElementById("loginUsername").value.trim();
                const pwd = document.getElementById("loginPassword").value;
                if(users[user] && users[user].password === pwd) {
                    currentUser = user;
                    render();
                } else {
                    alert("❌ 用户名或密码错误！");
                }
            });
            document.getElementById("showRegisterLink")?.addEventListener("click", () => {
                showRegister = true;
                render();
            });
        } else {
            root.innerHTML = `
                <div class="login-area">
                    <div class="register-card">
                        <h2>📝 注册新账号</h2>
                        <p>创建你的校园食堂账户</p>
                        <input type="text" id="regUsername" placeholder="用户名（至少3个字符）" autocomplete="off">
                        <input type="password" id="regPassword" placeholder="密码（至少3个字符）">
                        <input type="password" id="regConfirmPassword" placeholder="确认密码">
                        <button id="doRegisterBtn" class="primary" style="width:100%; margin-top:12px;">注册</button>
                        <div class="switch-mode">
                            ⬅️ <a id="showLoginLink">返回登录</a>
                        </div>
                        <div id="regMessage" style="margin-top:12px; font-size:0.85rem;"></div>
                    </div>
                </div>
            `;
            document.getElementById("doRegisterBtn")?.addEventListener("click", () => {
                const username = document.getElementById("regUsername").value.trim();
                const password = document.getElementById("regPassword").value;
                const confirmPwd = document.getElementById("regConfirmPassword").value;
                
                if(password !== confirmPwd) {
                    document.getElementById("regMessage").innerHTML = "<span style='color:#c0392b'>❌ 两次输入的密码不一致！</span>";
                    return;
                }
                
                const result = registerUser(username, password);
                const msgDiv = document.getElementById("regMessage");
                if(result.success) {
                    msgDiv.innerHTML = `<span style="color:#2c6e2f">${result.message}</span>`;
                    setTimeout(() => {
                        showRegister = false;
                        render();
                    }, 1500);
                } else {
                    msgDiv.innerHTML = `<span style="color:#c0392b">${result.message}</span>`;
                }
            });
            document.getElementById("showLoginLink")?.addEventListener("click", () => {
                showRegister = false;
                render();
            });
        }
    }

    function renderMainApp() {
        const balance = getUserBalance(currentUser);
        const stall = menuCatalog[selectedStallId];
        const stallName = stall ? stall.name : "选择摊位";

        root.innerHTML = `
            <div class="header">
                <div class="logo">
                    <h1>🏫 校园食堂</h1>
                    <p>余额支付 · 快捷点餐</p>
                </div>
                <div class="user-panel">
                    <span>👤 ${currentUser}</span>
                    <span class="balance">💰 ¥${balance.toFixed(2)}</span>
                    <button id="logoutBtn" class="danger">登出</button>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="topUpBtn" class="success">💳 充值（生成二维码）</button>
                <button id="spendBtn" class="info">💸 消费（生成付款码）</button>
            </div>
            
            <div>
                <div class="stall-grid" id="stallGrid"></div>
                <div class="menu-panel">
                    <h3>📋 ${stallName} · 菜单</h3>
                    <div id="menuItemsList" class="menu-items"></div>
                </div>
            </div>
            <div id="messageArea" class="message"></div>
            <footer>✨ 选择餐点自动扣款 | 也可使用"消费"按钮生成付款码</footer>
        `;

        const stallGrid = document.getElementById("stallGrid");
        for(let [sid, data] of Object.entries(menuCatalog)) {
            const card = document.createElement("div");
            card.className = `stall-card ${selectedStallId === sid ? 'selected' : ''}`;
            card.innerHTML = `<div style="font-size:2rem;">${data.name.slice(0,2)}</div><strong>${data.name}</strong>`;
            card.addEventListener("click", () => {
                selectedStallId = sid;
                render();
            });
            stallGrid.appendChild(card);
        }

        const menuContainer = document.getElementById("menuItemsList");
        const currentStall = menuCatalog[selectedStallId];
        if(currentStall && currentStall.items) {
            currentStall.items.forEach(item => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "menu-item";
                itemDiv.innerHTML = `
                    <span><strong>${item.name}</strong><br><span style="font-size:0.8rem;">¥${item.price.toFixed(2)}</span></span>
                    <button class="orderBtn" data-price="${item.price}" data-name="${item.name}">点餐</button>
                `;
                menuContainer.appendChild(itemDiv);
            });
            document.querySelectorAll(".orderBtn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const price = parseFloat(btn.getAttribute("data-price"));
                    const itemName = btn.getAttribute("data-name");
                    handleOrder(itemName, price);
                });
            });
        }

        document.getElementById("topUpBtn")?.addEventListener("click", handleTopUp);
        document.getElementById("spendBtn")?.addEventListener("click", handleSpend);
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            render();
        });
    }

    function handleOrder(itemName, price) {
        if(!currentUser) return;
        let balance = getUserBalance(currentUser);
        if(balance >= price) {
            const newBalance = balance - price;
            setUserBalance(currentUser, newBalance);
            showMessage(`✅ 已点餐：${itemName}，消费 ¥${price.toFixed(2)}，余额：¥${newBalance.toFixed(2)}`, true);
            render();
        } else {
            showMessage(`❌ 余额不足！需要 ¥${price.toFixed(2)}，请使用充值功能。`, false);
        }
    }

    function showMessage(msg, isSuccess = false) {
        const msgDiv = document.getElementById("messageArea");
        if(msgDiv) {
            msgDiv.innerHTML = `<span style="color:${isSuccess ? '#2c6e2f' : '#c0392b'}">${msg}</span>`;
            setTimeout(() => {
                if(document.getElementById("messageArea")) document.getElementById("messageArea").innerHTML = "";
            }, 3000);
        } else {
            alert(msg);
        }
    }

    window.addEventListener("storage", (e) => {
        if(e.key === "campus_users" && currentUser) {
            loadUsersFromStorage();
            render();
        }
    });

    loadUsersFromStorage();
    render();
</script>
</body>
</html>
