<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Campus Canteen - Customer Order</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f7f5f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* main app container */
        .app-container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: all 0.2s;
        }
        /* header & login panel */
        .header {
            background: #2c3e2f;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
        }
        .logo p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .user-panel {
            background: #1e2a1f;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            display: flex;
            gap: 20px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .balance {
            font-weight: bold;
            background: #f5b042;
            padding: 5px 12px;
            border-radius: 30px;
            color: #2c3e2f;
        }
        button {
            background: #f5b042;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        button.danger {
            background: #c0392b;
            color: white;
        }
        button.secondary {
            background: #e0e0e0;
            color: #2c3e2f;
        }
        button:hover {
            transform: scale(0.97);
            opacity: 0.9;
        }
        .login-area {
            padding: 2rem;
            text-align: center;
            background: #fef9e6;
        }
        .login-card {
            max-width: 320px;
            margin: 0 auto;
            background: white;
            padding: 1.8rem;
            border-radius: 2rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-size: 1rem;
        }
        .stall-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.5rem;
            justify-content: center;
        }
        .stall-card {
            background: #fffaf2;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            width: 180px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            transition: 0.1s linear;
            border: 1px solid #f0e2cf;
        }
        .stall-card.selected {
            border: 3px solid #f5b042;
            background: #fff2df;
        }
        .menu-panel {
            padding: 1rem 2rem 2rem;
            border-top: 2px solid #f0e2cf;
        }
        .menu-items {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .menu-item {
            background: #fef5e8;
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            width: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .topup-section {
            background: #eef3e6;
            margin: 0 1.5rem 1.5rem;
            padding: 1rem;
            border-radius: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .qr-sim {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
        }
        .message {
            padding: 0 1.5rem 1rem;
            color: #c0392b;
            font-weight: 500;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #8f7a5c;
        }
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: stretch; text-align: center;}
            .stall-card { width: 140px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <!-- dynamic rendering via JS -->
</div>

<script>
    // ---------- DATA ----------
    // users store: username -> {password, balance}
    const users = {
        user: { password: "pass", balance: 0 },
        alice: { password: "123", balance: 15.5 },
        bob: { password: "bob123", balance: 8 }
    };

    // Menu catalog per stall (stallId -> array of items)
    const menuCatalog = {
        "tutu": {
            name: "🍥 Tu Tu Kueh",
            items: [
                { name: "Traditional Peanut", price: 2.5 },
                { name: "Coconut Gula Melaka", price: 2.8 },
                { name: "Pandan Kaya", price: 2.6 }
            ]
        },
        "toast": {
            name: "🍜 Toast Box",
            items: [
                { name: "Kaya Butter Toast", price: 3.2 },
                { name: "Peanut Butter Toast", price: 3.0 },
                { name: "Soft Boiled Eggs (2pcs)", price: 2.4 }
            ]
        },
        "drink": {
            name: "🥤 Drink Stall",
            items: [
                { name: "Milo Dinosaur", price: 3.0 },
                { name: "Ice Lemon Tea", price: 2.5 },
                { name: "Kopi C Kosong", price: 1.8 }
            ]
        },
        "hk": {
            name: "🍗 HK Roast",
            items: [
                { name: "Roast Chicken Rice", price: 5.8 },
                { name: "Char Siu Noodle", price: 6.0 },
                { name: "Roast Pork Rice", price: 6.5 }
            ]
        }
    };

    let currentUser = null;     // logged username

    // Helper: save updated users (simulate persistence)
    function persistUsers() {
        // already in memory, but we keep localStorage optional? no need; global users object works during session.
        // However to simulate between "topup only software", we could use same localStorage key.
        // To make both "apps" work together, we save to localStorage with key "campus_users".
        localStorage.setItem("campus_users", JSON.stringify(users));
    }
    function loadUsersFromStorage() {
        const stored = localStorage.getItem("campus_users");
        if(stored) {
            try{
                const parsed = JSON.parse(stored);
                Object.assign(users, parsed);
            }catch(e){}
        } else {
            // initial persist
            persistUsers();
        }
    }
    loadUsersFromStorage();

    // update user balance and save
    function setUserBalance(username, newBalance) {
        if(users[username]) {
            users[username].balance = newBalance;
            persistUsers();
        }
    }

    function getUserBalance(username) {
        return users[username] ? users[username].balance : 0;
    }

    // helper to refresh UI after login/logout/order/topup
    let selectedStallId = "tutu";   // default stall

    // DOM element refs
    let root = document.getElementById("appRoot");

    function render() {
        if(!currentUser) {
            renderLoginScreen();
        } else {
            renderMainApp();
        }
    }

    function renderLoginScreen() {
        root.innerHTML = `
            <div class="login-area">
                <div class="login-card">
                    <h2>🍽️ Customer Order</h2>
                    <p>Login to order & pay with balance</p>
                    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button id="doLoginBtn" style="width:100%; margin-top:12px;">Login</button>
                    <p style="font-size:12px; margin-top:20px;">Demo: user / pass &nbsp;&nbsp; alice / 123</p>
                </div>
            </div>
        `;
        document.getElementById("doLoginBtn")?.addEventListener("click", () => {
            const user = document.getElementById("loginUsername").value.trim();
            const pwd = document.getElementById("loginPassword").value;
            if(users[user] && users[user].password === pwd) {
                currentUser = user;
                render();
            } else {
                alert("Invalid credentials");
            }
        });
    }

    function renderMainApp() {
        const balance = getUserBalance(currentUser);
        const stall = menuCatalog[selectedStallId];
        const stallName = stall ? stall.name : "Select Stall";

        root.innerHTML = `
            <div class="header">
                <div class="logo">
                    <h1>🏫 Campus Canteen</h1>
                    <p>order & pay with campus credits</p>
                </div>
                <div class="user-panel">
                    <span>👤 ${currentUser}</span>
                    <span class="balance">💰 $${balance.toFixed(2)}</span>
                    <button id="logoutBtn" class="danger">Logout</button>
                </div>
            </div>
            <div class="topup-section">
                <span>💳 <strong>Top-up Wallet</strong> (Scan QR & pay at cashier)</span>
                <div class="qr-sim">📲 Show QR: CAMPUS-${currentUser}-TOPUP</div>
                <button id="simulateTopUpBtn" class="secondary">💰 Simulate +$10 (refill)</button>
            </div>
            <div>
                <div class="stall-grid" id="stallGrid"></div>
                <div class="menu-panel">
                    <h3>📋 ${stallName} Menu</h3>
                    <div id="menuItemsList" class="menu-items"></div>
                </div>
            </div>
            <div id="messageArea" class="message"></div>
            <footer>✨ Use balance to order | Top-up via cashier QR</footer>
        `;

        // render stalls
        const stallGrid = document.getElementById("stallGrid");
        for(let [sid, data] of Object.entries(menuCatalog)) {
            const card = document.createElement("div");
            card.className = `stall-card ${selectedStallId === sid ? 'selected' : ''}`;
            card.innerHTML = `<div style="font-size:2rem;">${data.name.slice(0,2)}</div><strong>${data.name}</strong>`;
            card.addEventListener("click", () => {
                selectedStallId = sid;
                render();
            });
            stallGrid.appendChild(card);
        }

        // render menu items for selected stall
        const menuContainer = document.getElementById("menuItemsList");
        const currentStall = menuCatalog[selectedStallId];
        if(currentStall && currentStall.items) {
            currentStall.items.forEach(item => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "menu-item";
                itemDiv.innerHTML = `
                    <span><strong>${item.name}</strong><br><span style="font-size:0.8rem;">$${item.price.toFixed(2)}</span></span>
                    <button class="orderBtn" data-price="${item.price}" data-name="${item.name}">Order</button>
                `;
                menuContainer.appendChild(itemDiv);
            });
            // attach order events
            document.querySelectorAll(".orderBtn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const price = parseFloat(btn.getAttribute("data-price"));
                    const itemName = btn.getAttribute("data-name");
                    handleOrder(itemName, price);
                });
            });
        }

        // top-up simulation (cashless test, real top-up would be via cashier software)
        document.getElementById("simulateTopUpBtn")?.addEventListener("click", () => {
            const newBal = getUserBalance(currentUser) + 10;
            setUserBalance(currentUser, newBal);
            showMessage("💰 +$10 added to your wallet (simulated top-up)");
            render(); // re-render to show new balance
        });

        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            render();
        });
    }

    function handleOrder(itemName, price) {
        if(!currentUser) return;
        let balance = getUserBalance(currentUser);
        if(balance >= price) {
            const newBalance = balance - price;
            setUserBalance(currentUser, newBalance);
            showMessage(`✅ Ordered ${itemName} for $${price.toFixed(2)}. Remaining: $${newBalance.toFixed(2)}`);
            render();
        } else {
            showMessage(`❌ Insufficient balance! Need $${price.toFixed(2)}. Please top up via cashier.`, true);
        }
    }

    function showMessage(msg, isError = false) {
        const msgDiv = document.getElementById("messageArea");
        if(msgDiv) {
            msgDiv.innerHTML = `<span style="color:${isError ? '#c0392b' : '#2c6e2f'}">${msg}</span>`;
            setTimeout(() => {
                if(document.getElementById("messageArea")) document.getElementById("messageArea").innerHTML = "";
            }, 2500);
        } else {
            alert(msg);
        }
    }

    // periodic check for balance changes from other window (topup software) using storage event
    window.addEventListener("storage", (e) => {
        if(e.key === "campus_users" && currentUser) {
            loadUsersFromStorage();
            render();   // refresh balance & UI
        }
    });

    render();
</script>
</body>
</html>
