<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>取餐通知 · 订单完成</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js">
    </script>

    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d151c;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.2s;
        }
        body:fullscreen {
            padding: 12px;
            background: #080f14;
        }
        body:-webkit-full-screen {
            padding: 12px;
            background: #080f14;
        }
        body:-moz-full-screen {
            padding: 12px;
            background: #080f14;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== 顶部栏 ===== */
        .header {
            background: #1b2a35;
            padding: 18px 24px;
            border-radius: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2f4554;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-left h1 {
            font-size: 1.8rem;
            color: #ffd54f;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-left .badge {
            background: #4caf50;
            color: #fff;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .header-left .badge.waiting {
            background: #e67e22;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .stats {
            display: flex;
            gap: 18px;
            font-size: 0.95rem;
            color: #aaa;
        }
        .stats span {
            color: #4caf50;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .stats .count-waiting {
            color: #ffd54f;
        }

        .btn {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .btn:hover {
            transform: scale(1.04);
            background: #3a5068;
        }
        .btn-primary {
            background: #ff9800;
            color: #1a1a1a;
        }
        .btn-primary:hover {
            background: #ffb74d;
        }
        .btn-danger {
            background: #c62828;
        }
        .btn-danger:hover {
            background: #e53935;
        }
        .btn-success {
            background: #2e7d32;
        }
        .btn-success:hover {
            background: #43a047;
        }
        .btn-fullscreen {
            background: #2c3e50;
        }
        .btn-fullscreen.is-fullscreen {
            background: #e67e22;
        }
        .btn-fullscreen.is-fullscreen:hover {
            background: #d35400;
        }
        .btn-clear {
            background: #8d6e63;
        }
        .btn-clear:hover {
            background: #a1887f;
        }

        /* ===== 订单网格 ===== */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-top: 4px;
        }

        /* ===== 订单卡片 ===== */
        .order-card {
            background: #1c2c38;
            border-left: 8px solid #ff9800;
            border-radius: 24px;
            padding: 20px 22px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.35s ease;
            position: relative;
            transition: transform 0.2s, opacity 0.3s;
        }
        .order-card:hover {
            transform: translateY(-2px);
        }
        .order-card.removing {
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-number {
            background: #ff9800;
            color: #1a1a1a;
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .order-table {
            background: #2e7d32;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
        }
        .order-time {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .items-list {
            margin: 8px 0 12px 0;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2f4554;
            font-size: 0.95rem;
        }
        .item-row:last-child {
            border-bottom: none;
        }
        .item-name {
            color: #e0e0e0;
        }
        .item-qty {
            color: #ffd54f;
            font-weight: 600;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-total {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4caf50;
        }
        .order-payment {
            color: #90caf9;
            font-size: 0.9rem;
        }

        .btn-ready {
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            border: none;
            border-radius: 18px;
            background: #ff9800;
            color: #1a1a1a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-ready:hover {
            background: #ffb74d;
            transform: scale(1.02);
        }
        .btn-ready:active {
            transform: scale(0.97);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 70px 20px;
            background: #1b2a35;
            border-radius: 30px;
            color: #8aa0b3;
            font-size: 1.3rem;
            border: 2px dashed #2f4554;
        }
        .empty-state .icon {
            font-size: 3.6rem;
            display: block;
            margin-bottom: 14px;
        }
        .empty-state .sub {
            font-size: 0.95rem;
            color: #5a7a8a;
            margin-top: 8px;
        }

        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #ffd54f;
        }

        /* ===== 清空确认对话框 (自定义) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #1c2c38;
            border-radius: 32px;
            padding: 36px 40px 32px;
            max-width: 480px;
            width: 100%;
            border: 1px solid #2f4554;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.25s ease;
        }
        .modal-box h2 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #ffd54f;
        }
        .modal-box p {
            color: #ccc;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .modal-box .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .modal-box .btn-group .btn {
            flex: 1;
            justify-content: center;
            padding: 12px;
            font-size: 1rem;
            min-width: 100px;
        }
        .modal-box .btn-group .btn-cancel-modal {
            background: #2c3e50;
        }
        .modal-box .btn-group .btn-cancel-modal:hover {
            background: #3a5068;
        }
        .modal-box .btn-group .btn-danger {
            background: #c62828;
        }
        .modal-box .btn-group .btn-danger:hover {
            background: #e53935;
        }

        /* ===== 通知吐司 ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b2a35;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #2f4554;
            font-weight: 500;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast.success {
            border-color: #4caf50;
        }
        .toast.error {
            border-color: #e53935;
        }
        .toast.info {
            border-color: #ff9800;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            body {
                padding: 10px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }
            .header-left h1 {
                font-size: 1.3rem;
            }
            .header-actions {
                justify-content: center;
            }
            .stats {
                justify-content: center;
                font-size: 0.8rem;
                gap: 12px;
            }
            .orders-grid {
                grid-template-columns: 1fr;
            }
            .modal-box {
                padding: 24px 20px;
            }
            .modal-box .btn-group .btn {
                min-width: 80px;
                font-size: 0.9rem;
            }
            .toast {
                bottom: 16px;
                padding: 12px 20px;
                font-size: 0.85rem;
                width: 90%;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
        }
        @media (max-width: 480px) {
            .header-left h1 {
                font-size: 1.1rem;
            }
            .order-number {
                font-size: 1.1rem;
                padding: 2px 14px;
            }
            .order-card {
                padding: 16px;
            }
            .btn-ready {
                font-size: 0.9rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 容器 ===== -->
    <div class="container">

        <!-- ===== 顶部栏 ===== -->
        <header class="header">
            <div class="header-left">
                <h1>📋 订单完成 · 取餐通知</h1>
                <span class="badge" id="statusBadge">● 实时</span>
                <span class="badge waiting" id="countBadge">等待 0</span>
            </div>
            <div class="header-actions">
                <div class="stats">
                    <div>📦 待取餐 <span class="count-waiting" id="waitingCount">0</span></div>
                    <div>✅ 已就绪 <span id="readyCount">0</span></div>
                </div>
                <button id="fullscreenBtn" class="btn btn-fullscreen">⛶ 全屏</button>
                <button id="clearBtn" class="btn btn-clear">🗑️ 清空记录</button>
            </div>
        </header>

        <!-- ===== 订单网格 ===== -->
        <div id="ordersGrid" class="orders-grid">
            <div class="loading-state">⏳ 正在加载订单...</div>
        </div>

    </div>

    <!-- ===== 清空确认对话框 ===== -->
    <div class="modal-overlay" id="clearModal">
        <div class="modal-box">
            <h2>⚠️ 清空记录</h2>
            <p>
                您确定要删除所有 <strong>已取餐</strong> 的订单吗？<br />
                此操作将永久删除这些记录，且<strong>不可恢复</strong>。
                <br /><br />
                <span style="color:#ffd54f;font-size:0.9rem;">
                    （未取餐的订单将保留）
                </span>
            </p>
            <div class="btn-group">
                <button class="btn btn-cancel-modal" id="cancelClearBtn">取消</button>
                <button class="btn btn-danger" id="confirmClearBtn">✅ 确认清空</button>
            </div>
        </div>
    </div>

    <!-- ===== Toast 通知 ===== -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================ -->
    <!-- JavaScript -->
    <!-- ============================================================ -->
    <script>
        // ====================================================================
        //  Firebase 配置 (与原系统相同)
        // ====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
            authDomain: "create-for-payment.firebaseapp.com",
            databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "create-for-payment",
            storageBucket: "create-for-payment.firebasestorage.app",
            messagingSenderId: "505063429802",
            appId: "1:505063429802:web:8ec8cca8c788610bad62d3"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const database = firebase.database();
        const ordersRef = database.ref('orders');

        // ====================================================================
        //  常量 & DOM 引用
        // ====================================================================
        const TARGET_TABLE = 'TTKK3';
        const grid = document.getElementById('ordersGrid');
        const waitingCountEl = document.getElementById('waitingCount');
        const readyCountEl = document.getElementById('readyCount');
        const countBadge = document.getElementById('countBadge');
        const statusBadge = document.getElementById('statusBadge');

        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const clearBtn = document.getElementById('clearBtn');
        const clearModal = document.getElementById('clearModal');
        const cancelClearBtn = document.getElementById('cancelClearBtn');
        const confirmClearBtn = document.getElementById('confirmClearBtn');

        const toast = document.getElementById('toast');

        // ====================================================================
        //  Toast 通知
        // ====================================================================
        let toastTimer = null;

        function showToast(message, type = 'info', duration = 2500) {
            toast.textContent = message;
            toast.className = 'toast ' + type;
            // 强制重排以重启动画
            void toast.offsetWidth;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // ====================================================================
        //  辅助函数
        // ====================================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatTime(time) {
            if (!time) return '--:--';
            try {
                return new Date(time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch {
                return '--:--';
            }
        }

        function formatDateTime(time) {
            if (!time) return '--';
            try {
                return new Date(time).toLocaleString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            } catch {
                return '--';
            }
        }

        // ====================================================================
        //  渲染订单卡片
        // ====================================================================
        function createOrderCard(orderId, data) {
            const card = document.createElement('div');
            card.className = 'order-card';
            card.dataset.orderId = orderId;

            let itemsHtml = '';
            if (data.items && Array.isArray(data.items)) {
                data.items.forEach(item => {
                    const name = item.name || `Item ${item.id}`;
                    itemsHtml += `
                            <div class="item-row">
                                <span class="item-name">🍽️ ${escapeHtml(name)}</span>
                                <span class="item-qty">×${item.qty || 1}</span>
                            </div>
                        `;
                });
            }

            const payment = data.payment || data.paymentMethod || '现金';

            card.innerHTML = `
                    <div class="order-top">
                        <span class="order-number">#${data.orderNumber || '---'}</span>
                        <span class="order-table">${escapeHtml(data.table || '外带')}</span>
                    </div>
                    <div class="order-time">🕒 ${formatTime(data.time)}</div>
                    <div class="items-list">${itemsHtml}</div>
                    <div class="order-footer">
                        <span class="order-total">💰 $${Number(data.total || 0).toFixed(2)}</span>
                        <span class="order-payment">💳 ${escapeHtml(payment)}</span>
                    </div>
                    <button class="btn-ready" data-orderid="${orderId}">
                        ✅ 订单就绪
                    </button>
                `;

            // ---- 订单就绪 ----
            const readyBtn = card.querySelector('.btn-ready');
            readyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = this.dataset.orderid;
                // 标记为已取餐
                database.ref('orders/' + id).update({
                    pickedUp: true,
                    pickedUpAt: Date.now()
                }).then(() => {
                    showToast('✅ 订单 #' + (data.orderNumber || '---') + ' 已就绪', 'success');
                    // 卡片会因数据变化而自动移除
                }).catch(err => {
                    console.error('❌ 就绪操作失败:', err);
                    showToast('❌ 操作失败，请重试', 'error');
                });
            });

            return card;
        }

        // ====================================================================
        //  渲染主逻辑
        // ====================================================================
        let allOrdersCache = {};
        let currentDisplayIds = new Set();

        function renderOrders(data) {
            allOrdersCache = data || {};

            // 过滤：source === 'counter' && table === 'TTKK3' && completed === true && pickedUp !== true
            const entries = Object.entries(allOrdersCache)
                .filter(([key, val]) => {
                    const table = (val.table || '').toUpperCase().trim();
                    return val.source === 'counter' &&
                        table === TARGET_TABLE &&
                        val.completed === true &&
                        val.pickedUp !== true;
                })
                .sort((a, b) => (b[1].time || 0) - (a[1].time || 0));

            const newIds = new Set(entries.map(([id]) => id));

            // ---- 统计已取餐数量 (pickedUp === true) ----
            let readyCount = 0;
            Object.entries(allOrdersCache).forEach(([key, val]) => {
                const table = (val.table || '').toUpperCase().trim();
                if (val.source === 'counter' && table === TARGET_TABLE && val.completed === true && val.pickedUp ===
                    true) {
                    readyCount++;
                }
            });

            // 更新统计
            waitingCountEl.textContent = entries.length;
            readyCountEl.textContent = readyCount;
            countBadge.textContent = `等待 ${entries.length}`;
            statusBadge.textContent = entries.length > 0 ? '● 有订单' : '● 空闲';
            statusBadge.style.color = entries.length > 0 ? '#4caf50' : '#8aa0b3';

            // ---- 空状态 ----
            if (entries.length === 0) {
                grid.innerHTML = `
                        <div class="empty-state">
                            <span class="icon">🎉</span>
                            暂无待取餐的订单
                            <div class="sub">所有已完成订单已就绪或暂无新订单</div>
                        </div>
                    `;
                currentDisplayIds = new Set();
                return;
            }

            // ---- 更新 DOM (增量更新) ----
            // 移除不再显示的卡片
            const existingCards = grid.querySelectorAll('.order-card');
            existingCards.forEach(card => {
                const id = card.dataset.orderId;
                if (!newIds.has(id)) {
                    card.classList.add('removing');
                    setTimeout(() => {
                        if (card.parentNode) card.remove();
                    }, 300);
                }
            });

            // 添加新卡片或更新现有卡片
            let fragment = document.createDocumentFragment();
            let needAppend = false;

            entries.forEach(([id, val]) => {
                let existingCard = grid.querySelector(`.order-card[data-order-id="${id}"]`);
                if (existingCard) {
                    // 已存在，但数据可能变化，简单处理：重新创建
                    // 为了保持动画，我们可以只更新内容，但为了简单，替换
                    const newCard = createOrderCard(id, val);
                    existingCard.replaceWith(newCard);
                } else {
                    // 新卡片
                    const newCard = createOrderCard(id, val);
                    fragment.appendChild(newCard);
                    needAppend = true;
                }
            });

            if (needAppend) {
                grid.appendChild(fragment);
            }

            // 如果grid里只剩下空状态占位，但entries不为空，重建
            // 这种情况发生在首次加载或清空后
            const hasCards = grid.querySelectorAll('.order-card').length > 0;
            if (!hasCards && entries.length > 0) {
                // 重建
                grid.innerHTML = '';
                entries.forEach(([id, val]) => {
                    const card = createOrderCard(id, val);
                    grid.appendChild(card);
                });
            }

            currentDisplayIds = newIds;
        }

        // ====================================================================
        //  实时监听
        // ====================================================================
        ordersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            renderOrders(data);
        }, (error) => {
            console.error('❌ 监听失败:', error);
            grid.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">⚠️</span>
                        连接失败，请检查网络
                        <div class="sub">${error.message}</div>
                    </div>
                `;
            showToast('⚠️ 与服务器连接断开', 'error', 3000);
        });

        // ====================================================================
        //  全屏功能
        // ====================================================================
        function isFullscreen() {
            return !!(document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement);
        }

        function toggleFullscreen() {
            if (isFullscreen()) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            } else {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
                else if (el.msRequestFullscreen) el.msRequestFullscreen();
            }
        }

        function updateFullscreenBtn() {
            if (isFullscreen()) {
                fullscreenBtn.classList.add('is-fullscreen');
                fullscreenBtn.textContent = '⛶ 退出全屏';
            } else {
                fullscreenBtn.classList.remove('is-fullscreen');
                fullscreenBtn.textContent = '⛶ 全屏';
            }
        }

        document.addEventListener('fullscreenchange', updateFullscreenBtn);
        document.addEventListener('webkitfullscreenchange', updateFullscreenBtn);
        document.addEventListener('mozfullscreenchange', updateFullscreenBtn);
        document.addEventListener('MSFullscreenChange', updateFullscreenBtn);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        updateFullscreenBtn();

        // ====================================================================
        //  清空记录 (删除所有已取餐的订单)
        // ====================================================================
        function openClearModal() {
            clearModal.classList.add('active');
        }

        function closeClearModal() {
            clearModal.classList.remove('active');
        }

        async function performClear() {
            closeClearModal();

            // 收集所有已取餐的订单 (pickedUp === true)
            const toDelete = [];
            Object.entries(allOrdersCache).forEach(([key, val]) => {
                const table = (val.table || '').toUpperCase().trim();
                if (val.source === 'counter' &&
                    table === TARGET_TABLE &&
                    val.completed === true &&
                    val.pickedUp === true) {
                    toDelete.push(key);
                }
            });

            if (toDelete.length === 0) {
                showToast('💡 没有已取餐的订单需要清空', 'info', 2000);
                return;
            }

            try {
                const updates = {};
                toDelete.forEach(key => { updates[key] = null; });
                await ordersRef.update(updates);
                showToast(`✅ 已清空 ${toDelete.length} 条已取餐记录`, 'success', 3000);
            } catch (err) {
                console.error('❌ 清空失败:', err);
                showToast('❌ 清空失败: ' + err.message, 'error', 3000);
            }
        }

        clearBtn.addEventListener('click', openClearModal);
        cancelClearBtn.addEventListener('click', closeClearModal);
        confirmClearBtn.addEventListener('click', performClear);

        // 点击模态背景关闭
        clearModal.addEventListener('click', (e) => {
            if (e.target === clearModal) closeClearModal();
        });

        // ESC键关闭模态
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && clearModal.classList.contains('active')) {
                closeClearModal();
            }
        });

        // ====================================================================
        //  键盘快捷键
        // ====================================================================
        document.addEventListener('keydown', (e) => {
            // Ctrl + F 全屏
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                toggleFullscreen();
            }
            // Ctrl + C 清空 (安全起见，不绑定)
        });

        // ====================================================================
        //  初始化
        // ====================================================================
        console.log(`📋 取餐通知已启动，桌号: ${TARGET_TABLE}`);
        console.log(`🔔 监听已完成且未取餐的订单`);

        // 加载初始数据 (renderOrders 会在监听回调中执行)
        // 但为了更快的首屏，可以先主动拉一次
        ordersRef.once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) renderOrders(data);
        }).catch(err => {
            console.warn('⚠️ 初始加载失败:', err);
        });

        // ====================================================================
        //  暴露一些变量到控制台便于调试
        // ====================================================================
        window.__kdsReady = {
            ordersRef,
            database,
            renderOrders,
            allOrdersCache,
            TARGET_TABLE,
            showToast
        };
    </script>
</body>
</html>
