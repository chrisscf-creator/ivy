<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Recharge</title>
    <style>
        body{font-family:Arial;padding:20px;background:#f0f8ff}
        .box{max-width:500px;margin:auto;background:white;padding:25px;border-radius:16px}
        #video{width:100%;height:auto;background:#000;border-radius:12px}
        button{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;background:#007bff;color:white}
        input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
    </style>
</head>
<body>
<div class="box">
    <h2>Recharge</h2>
    <video id="video" autoplay playsinline></video>
    <button id="start">Start Camera</button>
    <input type="number" id="amt" placeholder="Amount" min="1">
    <button id="confirm" style="background:#28a745">Confirm</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const USER_KEY = "userData";
let phone = "";
const video = document.getElementById("video");
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function getUsers() { return JSON.parse(localStorage.getItem(USER_KEY)) || {}; }
function saveUsers(u) { localStorage.setItem(USER_KEY, JSON.stringify(u)); }

start.onclick = async () => {
    let stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:"environment"} });
    video.srcObject = stream;
    scan();
};

function scan() {
    if(video.videoWidth>0){
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0);
        let code=jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height);
        if(code && code.data.startsWith("TOP:")){
            phone=code.data.split(":")[1];
            alert("User: "+phone);
        }
    }
    requestAnimationFrame(scan);
}

confirm.onclick = () => {
    let amount=Number(amt.value);
    let users=getUsers();
    if(!users[phone]) users[phone]={pwd:"123456", balance:0};
    users[phone].balance += amount;
    saveUsers(users);
    alert("Success: +$"+amount);
};
</script>
</body>
</html>
