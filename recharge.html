<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge</title>
    <style>
        body{font-family:Arial;padding:20px;background:#f0f8ff}
        .box{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:16px}
        #video{width:100%;border-radius:12px;background:#000;margin:15px 0}
        button{padding:14px;width:100%;border:none;background:#007bff;color:white;border-radius:12px;margin:5px 0}
        input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
        .info{padding:15px;background:#e3f2fd;border-radius:8px;margin:10px 0}
    </style>
</head>
<body>
<div class="box">
    <h2>Recharge</h2>
    <video id="video" autoplay></video>
    <button id="startBtn">Start Camera</button>
    <div class="info">
        Phone: <b id="showPhone"></b><br>
        Amount: <input type="number" id="addAmt" placeholder="0" min="1">
    </div>
    <button id="confirmBtn" style="background:#28a745">Confirm</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const STORAGE_KEY = "userData";
const video = document.getElementById("video");
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");
let phone = "";

function getUsers() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
}
function saveUsers(u) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(u));
}

startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    video.srcObject = stream;
    scan();
};

function scan() {
    if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) {
            const d = code.data;
            if (d.startsWith("TOP:")) {
                phone = d.split(":")[1];
                showPhone.innerText = phone;
                alert("Success!");
            }
        }
    }
    requestAnimationFrame(scan);
}

confirmBtn.onclick = () => {
    const amt = Number(addAmt.value);
    if (!phone || !amt || amt < 1) return alert("Scan & enter amount");
    const u = getUsers();
    if (!u[phone]) u[phone] = { password: "123456", balance: 0 };
    u[phone].balance += amt;
    saveUsers(u);
    alert("Success!\nPhone: " + phone + "\nAmount: $" + amt);
    addAmt.value = "";
    phone = "";
    showPhone.innerText = "";
};
</script>
</body>
</html>
