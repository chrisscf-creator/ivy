<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专业 Taxi Meter · GPS 导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b121f;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #eef2f8;
    }
    /* 全屏容器 */
    .meter-container {
      width: 100%;
      max-width: 880px;
      background: #131e2f;
      border-radius: 52px;
      padding: 28px 24px 32px;
      box-shadow: 0 30px 60px -10px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
      transition: all 0.2s;
      backdrop-filter: blur(2px);
      border: 1px solid #2a3a52;
    }
    /* 全屏模式 */
    .meter-container.fullscreen {
      max-width: 100%;
      border-radius: 0;
      padding: 20px 24px 28px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid #26354a;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .header h1 {
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #b7e4c7, #5bcb8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span {
      background: #1e3349;
      padding: 2px 14px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      -webkit-text-fill-color: #a0c0e0;
      color: #a0c0e0;
      letter-spacing: 0.3px;
    }
    .fullscreen-btn {
      background: #1e3349;
      border: none;
      color: #b0cce5;
      font-size: 22px;
      padding: 8px 18px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #2f435d;
      font-weight: 500;
    }
    .fullscreen-btn:hover {
      background: #2a405a;
      color: white;
      border-color: #4b6a8a;
    }
    /* GPS 导航条 */
    .gps-bar {
      background: #0d1829;
      border-radius: 40px;
      padding: 16px 22px;
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px 24px;
      border: 1px solid #273a52;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
    }
    .gps-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 450;
    }
    .gps-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 12px #4ade80aa;
      transition: 0.3s;
    }
    .gps-dot.inactive {
      background: #64748b;
      box-shadow: none;
    }
    .gps-coord {
      font-family: 'JetBrains Mono', monospace;
      background: #0b1422;
      padding: 4px 16px;
      border-radius: 60px;
      font-size: 15px;
      letter-spacing: 0.3px;
      border: 1px solid #2a3f5a;
      color: #b4d0ea;
    }
    .nav-controls {
      display: flex;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: #1e3349;
      border: 1px solid #314a66;
      color: #d6e4f5;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .nav-btn.start {
      background: #1f8b4c;
      border-color: #2e9f5e;
      color: white;
    }
    .nav-btn.start:hover { background: #1a7a42; }
    .nav-btn.stop {
      background: #b13e3e;
      border-color: #c94f4f;
      color: white;
    }
    .nav-btn.stop:hover { background: #9c3333; }
    .nav-btn.reset {
      background: #2a3a52;
      border-color: #3f5674;
    }
    .nav-btn.reset:hover { background: #344a66; }
    .nav-btn:disabled {
      opacity: 0.45;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    /* 里程 & 时间 卡片 */
    .trip-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin: 18px 0 20px;
    }
    .metric-card {
      background: #0d1a2b;
      border-radius: 28px;
      padding: 18px 18px 16px;
      border: 1px solid #253a52;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.3);
    }
    .metric-label {
      font-size: 13px;
      font-weight: 500;
      color: #8ba3c2;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .metric-value {
      font-size: 32px;
      font-weight: 700;
      color: #eaf0fa;
      letter-spacing: -0.5px;
      margin-top: 4px;
    }
    .metric-value small {
      font-size: 16px;
      font-weight: 400;
      color: #7b97bb;
      margin-left: 4px;
    }

    /* 参数调节 (专业风格) */
    .params-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      background: #0b1729;
      border-radius: 32px;
      padding: 16px 20px 20px;
      margin: 6px 0 18px;
      border: 1px solid #243a52;
    }
    .param-item {
      flex: 1 0 140px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .param-item label {
      font-size: 12px;
      font-weight: 500;
      color: #8aa3c4;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .param-item input {
      background: #0f1f33;
      border: 1px solid #2d4560;
      border-radius: 40px;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 600;
      color: #deecfc;
      width: 100%;
      outline: none;
      transition: 0.15s;
      font-family: 'JetBrains Mono', monospace;
    }
    .param-item input:focus {
      border-color: #4ade80;
      box-shadow: 0 0 0 3px #1f8b4c55;
    }
    .param-item input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }

    /* 费用显示 */
    .fare-display {
      background: linear-gradient(145deg, #0b1a2e, #0f223b);
      border-radius: 48px;
      padding: 20px 30px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #2f4a68;
      margin: 12px 0 22px;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
    }
    .fare-label {
      font-size: 18px;
      font-weight: 400;
      color: #b0cae7;
      letter-spacing: 0.2px;
    }
    .fare-amount {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #b1f0c9, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .fare-amount small {
      font-size: 20px;
      font-weight: 500;
      -webkit-text-fill-color: #96c9b0;
      color: #96c9b0;
      background: none;
      margin-left: 4px;
    }

    /* 明细表格 */
    .table-wrap {
      background: #0d1a2b;
      border-radius: 30px;
      padding: 10px 6px 4px 6px;
      border: 1px solid #223952;
    }
    .rate-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 5px;
      font-size: 14px;
    }
    .rate-table th {
      text-align: left;
      font-weight: 600;
      color: #8aa3c4;
      padding: 6px 14px 4px 14px;
      border-bottom: 1px solid #253f5a;
      font-size: 13px;
      letter-spacing: 0.4px;
    }
    .rate-table td {
      padding: 10px 14px;
      background: #0f2037;
      border-radius: 20px;
      color: #d6e6fa;
      border: 1px solid #1e3852;
    }
    .rate-table .highlight td {
      background: #1a3a2e;
      border-color: #2a6a4a;
    }
    .rate-table .total-row td {
      background: #1a334a;
      font-weight: 600;
      color: #b7e0c7;
    }
    .footnote {
      display: flex;
      justify-content: flex-end;
      font-size: 12px;
      color: #6f8bb0;
      margin-top: 12px;
      padding-right: 8px;
      gap: 14px;
      flex-wrap: wrap;
    }
    .footnote span {
      background: #122439;
      padding: 2px 14px;
      border-radius: 40px;
      border: 1px solid #27405a;
    }

    @media (max-width: 600px) {
      .meter-container { padding: 16px 12px; }
      .header h1 { font-size: 20px; }
      .fare-amount { font-size: 36px; }
      .metric-value { font-size: 26px; }
      .gps-bar { flex-direction: column; align-items: stretch; }
      .nav-controls { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="meter-container" id="meterContainer">
  <!-- Header -->
  <div class="header">
    <h1>🚕 TaxiMeter <span>GPS Pro</span></h1>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全屏</button>
  </div>

  <!-- GPS 导航条 -->
  <div class="gps-bar">
    <div class="gps-status">
      <span class="gps-dot" id="gpsDot"></span>
      <span id="gpsStatusText">定位中</span>
    </div>
    <div class="gps-coord" id="gpsCoord">0.0000, 0.0000</div>
    <div class="nav-controls">
      <button class="nav-btn start" id="startNavBtn">▶ 出发</button>
      <button class="nav-btn stop" id="stopNavBtn" disabled>⏹ 到达</button>
      <button class="nav-btn reset" id="resetNavBtn">↺ 重置</button>
    </div>
  </div>

  <!-- 里程 & 时间 -->
  <div class="trip-metrics">
    <div class="metric-card"><div class="metric-label">📏 里程</div><div class="metric-value" id="tripDistance">0.00 <small>km</small></div></div>
    <div class="metric-card"><div class="metric-label">⏱️ 行驶时间</div><div class="metric-value" id="tripTime">0:00</div></div>
    <div class="metric-card"><div class="metric-label">🔄 状态</div><div class="metric-value" id="navStatus" style="font-size:20px; color:#8fcbff;">待命</div></div>
  </div>

  <!-- 参数调节 -->
  <div class="params-grid">
    <div class="param-item"><label>💰 单价 (¥/km)</label><input type="number" id="ratePerKm" value="2.80" step="0.1" min="0.5"></div>
    <div class="param-item"><label>🧾 附加费 (¥)</label><input type="number" id="extraFee" value="2.50" step="0.5" min="0"></div>
    <div class="param-item"><label>⏳ 等候费 (¥/5min)</label><input type="number" id="waitRate" value="3.00" step="0.2" min="0"></div>
  </div>

  <!-- 费用 -->
  <div class="fare-display">
    <span class="fare-label">💵 预估车费</span>
    <span class="fare-amount" id="fareDisplay">¥0.00</span>
  </div>

  <!-- 明细表 -->
  <div class="table-wrap">
    <table class="rate-table">
      <thead><tr><th>明细</th><th>参数</th><th>单价</th><th>费用</th></tr></thead>
      <tbody id="tableBody">
        <tr><td>起步</td><td>3 km</td><td>—</td><td>¥0.00</td></tr>
      </tbody>
    </table>
    <div class="footnote">
      <span>🛰️ GPS 模拟导航</span>
      <span>📊 附加费含平台费</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // ----- DOM refs -----
    const container = document.getElementById('meterContainer');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const gpsDot = document.getElementById('gpsDot');
    const gpsStatusText = document.getElementById('gpsStatusText');
    const gpsCoordEl = document.getElementById('gpsCoord');
    const startBtn = document.getElementById('startNavBtn');
    const stopBtn = document.getElementById('stopNavBtn');
    const resetBtn = document.getElementById('resetNavBtn');
    const tripDistanceEl = document.getElementById('tripDistance');
    const tripTimeEl = document.getElementById('tripTime');
    const navStatusEl = document.getElementById('navStatus');
    const fareDisplay = document.getElementById('fareDisplay');
    const tableBody = document.getElementById('tableBody');

    const ratePerKmInput = document.getElementById('ratePerKm');
    const extraFeeInput = document.getElementById('extraFee');
    const waitRateInput = document.getElementById('waitRate');

    // ----- 状态 -----
    let isNavigating = false;
    let tripStartTime = null;          // Date
    let elapsedSeconds = 0;            // 累计秒 (暂停时保留)
    let totalDistance = 0;             // km
    let animationFrame = null;
    let lastTimestamp = null;

    // 模拟GPS坐标 (起始)
    let currentLat = 1.3521;
    let currentLng = 103.8198;
    const GPS_SPEED = 0.000015;        // 每帧经纬度增量 (模拟移动)

    // 模拟里程累积 (km/秒)
    const DISTANCE_INCREMENT = 0.032;   // ~115m/秒

    // ----- 计价规则 (专业) -----
    function calculateFare(distance, waitMinutes, ratePerKm, extraFee, waitRate) {
      const BASE_FARE = 9.0;
      const BASE_DIST = 3.0;
      let distCost = Math.max(0, distance - BASE_DIST) * ratePerKm;
      let waitCost = 0;
      if (waitMinutes > 0) {
        const units = Math.ceil(waitMinutes / 5);
        waitCost = units * waitRate;
      }
      let extra = parseFloat(extraFee) || 0;
      let total = BASE_FARE + distCost + waitCost + extra;
      total = Math.round(total * 100) / 100;
      return { total, baseFare: BASE_FARE, distCost, waitCost, extra, distance, waitMinutes, ratePerKm };
    }

    // ----- 更新UI (GPS, 里程, 时间, 费用, 表格) -----
    function updateUI() {
      // 1. 时间
      let displaySeconds = elapsedSeconds;
      if (isNavigating && tripStartTime) {
        const diff = Math.floor((Date.now() - tripStartTime.getTime()) / 1000);
        displaySeconds = elapsedSeconds + diff;
      }
      const mins = Math.floor(displaySeconds / 60);
      const secs = Math.floor(displaySeconds % 60);
      tripTimeEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

      // 2. 里程
      tripDistanceEl.innerHTML = `${totalDistance.toFixed(2)} <small>km</small>`;

      // 3. 状态
      if (isNavigating) {
        navStatusEl.textContent = '行驶中 🟢';
        navStatusEl.style.color = '#4ade80';
      } else if (totalDistance > 0 || elapsedSeconds > 0) {
        navStatusEl.textContent = '已结束 ⏹️';
        navStatusEl.style.color = '#f87171';
      } else {
        navStatusEl.textContent = '待命 ⚪';
        navStatusEl.style.color = '#8fcbff';
      }

      // 4. GPS 更新 (模拟)
      gpsCoordEl.textContent = `${currentLat.toFixed(4)}, ${currentLng.toFixed(4)}`;
      if (isNavigating) {
        gpsDot.className = 'gps-dot';
        gpsStatusText.textContent = '导航中';
      } else {
        gpsDot.className = 'gps-dot inactive';
        gpsStatusText.textContent = totalDistance > 0 ? '已到达' : '待命';
      }

      // 5. 费用计算
      const ratePerKm = parseFloat(ratePerKmInput.value) || 2.8;
      const extraFee = parseFloat(extraFeeInput.value) || 0;
      const waitRate = parseFloat(waitRateInput.value) || 3.0;
      const waitMinutes = displaySeconds / 60;
      const result = calculateFare(totalDistance, waitMinutes, ratePerKm, extraFee, waitRate);
      fareDisplay.innerHTML = `¥${result.total.toFixed(2)} <small>CNY</small>`;

      // 6. 表格
      let html = '';
      html += `<tr><td>🚀 起步</td><td>0 ~ 3 km</td><td>—</td><td>¥${result.baseFare.toFixed(2)}</td></tr>`;
      if (totalDistance > 3) {
        const extraDist = totalDistance - 3;
        html += `<tr><td>📈 里程</td><td>${extraDist.toFixed(2)} km</td><td>¥${result.ratePerKm.toFixed(2)}/km</td><td>¥${result.distCost.toFixed(2)}</td></tr>`;
      } else {
        html += `<tr><td>📈 里程</td><td>—</td><td>—</td><td>¥0.00</td></tr>`;
      }
      if (result.waitCost > 0) {
        const units = Math.ceil(result.waitMinutes / 5);
        html += `<tr class="highlight"><td>🕒 等候</td><td>${result.waitMinutes.toFixed(1)} min</td><td>¥${waitRate.toFixed(2)}/5min</td><td>¥${result.waitCost.toFixed(2)}</td></tr>`;
      } else {
        html += `<tr><td>🕒 等候</td><td>—</td><td>—</td><td>¥0.00</td></tr>`;
      }
      if (result.extra > 0) {
        html += `<tr><td>🧾 附加费</td><td>平台/预约</td><td>—</td><td>¥${result.extra.toFixed(2)}</td></tr>`;
      }
      html += `<tr class="total-row"><td colspan="3" style="text-align:right;">💰 总计</td><td style="color:#4ade80;">¥${result.total.toFixed(2)}</td></tr>`;
      tableBody.innerHTML = html;
    }

    // ----- 导航循环 (模拟GPS + 里程) -----
    function navigationLoop(timestamp) {
      if (!isNavigating) {
        animationFrame = null;
        return;
      }
      if (lastTimestamp === null) {
        lastTimestamp = timestamp;
        animationFrame = requestAnimationFrame(navigationLoop);
        return;
      }
      const delta = (timestamp - lastTimestamp) / 1000; // 秒
      if (delta > 0 && delta < 0.5) {
        // 累积里程
        totalDistance += delta * DISTANCE_INCREMENT;
        // 模拟GPS 移动 (绕小圈)
        const speedFactor = 0.8;
        currentLat += Math.sin(timestamp / 3000) * 0.000008 * delta * 30;
        currentLng += Math.cos(timestamp / 4000) * 0.000008 * delta * 30;
        // 保持在合理范围
        if (currentLat > 1.36) currentLat = 1.35;
        if (currentLat < 1.34) currentLat = 1.35;
        if (currentLng > 103.83) currentLng = 103.81;
        if (currentLng < 103.80) currentLng = 103.81;
      }
      lastTimestamp = timestamp;

      updateUI();
      animationFrame = requestAnimationFrame(navigationLoop);
    }

    // ----- 控制函数 -----
    function startNavigation() {
      if (isNavigating) return;
      if (tripStartTime === null) {
        tripStartTime = new Date();
        elapsedSeconds = 0;
        totalDistance = 0;
        // 重置GPS初始位置
        currentLat = 1.3521;
        currentLng = 103.8198;
      } else {
        tripStartTime = new Date();
      }
      isNavigating = true;
      lastTimestamp = null;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animationFrame = requestAnimationFrame(navigationLoop);
      updateUI();
    }

    function stopNavigation() {
      if (!isNavigating) return;
      if (tripStartTime) {
        const diff = Math.floor((Date.now() - tripStartTime.getTime()) / 1000);
        elapsedSeconds += diff;
        tripStartTime = null;
      }
      isNavigating = false;
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      startBtn.disabled = false;
      stopBtn.disabled = true;
      updateUI();
    }

    function resetTrip() {
      if (isNavigating) stopNavigation();
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      isNavigating = false;
      tripStartTime = null;
      elapsedSeconds = 0;
      totalDistance = 0;
      lastTimestamp = null;
      currentLat = 1.3521;
      currentLng = 103.8198;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      updateUI();
    }

    // ----- 全屏功能 -----
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
        container.classList.add('fullscreen');
      } else {
        document.exitFullscreen?.();
        container.classList.remove('fullscreen');
      }
    }
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        container.classList.remove('fullscreen');
      }
    });

    // ----- 事件绑定 -----
    startBtn.addEventListener('click', startNavigation);
    stopBtn.addEventListener('click', stopNavigation);
    resetBtn.addEventListener('click', resetTrip);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    [ratePerKmInput, extraFeeInput, waitRateInput].forEach(inp => {
      inp.addEventListener('input', updateUI);
    });

    // 初始化
    resetTrip();

    // 快捷键: F 全屏
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      }
    });

  })();
</script>
</body>
</html>
