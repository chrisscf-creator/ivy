<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passenger - Grab Clone</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body { font-family: Arial; }
#map { height: 300px; margin-top:10px; }
button { padding:10px; margin-top:10px; }
</style>
</head>

<body>

<h2>🚖 Passenger App</h2>

<div id="map"></div>

<button onclick="bookRide()">Book Ride</button>

<p id="info"></p>

<script>
// Firebase
const firebaseConfig = {
    apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
    authDomain: "create-for-payment.firebaseapp.com",
    databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "create-for-payment",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Map
const map = L.map('map').setView([1.3521, 103.8198], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map);

let pickupLatLng = null;

map.on('click', function(e){
    pickupLatLng = e.latlng;
    L.marker(e.latlng).addTo(map)
    .bindPopup("Pickup Point").openPopup();
});

// GPS current location
navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    L.marker([lat,lng]).addTo(map)
    .bindPopup("You are here");
});

// Price calc
function calcPrice(distanceKm, minutes){
    let base = 3.8;
    return base + (distanceKm * 0.8) + (minutes * 0.15);
}

// Book ride
function bookRide(){

    if(!pickupLatLng){
        alert("Select pickup on map!");
        return;
    }

    const orderId = "ORD" + Date.now();

    const distanceKm = (Math.random()*5 + 1).toFixed(2);
    const durationMin = (distanceKm * 2).toFixed(0);
    const price = calcPrice(distanceKm, durationMin);

    db.ref("orders/" + orderId).set({
        pickup: pickupLatLng,
        destination: "Auto Demo Destination",
        distance: distanceKm,
        duration: durationMin,
        price: price,
        status: "waiting"
    });

    document.getElementById("info").innerHTML =
    "Order Created! Price: SGD " + price;
}
</script>

</body>
</html>
