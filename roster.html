<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>** foodrepublic Vivocity **</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f2f4f8;
            padding: 16px;
            margin: 0;
        }
        .container {
            max-width: 1360px;
            margin: 0 auto;
            background: white;
            padding: 18px 16px 20px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1e2b3c;
            margin: 0 0 6px 0;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #2c3e50;
            background: #ecf0f1;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .control-panel {
            background: #f8faff;
            padding: 14px 18px;
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            margin: 12px 0 18px 0;
            border: 1px solid #e9edf4;
        }
        .form-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #1e2b3c;
        }
        .form-group input[type="month"] {
            padding: 8px 12px;
            border: 1px solid #cdd5e0;
            border-radius: 30px;
            font-size: 14px;
            background: white;
            outline: none;
            transition: 0.2s;
        }
        .form-group input[type="month"]:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.2);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-left: auto;
        }
        button {
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            background: #eaeef3;
            color: #1e2b3c;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-gen { background: #f39c12; color: white; }
        .btn-gen:hover { background: #e08e0b; }
        .btn-pdf { background: #c0392b; color: white; }
        .btn-pdf:hover { background: #a93226; }
        .btn-fullscreen { background: #8e44ad; color: white; }
        .btn-fullscreen:hover { background: #7d3c98; }

        .staff-config {
            background: #fbfdff;
            border: 1px solid #e2e8f0;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .staff-config strong { font-size: 15px; color: #1e2b3c; }
        .staff-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
            margin: 8px 0 4px;
        }
        .staff-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .staff-row span { font-weight: 500; color: #2c3e50; width: 60px; }
        .staff-row input {
            border: 1px solid #d0d7e2;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 13px;
            width: 130px;
            background: white;
            transition: 0.2s;
        }
        .staff-row input:focus {
            border-color: #f39c12;
            outline: none;
            box-shadow: 0 0 0 3px rgba(243,156,18,0.15);
        }
        .rule-note {
            font-size: 13px;
            color: #2c3e50;
            background: #f0f7fe;
            padding: 10px 16px;
            border-radius: 30px;
            margin: 10px 0 0 0;
            border-left: 4px solid #f39c12;
            line-height: 1.5;
        }
        .rule-note b { color: #c0392b; }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 780px;
        }
        th, td {
            border: 1px solid #d5dce6;
            padding: 6px 4px;
            text-align: center;
            vertical-align: middle;
        }
        .header-brand {
            background: #fef6e7;
            font-weight: 700;
            font-size: 16px;
            color: #b03a2e;
            text-align: left;
            padding-left: 14px;
        }
        .header-title {
            background: #fef6e7;
            font-weight: 600;
            font-size: 15px;
            color: #1e2b3c;
        }
        .meta-label {
            background: #f2f6fc;
            font-weight: 600;
            text-align: left;
            padding-left: 12px;
        }
        .date-col {
            background: #f8faff;
            font-weight: 600;
            color: #1e2b3c;
            min-width: 72px;
        }
        .shift-select {
            width: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            padding: 4px 0;
            border-radius: 20px;
            transition: 0.1s;
        }
        .shift-select:focus { outline: none; background: rgba(0,0,0,0.03); }

        /* 班次颜色 */
        .shift-M { background-color: #d4edda; color: #1e6f3f; }
        .shift-MM { background-color: #fff3cd; color: #8a6d2b; }
        .shift-A { background-color: #ffffff; color: #1e2b3c; }
        .shift-REST { background-color: #999999; color: #ffffff; }
        .shift-AL { background-color: #fdebd0; color: #a04000; }
        .shift-PH { background-color: #e8d5f5; color: #6c3483; }
        .rest-auto { background-color: #999999 !important; color: #ffffff !important; }

        .summary-row { background: #eef3fa; font-weight: 600; }
        .summary-row td { padding: 8px 4px; }
        .weekend-row { background-color: #f7f9fc; }

        /* 全屏适配 */
        :fullscreen .container { max-width: 100%; border-radius: 0; padding: 20px; }
        :-webkit-full-screen .container { max-width: 100%; border-radius: 0; }
        :-moz-full-screen .container { max-width: 100%; border-radius: 0; }

        /* PDF 打印样式 */
        @media print {
            .control-panel, .staff-config, button, h1 small { display: none !important; }
            body { padding: 0; background: white; }
            .container { box-shadow: none; border-radius: 0; padding: 10px; }
            .shift-select { border: none !important; appearance: none; -webkit-appearance: none; }
            .table-wrapper { border: 1px solid #ccc; }
            .shift-select option { color: black; } /* 保证文字可见 */
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span>** foodrepublic Vivocity **</span>
        <small>每周一休 · 固定日期</small>
    </h1>

    <div class="control-panel">
        <div class="form-group">
            <label>📅 月份</label>
            <input type="month" id="schedule-month" value="2026-06">
        </div>
        <div class="btn-group">
            <button class="btn-gen" onclick="generateSmartSchedule()">⚡ 智能排班</button>
            <button class="btn-pdf" onclick="generatePDF()">📄 生成 PDF</button>
            <button class="btn-fullscreen" id="fs-btn" onclick="toggleFullScreen()">⛶ 全屏</button>
        </div>
    </div>

    <div class="staff-config">
        <strong>👥 员工名单 (5人)</strong>
        <div class="staff-inputs" id="staff-inputs-container">
            <div class="staff-row"><span>1.</span> <input type="text" class="s-name" value="Elva Yang"></div>
            <div class="staff-row"><span>2.</span> <input type="text" class="s-name" value="Leon Ng"></div>
            <div class="staff-row"><span>3.</span> <input type="text" class="s-name" value="Christopher"></div>
            <div class="staff-row"><span>4.</span> <input type="text" class="s-name" value="Yee Fei Lim"></div>
            <div class="staff-row"><span>5.</span> <input type="text" class="s-name" value="Darlene"></div>
        </div>
        <div class="rule-note">
            ✅ <b>固定休息</b>：员工1→周一休，员工2→周二休，员工3→周三休，员工4→周四休，员工5→周五休。<br>
            ✅ 每月每个员工休息 <b>4天</b>（每个星期几的前4个日期），周六日全员上班。<br>
            ✅ 班次分配：1人M，1人MM，2人A；若5人上班则2人MM，若4人上班则1人MM。
        </div>
    </div>

    <div class="table-wrapper" id="schedule-table-container"></div>
</div>

<script>
    // ----- 全屏切换 -----
    function toggleFullScreen() {
        const btn = document.getElementById('fs-btn');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
            btn.textContent = "⛶ 退出";
        } else {
            document.exitFullscreen();
            btn.textContent = "⛶ 全屏";
        }
    }
    document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('fs-btn');
        btn.textContent = document.fullscreenElement ? "⛶ 退出" : "⛶ 全屏";
    });

    // ----- 生成 PDF（调用打印） -----
    function generatePDF() {
        window.print();
    }

    // ----- 统计更新 -----
    function calculateMonthlyStats() {
        const rows = document.querySelectorAll('.data-row');
        const counts = Array.from({ length: 5 }, () => ({ M: 0, MM: 0, A: 0, REST: 0, AL: 0, PH: 0 }));
        rows.forEach(row => {
            row.querySelectorAll('.shift-select').forEach((sel, idx) => {
                if (counts[idx] && counts[idx][sel.value] !== undefined) counts[idx][sel.value]++;
            });
        });
        for (let i = 0; i < 5; i++) {
            document.getElementById(`stat-M-${i}`).innerText = counts[i].M;
            document.getElementById(`stat-MM-${i}`).innerText = counts[i].MM;
            document.getElementById(`stat-A-${i}`).innerText = counts[i].A;
            document.getElementById(`stat-OFF-${i}`).innerText = counts[i].REST + counts[i].AL + counts[i].PH;
        }
    }

    function updateCellColor(sel) {
        const td = sel.parentNode;
        td.className = 'shift-' + sel.value;
        calculateMonthlyStats();
    }

    // ----- 核心排班：固定星期几休息，每人4天 -----
    function generateSmartSchedule() {
        const names = Array.from(document.querySelectorAll('.s-name')).map(inp => inp.value.trim() || '未命名');
        const monthVal = document.getElementById('schedule-month').value;
        const [year, month] = monthVal.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        // 读取已有的锁定 (AL/PH) —— REST将被我们重新分配
        const locked = {};
        const oldTable = document.querySelector('table');
        if (oldTable) {
            oldTable.querySelectorAll('.data-row').forEach((row, rIdx) => {
                row.querySelectorAll('.shift-select').forEach((sel, cIdx) => {
                    const val = sel.value;
                    if (['AL', 'PH'].includes(val)) {
                        locked[`${rIdx+1}-${cIdx}`] = val;
                    }
                });
            });
        }

        // ---- 1. 生成每个员工的休息日 (固定星期几) ----
        // 员工 i (0-4) 对应星期 (i+1) 即 周一~周五
        const restDays = Array.from({ length: 5 }, () => []); // restDays[empIdx] = [day1, day2, day3, day4]

        for (let empIdx = 0; empIdx < 5; empIdx++) {
            const targetWeekday = empIdx + 1; // 1=周一, 2=周二, ... 5=周五
            const dates = [];
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month - 1, d);
                if (date.getDay() === targetWeekday) {
                    dates.push(d);
                }
            }
            // 取前4个（如果不足4个则取全部，但一般都有4个）
            restDays[empIdx] = dates.slice(0, 4);
        }

        // ---- 2. 逐日构建排班表 ----
        const table = document.createElement('table');
        table.innerHTML = `
            <tr>
                <th colspan="2" class="header-brand">FOOD JUNCTION</th>
                <th colspan="5" class="header-title">Duty Roster · ${monthVal}</th>
            </tr>
            <tr>
                <td colspan="2" class="meta-label">Staff</td>
                ${names.map(n => `<td><b>${n}</b></td>`).join('')}
            </tr>
        `;

        // 计数器用于公平轮转班次
        const counter = Array.from({ length: 5 }, () => ({ M: 0, MM: 0, A: 0 }));
        let prevShift = new Array(5).fill('REST');

        for (let day = 1; day <= daysInMonth; day++) {
            const dateObj = new Date(year, month - 1, day);
            const dow = dateObj.getDay();
            const weekDay = weekdays[dow];

            const row = document.createElement('tr');
            row.className = 'data-row' + (dow === 0 || dow === 6 ? ' weekend-row' : '');
            row.innerHTML = `<td class="date-col">${weekDay}</td><td class="date-col">${day}</td>`;

            const assigned = new Array(5).fill(null);

            // 2.1 分配系统休息日
            for (let empIdx = 0; empIdx < 5; empIdx++) {
                if (restDays[empIdx].includes(day)) {
                    assigned[empIdx] = 'REST';
                }
            }

            // 2.2 应用锁定 (AL/PH) 覆盖 REST
            for (let empIdx = 0; empIdx < 5; empIdx++) {
                const key = `${day}-${empIdx}`;
                if (locked[key]) {
                    assigned[empIdx] = locked[key]; // AL 或 PH
                }
            }

            // 2.3 确定上班员工（未分配班次的）
            let available = [];
            for (let empIdx = 0; empIdx < 5; empIdx++) {
                if (assigned[empIdx] === null) available.push(empIdx);
            }

            // 2.4 根据上班人数确定班次需求
            let requiredShifts = [];
            const numWorking = available.length;
            if (numWorking === 0) {
                // 全部休息或锁定，不分配
            } else if (numWorking === 1) {
                requiredShifts = ['A'];
            } else if (numWorking === 2) {
                requiredShifts = ['M', 'A'];
            } else if (numWorking === 3) {
                requiredShifts = ['M', 'A', 'A'];
            } else if (numWorking === 4) {
                requiredShifts = ['M', 'MM', 'A', 'A'];
            } else if (numWorking === 5) {
                requiredShifts = ['M', 'MM', 'MM', 'A', 'A'];
            }

            // 2.5 公平分配 (优先M，再MM，最后A，且避免A后接M)
            const sortedShifts = requiredShifts.slice().sort((a, b) => {
                if (a === 'M') return -1;
                if (b === 'M') return 1;
                if (a === 'MM' && b === 'A') return -1;
                if (a === 'A' && b === 'MM') return 1;
                return 0;
            });

            sortedShifts.forEach(shift => {
                let bestIdx = -1, minCount = Infinity;
                const candidates = available.filter(idx => {
                    if (shift === 'M' && prevShift[idx] === 'A') return false;
                    return true;
                });
                if (candidates.length === 0) {
                    // 如果没有符合条件的，则全部可用
                    candidates.push(...available);
                }
                candidates.forEach(idx => {
                    if (counter[idx][shift] < minCount) {
                        minCount = counter[idx][shift];
                        bestIdx = idx;
                    }
                });
                if (bestIdx !== -1) {
                    assigned[bestIdx] = shift;
                    counter[bestIdx][shift]++;
                    available = available.filter(idx => idx !== bestIdx);
                }
            });

            // 剩余未分配员工补 A（理论上不会发生，但以防万一）
            available.forEach(idx => {
                assigned[idx] = 'A';
                counter[idx]['A']++;
            });

            // 更新 prevShift
            prevShift = [...assigned];

            // 2.6 渲染单元格
            assigned.forEach((shift, empIdx) => {
                const td = document.createElement('td');
                const isRest = (shift === 'REST');
                td.className = 'shift-' + shift + (isRest ? ' rest-auto' : '');
                td.innerHTML = `
                    <select class="shift-select" onchange="updateCellColor(this)">
                        <option value="A" ${shift==='A'?'selected':''}>A</option>
                        <option value="M" ${shift==='M'?'selected':''}>M</option>
                        <option value="MM" ${shift==='MM'?'selected':''}>MM</option>
                        <option value="REST" ${shift==='REST'?'selected':''}>REST</option>
                        <option value="AL" ${shift==='AL'?'selected':''}>AL</option>
                        <option value="PH" ${shift==='PH'?'selected':''}>PH</option>
                    </select>
                `;
                row.appendChild(td);
            });
            table.appendChild(row);
        }

        // ---- 3. 统计行 ----
        const statTypes = [
            { label: 'M 班合计', key: 'M' },
            { label: 'MM 班合计', key: 'MM' },
            { label: 'A 班合计', key: 'A' },
            { label: '总休假/OFF', key: 'OFF' }
        ];
        statTypes.forEach(cfg => {
            const tr = document.createElement('tr');
            tr.className = 'summary-row';
            tr.innerHTML = `<td colspan="2">${cfg.label}</td>` +
                Array.from({ length: 5 }, (_, i) => `<td id="stat-${cfg.key}-${i}">0</td>`).join('');
            table.appendChild(tr);
        });

        const container = document.getElementById('schedule-table-container');
        container.innerHTML = '';
        container.appendChild(table);
        calculateMonthlyStats();
    }

    window.onload = function() {
        generateSmartSchedule();
    };
</script>
</body>
</html>
