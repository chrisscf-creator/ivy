<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商家充值系统</title>
<style>
*{box-sizing:border-box;font-family:Arial}
body{background:#f0f4ff;padding:30px;margin:0}
.box{max-width:420px;margin:0 auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 3px 15px #00000015}
h2{text-align:center;color:#3366ff;margin-top:0}
input{width:100%;padding:13px;margin:8px 0;border:1px #ddd solid;border-radius:8px;font-size:16px}
button{width:100%;padding:13px;border:none;border-radius:8px;margin:8px 0;font-weight:bold;font-size:16px;cursor:pointer}
.btn-topup{background:#2563eb;color:#fff}
.btn-close{background:#999;color:#fff}
.qr-box{text-align:center;margin:15px 0}
.qr-box img{width:220px;height:220px;border:1px #eee solid;border-radius:8px}
.hide{display:none}
</style>
</head>
<body>
<div class="box">
    <h2>会员储值充值（商家端）</h2>
    <input id="phone" placeholder="输入会员手机号">
    <input id="money" type="number" min="1" placeholder="输入充值金额">
    <button class="btn-topup" id="createQrBtn">生成充值二维码</button>

    <div id="qrWrap" class="hide qr-box">
        <p>请顾客扫码完成充值</p>
        <img id="qrImg" src="">
        <button class="btn-topup" id="confirmAdd">确认到账，增加余额</button>
        <button class="btn-close" id="cancel">关闭</button>
    </div>
</div>

<script>
//会员数据统一存储
function getUserAll(){return JSON.parse(localStorage.getItem("userData"))||{}}
function saveUser(obj){localStorage.setItem("userData",JSON.stringify(obj))}
let nowPhone="",nowAmt=0;
const phone=document.getElementById("phone");
const money=document.getElementById("money");
const createQrBtn=document.getElementById("createQrBtn");
const qrWrap=document.getElementById("qrWrap");
const qrImg=document.getElementById("qrImg");
const confirmAdd=document.getElementById("confirmAdd");
const cancel=document.getElementById("cancel");

//生成充值二维码
createQrBtn.onclick=()=>{
    let p=phone.value.trim();
    let m=Number(money.value);
    if(!p||isNaN(m)||m<=0){alert("填写正确手机号和金额");return}
    nowPhone=p;nowAmt=m;
    //动态二维码链接：携带手机号+金额参数
    let qrData=`RECHARGE|${p}|${m}`;
    qrImg.src=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrData)}`;
    qrWrap.classList.remove("hide");
}

//充值成功加余额
confirmAdd.onclick=()=>{
    let user=getUserAll();
    if(!user[nowPhone]) user[nowPhone]={pwd:"123456",balance:0};
    user[nowPhone].balance+=nowAmt;
    saveUser(user);
    alert(`充值成功！${nowPhone}新增$${nowAmt.toFixed(2)}，当前余额$${user[nowPhone].balance.toFixed(2)}`);
    qrWrap.classList.add("hide");
    phone.value="";money.value="";
}
cancel.onclick=()=>qrWrap.classList.add("hide");
</script>
</body>
</html>
