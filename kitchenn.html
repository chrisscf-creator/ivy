<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>厨房显示 · Counter POS 专版</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.5.2/firebase-database-compat.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1e1e1e;
            color: #f0f0f0;
            padding: 20px;
            min-height: 100vh;
        }
        .kds-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding-bottom: 16px;
            border-bottom: 2px solid #ffa500;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1:before {
            content: "🍳";
            font-size: 2.5rem;
        }
        .header-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .header-controls button {
            background: #2c3e50;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #4a5a6a;
        }
        .header-controls button:hover {
            background: #3a4f62;
        }
        .header-controls button.active {
            background: #ffa500;
            color: #1e1e1e;
            border-color: #ffa500;
        }
        .header-controls .danger {
            background: #a52828;
            border-color: #a52828;
        }
        .header-controls .danger:hover {
            background: #c0392b;
        }
        .stats {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 10px 24px;
            display: inline-flex;
            gap: 30px;
            flex-wrap: wrap;
            font-size: 1.1rem;
            border: 1px solid #444;
        }
        .stats span {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
        }
        .stats .num {
            font-weight: bold;
            color: #ffa500;
            font-size: 1.4rem;
        }
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .order-card {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 20px;
            border-left: 6px solid #ffa500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .order-card.completed {
            border-left-color: #27ae60;
            opacity: 0.7;
        }
        .order-card.completed .order-status {
            background: #27ae60;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffa500;
        }
        .order-table {
            background: #3a3a3a;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .order-time {
            color: #aaa;
            font-size: 0.85rem;
        }
        .order-items {
            list-style: none;
            padding: 0;
            margin: 6px 0;
            font-size: 1rem;
            line-height: 1.6;
        }
        .order-items li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #3d3d3d;
            padding: 4px 0;
        }
        .order-items li:last-child {
            border-bottom: none;
        }
        .item-name {
            flex: 1;
        }
        .item-qty {
            margin-left: 12px;
            font-weight: 500;
            color: #ccc;
        }
        .item-price {
            margin-left: 12px;
            color: #ffa500;
        }
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-total {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f1c40f;
        }
        .order-status {
            background: #f39c12;
            color: #1e1e1e;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .order-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .order-actions button {
            background: #3a5a7a;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .order-actions button:hover {
            background: #4a7a9a;
        }
        .order-actions .btn-done {
            background: #27ae60;
        }
        .order-actions .btn-done:hover {
            background: #2ecc71;
        }
        .order-actions .btn-delete {
            background: #a52828;
        }
        .order-actions .btn-delete:hover {
            background: #c0392b;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.6rem;
            color: #777;
            grid-column: 1 / -1;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .filter-bar label {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #444;
        }
        .filter-bar input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #ffa500;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .header h1 {
                font-size: 1.6rem;
            }
            .orders-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                font-size: 0.9rem;
                gap: 15px;
            }
            .order-number {
                font-size: 1.4rem;
            }
        }
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #1e1e1e;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 999;
        }
        .toast.error {
            background: #e74c3c;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="kds-container">
        <div class="header">
            <h1>厨房显示 · Counter POS</h1>
            <div class="header-controls">
                <div class="stats" id="statsPanel">
                    <span>⏳ 制作中 <span class="num" id="pendingCount">0</span></span>
                    <span>✅ 已完成 <span class="num" id="doneCount">0</span></span>
                    <span>📅 今日销售 <span class="num" id="todaySales">$0.00</span></span>
                </div>
                <button id="refreshBtn" title="刷新">🔄 刷新</button>
                <button id="clearDoneBtn" class="danger">🗑️ 清除已完成</button>
            </div>
        </div>

        <div class="filter-bar">
            <label>
                <input type="checkbox" id="showAllCheck"> 显示全部（包括已完成）
            </label>
            <label>
                <input type="checkbox" id="showOnlyCounter" checked disabled> 仅 Counter POS
            </label>
            <span style="color:#888; font-size:0.9rem; margin-left:8px;">（自动过滤 source=counter）</span>
        </div>

        <div id="ordersContainer" class="orders-grid">
            <div class="empty-state">🕒 等待订单 ...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================================
        // Firebase 配置 (与POS一致)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyARFD8Zdb7D22XCUJctKM8E-4nVznhqYDc",
            authDomain: "create-for-payment.firebaseapp.com",
            databaseURL: "https://create-for-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "create-for-payment",
            storageBucket: "create-for-payment.firebasestorage.app",
            messagingSenderId: "505063429802",
            appId: "1:505063429802:web:8ec8cca8c788610bad62d3"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const ordersRef = database.ref('orders');

        // ============================================================
        // 全局状态
        // ============================================================
        let allOrders = []; // 存储所有 source === 'counter' 的订单
        let showAll = false; // 是否显示已完成订单

        const container = document.getElementById('ordersContainer');
        const pendingCountEl = document.getElementById('pendingCount');
        const doneCountEl = document.getElementById('doneCount');
        const todaySalesEl = document.getElementById('todaySales');
        const showAllCheck = document.getElementById('showAllCheck');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearDoneBtn = document.getElementById('clearDoneBtn');
        const toastEl = document.getElementById('toast');

        // ============================================================
        // 工具函数
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function formatTime(iso) {
            if (!iso) return '--';
            const d = new Date(iso);
            return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function showToast(msg, isError = false) {
            toastEl.textContent = msg;
            toastEl.className = 'toast' + (isError ? ' error' : '');
            toastEl.style.display = 'block';
            clearTimeout(toastEl._timer);
            toastEl._timer = setTimeout(() => {
                toastEl.style.display = 'none';
            }, 3000);
        }

        // ============================================================
        // 渲染订单列表
        // ============================================================
        function renderOrders() {
            // 过滤 source === 'counter' (实际上我们只存储这类订单，但以防万一)
            let filtered = allOrders.filter(o => o.source === 'counter');

            // 根据 showAll 决定是否显示已完成
            if (!showAll) {
                filtered = filtered.filter(o => !o.completed);
            }

            // 按时间降序（最新的在前）
            filtered.sort((a, b) => new Date(b.time) - new Date(a.time));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">${showAll ? '📭 暂无 Counter POS 订单' : '✅ 所有订单已完成，等待新订单...'}</div>`;
                updateStats();
                return;
            }

            let html = '';
            filtered.forEach(order => {
                const isCompleted = order.completed === true;
                const items = order.items || [];
                const total = order.total || 0;

                html += `
                    <div class="order-card ${isCompleted ? 'completed' : ''}">
                        <div class="order-header">
                            <span class="order-number">#${order.orderNumber || '--'}</span>
                            <span class="order-table">🏷️ ${escapeHtml(order.table || '外带')}</span>
                            <span class="order-time">🕒 ${formatTime(order.time)}</span>
                        </div>
                        <ul class="order-items">
                            ${items.map(item => `
                                <li>
                                    <span class="item-name">${escapeHtml(item.name || '菜品')}</span>
                                    <span class="item-qty">×${item.qty || 1}</span>
                                    <span class="item-price">$${(item.price || 0).toFixed(2)}</span>
                                </li>
                            `).join('')}
                        </ul>
                        <div class="order-footer">
                            <span class="order-total">💰 $${total.toFixed(2)}</span>
                            <span class="order-status">${isCompleted ? '✅ 已完成' : '⏳ 制作中'}</span>
                        </div>
                        <div class="order-actions">
                            ${!isCompleted ? `<button class="btn-done" data-id="${order.id}">✅ 完成</button>` : ''}
                            <button class="btn-delete" data-id="${order.id}">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // 绑定事件
            document.querySelectorAll('.btn-done').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    await markOrderDone(id);
                });
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const id = this.dataset.id;
                    if (confirm('确认删除此订单？')) {
                        await deleteOrder(id);
                    }
                });
            });

            updateStats();
        }

        // ============================================================
        // 更新统计信息
        // ============================================================
        function updateStats() {
            const counterOrders = allOrders.filter(o => o.source === 'counter');
            const pending = counterOrders.filter(o => !o.completed);
            const done = counterOrders.filter(o => o.completed);

            pendingCountEl.textContent = pending.length;
            doneCountEl.textContent = done.length;

            // 计算今日销售（只计算已完成订单的总额）
            const today = getTodayString();
            let sales = 0;
            done.forEach(o => {
                const d = o.time ? getTodayStringFromISO(o.time) : '';
                if (d === today) {
                    sales += (o.total || 0);
                }
            });
            todaySalesEl.textContent = '$' + sales.toFixed(2);
        }

        function getTodayStringFromISO(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ============================================================
        // Firebase 操作
        // ============================================================

        // 标记订单已完成
        async function markOrderDone(id) {
            try {
                await ordersRef.child(id).update({ completed: true });
                showToast('✅ 订单已完成');
            } catch (e) {
                showToast('❌ 更新失败: ' + e.message, true);
            }
        }

        // 删除单个订单
        async function deleteOrder(id) {
            try {
                await ordersRef.child(id).remove();
                showToast('🗑️ 已删除订单');
            } catch (e) {
                showToast('❌ 删除失败: ' + e.message, true);
            }
        }

        // 清除所有已完成订单 (仅限 counter 来源)
        async function clearCompletedOrders() {
            if (!confirm('确认删除所有已完成的 Counter POS 订单？此操作不可撤销！')) return;
            try {
                // 获取所有已完成且 source === counter 的订单
                const snapshot = await ordersRef.orderByChild('source').equalTo('counter').once('value');
                const data = snapshot.val();
                if (!data) {
                    showToast('没有可清除的已完成订单');
                    return;
                }
                const updates = {};
                let count = 0;
                for (let key in data) {
                    if (data[key].completed === true) {
                        updates[key] = null;
                        count++;
                    }
                }
                if (count === 0) {
                    showToast('没有可清除的已完成订单');
                    return;
                }
                await ordersRef.update(updates);
                showToast(`✅ 已清除 ${count} 个已完成订单`);
            } catch (e) {
                showToast('❌ 清除失败: ' + e.message, true);
            }
        }

        // ============================================================
        // 实时监听订单变化 (仅监听 counter 来源)
        // ============================================================
        function startListening() {
            // 使用 orderByChild('source').equalTo('counter') 来只获取 counter 订单
            const query = ordersRef.orderByChild('source').equalTo('counter');

            query.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    allOrders = [];
                    renderOrders();
                    return;
                }
                // 转换成数组
                const orders = Object.entries(data).map(([id, value]) => ({
                    id,
                    ...value
                }));
                allOrders = orders;
                renderOrders();
            }, (error) => {
                console.error('监听失败:', error);
                showToast('❌ 数据库连接异常，请刷新页面', true);
            });
        }

        // ============================================================
        // 手动刷新
        // ============================================================
        function refreshData() {
            // 由于实时监听已存在，直接重新触发渲染（但监听会自动更新）
            // 我们可以强制从数据库重新获取
            ordersRef.orderByChild('source').equalTo('counter').once('value')
                .then(snapshot => {
                    const data = snapshot.val();
                    if (!data) { allOrders = []; } else {
                        allOrders = Object.entries(data).map(([id, value]) => ({ id, ...value }));
                    }
                    renderOrders();
                    showToast('🔄 数据已刷新');
                })
                .catch(e => {
                    showToast('❌ 刷新失败: ' + e.message, true);
                });
        }

        // ============================================================
        // 初始化
        // ============================================================
        function init() {
            // 显示全部复选框
            showAllCheck.addEventListener('change', function() {
                showAll = this.checked;
                renderOrders();
            });

            refreshBtn.addEventListener('click', refreshData);

            clearDoneBtn.addEventListener('click', clearCompletedOrders);

            // 开始监听
            startListening();

            // 定时刷新统计（每10秒更新一次，其实事件驱动已更新，但额外保障）
            setInterval(() => {
                // 只是重新渲染，数据已是最新
                renderOrders();
            }, 30000);
        }

        // 启动
        init();
    </script>
</body>
</html>
