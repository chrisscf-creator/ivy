<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家扫码充值</title>
    <style>
        body{font-family:Arial;padding:20px;background:#f5f8ff}
        .box{max-width:500px;margin:0 auto;background:white;padding:30px;border-radius:16px}
        #video{width:100%;border-radius:12px;background:#000;margin-bottom:15px}
        button{padding:14px;width:100%;border:none;background:#2563eb;color:white;border-radius:12px;font-size:16px;margin:5px 0;cursor:pointer}
        input{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
        .info{padding:15px;background:#eef5ff;border-radius:8px;margin:10px 0}
        .btn-confirm{background:#28a745}
    </style>
</head>
<body>
<div class="box">
    <h2>📥 商家扫码充值</h2>
    <video id="video" autoplay playsinline></video>
    <button id="startBtn">开启后置相机扫码</button>
    <div class="info">
        会员手机号：<b id="uPhone"></b><br>
        填写充值金额：<input type="number" id="addAmt" placeholder="输入储值金额" min="1">
    </div>
    <button class="btn-confirm" id="confirmBtn">确认充值到账</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
const video=document.getElementById('video')
const canvas=document.createElement('canvas')
const ctx=canvas.getContext('2d')
let phone=''

function users(){return JSON.parse(localStorage.userData||'{}')}
function save(u){localStorage.userData=JSON.stringify(u)}

startBtn.onclick=async()=>{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    video.srcObject=stream
    scan()
}

function scan(){
    if(video.videoWidth){
        canvas.width=video.videoWidth
        canvas.height=video.videoHeight
        ctx.drawImage(video,0,0,canvas.width,canvas.height)
        const code=jsQR(canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height)
        if(code){
            let d=code.data
            if(d.startsWith('TOP:')){
                phone=d.split(':')[1]
                uPhone.innerText=phone
                alert('识别会员成功，请输入充值金额')
            }
        }
    }
    requestAnimationFrame(scan)
}

confirmBtn.onclick=()=>{
    let amt=Number(addAmt.value)
    if(!phone||!amt||amt<1) return alert('先扫码会员二维码，再填写金额')
    let u=users()
    if(!u[phone]) u[phone]={pwd:'123456',bal:0}
    u[phone].bal+=amt
    save(u)
    alert(`充值成功！\n手机号：${phone}\n储值+$${amt.toFixed(2)}`)
    addAmt.value='';phone='';uPhone.innerText=''
}
</script>
</body>
</html>
