<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>厨房屏</title>
<style>
body { background:black; color:white; font-family:Arial;}
.order { border:1px solid #555; margin:10px; padding:10px;}
</style>
</head>
<body>

<h1>厨房订单</h1>
<div id="orders"></div>

<script>
const ws = new WebSocket("ws://localhost:3000");

ws.onmessage = (msg) => {
    const order = JSON.parse(msg.data);
    addOrder(order);
};

function addOrder(o){
    const div = document.getElementById("orders");
    let html = `<div class="order">
        桌号:${o.table}<br>
        时间:${o.time}<br>`;

    o.items.forEach(i=>{
        html += `${i.name} x${i.qty}<br>`;
    });

    html += `<b>总价:$${o.total}</b></div>`;

    div.innerHTML = html + div.innerHTML;
}
</script>

</body>
</html>
