<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>POS 系统</title>
<style>
body { font-family: Arial; display:flex; margin:0;}
.left { width:60%; padding:10px;}
.right { width:40%; padding:10px; background:#f5f5f5;}

.item { display:flex; justify-content:space-between; margin:5px 0;}
.cart-item { display:flex; justify-content:space-between;}
</style>
</head>
<body>

<div class="left">
<h2>菜单</h2>
<div id="menu"></div>
</div>

<div class="right">
<h2>订单</h2>

桌号: <input id="table"><br><br>

<div id="cart"></div>

<h3>总价: $<span id="total">0</span></h3>

<button onclick="checkout()">结账</button>
</div>

<script>
const API = "http://localhost:3000/order";

const menu = [
    {id:1,name:"炒饭",price:8},
    {id:2,name:"鸡饭",price:6},
    {id:3,name:"奶茶",price:3}
];

let cart = [];

function renderMenu(){
    const div = document.getElementById("menu");
    menu.forEach(i=>{
        div.innerHTML += `
        <div class="item">
            ${i.name} $${i.price}
            <button onclick="add(${i.id})">+</button>
        </div>`;
    });
}

function add(id){
    let item = cart.find(i=>i.id===id);
    if(item) item.qty++;
    else{
        let m = menu.find(i=>i.id===id);
        cart.push({...m,qty:1});
    }
    renderCart();
}

function renderCart(){
    let div = document.getElementById("cart");
    div.innerHTML="";
    let total=0;

    cart.forEach(i=>{
        total+=i.price*i.qty;
        div.innerHTML+=`${i.name} x${i.qty}<br>`;
    });

    document.getElementById("total").innerText=total;
}

function checkout(){
    if(cart.length===0) return alert("空订单");

    const order = {
        table: document.getElementById("table").value || "外带",
        time: new Date().toLocaleString(),
        items: cart,
        total: document.getElementById("total").innerText
    };

    fetch(API,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(order)
    });

    alert("已发送到厨房");
    cart=[];
    renderCart();
}

renderMenu();
</script>

</body>
</html>
